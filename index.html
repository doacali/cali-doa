<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cali Doa | AI Operating System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #ffffff; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    
    #main-sidebar {
      position: fixed; left: 0; top: 0; height: 100vh; width: 260px;
      transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 60; background: white; border-right: 1px solid #f3f4f6;
    }
    #main-sidebar.collapsed { transform: translateX(-100%); }
    
    .sidebar-item { transition: all 0.2s ease; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 12px; font-weight: 700; color: #9ca3af; font-size: 13px; }
    .sidebar-item:hover { background-color: #f3f4f6; color: #111827; }
    .sidebar-active { background: #111111 !important; color: white !important; }
    
    .chat-bubble { animation: fadeIn 0.28s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    
    #voice-switch { transition: background-color 0.3s; }
    #voice-knob { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

    /* RE-OPEN SIDEBAR BUTTON */
    #open-sidebar-btn { position: fixed; top: 24px; left: 24px; z-index: 100; transition: all 0.3s ease; }
    #open-sidebar-btn.hidden { opacity: 0; pointer-events: none; transform: scale(0.5); }
  </style>
</head>
<body class="bg-white">

  <!-- SIDEBAR TOGGLE -->
  <button id="open-sidebar-btn" onclick="toggleSidebar()" class="hidden bg-white border border-gray-100 p-2.5 rounded-xl shadow-lg hover:scale-105 transition">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>

  <div class="flex h-screen w-screen overflow-hidden">
    
    <!-- 1. SIDEBAR (RESTORED LABELS & HISTORY) -->
    <aside id="main-sidebar" class="flex flex-col h-full shrink-0 relative">
      <div class="p-6 flex items-center justify-between">
        <h1 class="text-xl font-black text-[#00E676] italic uppercase cursor-pointer" onclick="startNewChat()">DOA CALI</h1>
        <button onclick="toggleSidebar()" class="text-gray-300 hover:text-black text-[9px] font-black uppercase tracking-widest">Hide</button>
      </div>
      
      <nav class="flex-1 px-4 space-y-1 overflow-y-auto hide-scrollbar">
        <p class="text-[10px] font-extrabold text-gray-300 uppercase tracking-[0.2em] px-2 mb-2">Main Hub</p>
        <button id="nav-chat" onclick="switchView('chat')" class="sidebar-item sidebar-active">💬 <span>Chat With Doa</span></button>
        <button onclick="switchView('apps')" class="sidebar-item">📱 <span>App Factory</span></button>
        
        <p class="text-[10px] font-extrabold text-gray-300 uppercase tracking-[0.2em] px-2 mt-8 mb-2">Previously</p>
        <div id="history-list" class="space-y-1 px-1"></div>
      </nav>
    </aside>

    <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
      
      <header class="w-full px-8 py-5 flex justify-end items-center gap-8 text-[11px] font-black uppercase text-gray-400 shrink-0 z-50">
        <button onclick="login()">Login</button>
        <button onclick="signUp()" class="text-black bg-[#00E676] px-5 py-2 rounded-xl font-bold">Sign Up</button>
      </header>

      <!-- CENTER VIEWPORT -->
      <div id="chat-view" class="view-container flex-1 w-full flex flex-col items-center justify-center px-10 relative overflow-hidden">
        
        <div id="chat-shell" class="w-full max-w-2xl flex flex-col h-full justify-center">
          
          <div id="hero-section" class="text-center py-10">
            <h1 class="text-6xl font-black mb-5 tracking-tighter leading-none">What can <span class="text-[#00E676]">Doa</span><br>do for you?</h1>
            <p id="welcome-text" class="text-gray-400 text-lg font-medium">Your intelligent companion.</p>
          </div>

          <div id="chat-history" class="hidden w-full overflow-y-auto hide-scrollbar space-y-5 py-6"></div>

          <!-- INPUT AREA (CENTERED & BROUGHT DOWN) -->
          <div id="input-area" class="w-full bg-white pt-8">
            <div id="suggestion-container" class="flex flex-wrap justify-center gap-2 mb-6 min-h-[40px]"></div>
            
            <div class="flex justify-between items-center mb-3 px-2">
              <p id="status-text" class="text-[9px] font-black text-gray-300 uppercase tracking-widest"></p>
              <div class="flex items-center gap-3">
                <span class="text-[9px] font-black text-gray-300 uppercase">Live Voice</span>
                <div id="voice-switch" onclick="toggleVoice()" class="w-8 h-4 bg-gray-100 rounded-full relative cursor-pointer">
                  <div id="voice-knob" class="absolute left-0.5 top-0.5 w-3 h-3 bg-white rounded-full shadow-sm"></div>
                </div>
              </div>
            </div>

            <div class="bg-white border border-gray-200 shadow-[0_20px_70px_rgba(0,0,0,0.08)] rounded-[32px] p-2.5 flex items-end gap-2">
              <textarea id="user-input" rows="1" class="flex-1 py-2 px-4 outline-none text-[14px] font-medium resize-none" placeholder="Ask Doaa anything..."></textarea>
              <button onclick="handleMessage()" class="shrink-0 bg-black text-white w-11 h-11 rounded-full shadow-lg font-bold">↑</button>
            </div>
          </div>

        </div>
      </div>

      <!-- APPS VIEW -->
      <div id="apps-view" class="view-container hidden flex-1 w-full p-10 overflow-y-auto">
        <h2 class="text-4xl font-black italic uppercase tracking-tighter">App Factory</h2>
        <div id="app-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-10"></div>
      </div>

      <footer class="w-full py-6 px-10 border-t border-gray-50 flex justify-between items-center text-[8px] font-black text-gray-400 uppercase bg-white shrink-0">
        <div class="flex gap-10"><a href="#">Privacy Policy</a><a href="#">Terms of Service</a></div>
        <div>© 2026 DOA CALI. ALL RIGHTS RESERVED.</div>
      </footer>
    </main>
  </div>

  <script>
    const CLOUDFLARE_URL = 'https://doa-brain-proxy.111222lov3.workers.dev';
    const _supabase = null; // Connect yours if needed

    let voiceActive = JSON.parse(localStorage.getItem('voice_active')) || false;
    let chatHistoryData = JSON.parse(localStorage.getItem('doa_history')) || [];
    let currentChatId = null;
    let selectedVoice = null;

    // --- 1. PREMIUM VOICE ENGINE (doaa Phonetic Lock) ---
    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        const femaleNames = ["Samantha", "Karen", "Moira", "Tessa", "Veena", "Fiona", "Victoria", "Allison", "Ava", "Susan", "Zoe", "Microsoft Zira", "Microsoft Aria", "Microsoft Jenny", "Google US English Female", "Google UK English Female"];
        for (const name of femaleNames) {
            const match = voices.find(v => v.name.includes(name));
            if (match) { selectedVoice = match; break; }
        }
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function speak(text) {
        if (!voiceActive) return;
        window.speechSynthesis.cancel();
        const cleanText = text.replace(/\bDoa\b/gi, "doaa").replace(/\bDowa\b/gi, "doaa").replace(/[*#`_~]/g, "").replace(/[\u{1F600}-\u{1FFFF}]/gu, "");
        const u = new SpeechSynthesisUtterance(cleanText);
        if (selectedVoice) u.voice = selectedVoice;
        u.pitch = 1.2; u.rate = 0.92;
        window.speechSynthesis.speak(u);
    }

    // --- 2. CHAT ENGINE & LEARNING ---
    async function handleMessage() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;

      if (!currentChatId) currentChatId = Date.now();

      document.getElementById('hero-section').classList.add('hidden');
      document.getElementById('chat-history').classList.remove('hidden');
      document.getElementById('chat-history').style.display = 'flex';
      document.getElementById('chat-history').style.flexDirection = 'column';
      
      addBubble('user', text);
      input.value = '';
      document.getElementById('status-text').innerText = "Doa is thinking...";

      try {
        const res = await fetch(CLOUDFLARE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const data = await res.json();
        // FAILSAFE JSON PATH: handles .response or .result.response
        const aiText = data.response || (data.result ? data.result.response : null) || "Neural Link fuzzy!";
        
        addBubble('doa', aiText);
        speak(aiText);
      } catch (error) { addBubble('doa', "Neural Link fuzzy!"); }
      finally { document.getElementById('status-text').innerText = ""; }
    }

    function addBubble(role, text) {
      const h = document.getElementById('chat-history');
      const d = document.createElement('div');
      d.className = `flex ${role==='user'?'justify-end':'justify-start'} w-full chat-bubble`;
      d.innerHTML = `<div class="${role==='user'?'bg-black text-white':'bg-gray-100'} p-4 rounded-3xl max-w-[85%] text-sm my-1 shadow-sm leading-relaxed">${text}</div>`;
      h.appendChild(d); h.scrollTop = h.scrollHeight;

      // History Persistence
      const chat = chatHistoryData.find(c => c.id === currentChatId);
      if(chat) {
          chat.messages.push({ role, text });
      } else {
          chatHistoryData.unshift({ id: currentChatId, title: text.substring(0,20)+"...", messages: [{role, text}] });
      }
      localStorage.setItem('doa_history', JSON.stringify(chatHistoryData));
      renderHistory();
    }

    function loadChat(id) {
        const chat = chatHistoryData.find(i => i.id === id);
        if(!chat) return;
        currentChatId = id;
        document.getElementById('hero-section').classList.add('hidden');
        const h = document.getElementById('chat-history');
        h.classList.remove('hidden');
        h.style.display = 'flex';
        h.innerHTML = "";
        chat.messages.forEach(m => {
            const d = document.createElement('div');
            d.className = `flex ${m.role==='user'?'justify-end':'justify-start'} w-full`;
            d.innerHTML = `<div class="${m.role==='user'?'bg-black text-white':'bg-gray-100'} p-4 rounded-3xl max-w-[85%] text-sm my-1 shadow-sm">${m.text}</div>`;
            h.appendChild(d);
        });
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = chatHistoryData.map(i => `
            <div class="flex justify-between group p-2 rounded-lg hover:bg-gray-50 transition ${currentChatId === i.id ? 'bg-gray-50' : ''}">
                <p onclick="loadChat(${i.id})" class="text-[11px] text-gray-400 font-bold truncate cursor-pointer hover:text-black flex-1">${i.title}</p>
                <button onclick="deleteHistory(${i.id})" class="opacity-0 group-hover:opacity-100 text-red-400 text-xs px-1">✕</button>
            </div>
        `).join('');
    }

    function deleteHistory(id) {
        chatHistoryData = chatHistoryData.filter(i => i.id !== id);
        localStorage.setItem('doa_history', JSON.stringify(chatHistoryData));
        if(currentChatId === id) startNewChat();
        renderHistory();
    }

    function startNewChat() {
        currentChatId = null;
        document.getElementById('chat-history').innerHTML = "";
        document.getElementById('chat-history').classList.add('hidden');
        document.getElementById('hero-section').classList.remove('hidden');
        renderHistory();
    }

    // --- 3. UI UTILS ---
    function toggleSidebar() { 
      const sb = document.getElementById('main-sidebar');
      const btn = document.getElementById('open-sidebar-btn');
      sb.classList.toggle('collapsed');
      if(sb.classList.contains('collapsed')) btn.classList.remove('hidden');
      else btn.classList.add('hidden');
    }

    function toggleVoice() {
        voiceActive = !voiceActive; localStorage.setItem('voice_active', voiceActive);
        updateVoiceUI();
        if (voiceActive) speak("Live voice active. My name is doaa.");
    }

    function updateVoiceUI() {
      const knob = document.getElementById('voice-knob');
      const bg = document.getElementById('voice-switch');
      if(knob && bg) {
        knob.style.left = voiceActive ? "18px" : "2px";
        bg.style.backgroundColor = voiceActive ? "#00E676" : "#f3f4f6";
      }
    }

    function switchView(view) {
      document.querySelectorAll('.view-container').forEach(el => el.classList.add('hidden'));
      document.getElementById(view + '-view').classList.remove('hidden');
    }

    document.getElementById('user-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleMessage(); }
    });

    window.onload = () => { renderHistory(); updateVoiceUI(); };
  </script>
</body>
</html>
