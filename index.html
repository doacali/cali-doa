<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cali Doa | Intelligent Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #FBFBFB; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .sidebar-item { transition: all 0.2s ease; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px; font-weight: 600; color: #9ca3af; }
        .sidebar-item:hover { background-color: #f3f4f6; color: #121212; }
        .sidebar-active { background: #121212 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .hero-heading { font-size: clamp(2.2rem, 5vw, 3.8rem); line-height: 1.05; letter-spacing: -0.05em; font-weight: 800; }
        #notification { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #121212; color: #00E676; padding: 12px 24px; border-radius: 50px; font-weight: bold; font-size: 13px; z-index: 9999; transition: all 0.3s ease; opacity: 0; pointer-events: none; }
        #notification.show { opacity: 1; bottom: 40px; }
        .chat-bubble { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="flex h-screen w-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-white border-r border-gray-100 flex flex-col h-full shrink-0">
            <div class="p-6"><h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer">DOA CALI</h1></div>
            <div class="px-4 mb-4"><input class="w-full bg-gray-50 border border-gray-100 rounded-xl py-2 pl-4 text-[11px] font-bold outline-none uppercase tracking-widest" placeholder="SEARCH..."></div>
            <nav class="flex-1 px-4 space-y-1 overflow-y-auto hide-scrollbar">
                <p class="text-[10px] font-extrabold text-gray-300 uppercase tracking-[0.2em] px-2 mb-2">Main</p>
                <button onclick="location.reload()" class="w-full text-left flex items-center gap-3 p-3 sidebar-active shadow-lg shadow-black/10">💬 <span class="text-sm font-bold">Chat With Doa</span></button>
                <button class="sidebar-item text-gray-400">📅 Calendar</button>
                <button class="sidebar-item text-gray-400">📱 Doa Apps</button>
                <p class="text-[10px] font-extrabold text-gray-300 uppercase tracking-[0.2em] px-2 mt-8 mb-2">Workspace</p>
                <button class="sidebar-item text-gray-400">⚡ Code Builder</button>
                <button class="sidebar-item text-gray-400 flex justify-between">📂 Saved Tabs <span>⌄</span></button>
            </nav>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
            <header id="main-header" class="w-full p-5 flex justify-end items-center gap-8 text-[11px] font-black uppercase tracking-[0.2em] text-gray-400 shrink-0">
                <button onclick="login()" class="hover:text-black">Login</button>
                <button onclick="signUp()" class="text-black bg-[#00E676] px-4 py-2 rounded-lg shadow-sm">Sign Up</button>
            </header>

            <div class="flex-1 w-full flex flex-col items-center justify-start px-10 overflow-hidden">
                <div id="hero-section" class="text-center mt-12 mb-8">
                    <h1 class="hero-heading mb-4">What can <span class="text-[#00E676]">Doa</span> <br> do for you?</h1>
                    <p class="text-gray-400 text-base md:text-lg font-medium">Your intelligent companion for thinking, building, and creating.</p>
                </div>
                <div id="chat-history" class="w-full max-w-3xl flex-1 overflow-y-auto space-y-4 py-4 hidden"></div>

                <div class="w-full max-w-2xl px-4 shrink-0 pb-6">
                    <div id="suggestion-container" class="flex flex-wrap justify-center gap-2 mb-6 min-h-[40px]">
                        <button class="px-4 py-2 bg-white border rounded-full text-xs font-bold hover:border-green-500 transition">Analyze YouTube</button>
                        <button class="px-4 py-2 bg-white border rounded-full text-xs font-bold hover:border-green-500 transition">Learn Spanish</button>
                        <button class="px-4 py-2 bg-white border rounded-full text-xs font-bold hover:border-green-500 transition">Build App</button>
                    </div>
                    <div class="bg-white border shadow-xl rounded-[24px] p-2 flex items-center">
                        <input id="user-input" class="flex-1 p-3 outline-none text-[14px]" placeholder="Ask Doa anything...">
                        <button id="send-btn" class="bg-black text-white w-9 h-9 rounded-full">→</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- RIGHT PANEL -->
        <aside class="w-72 bg-[#F9F9F9] border-l p-6 flex flex-col shrink-0">
            <div class="w-full aspect-[4/5] bg-white border rounded-3xl mb-6 flex items-center justify-center text-gray-300">AD SPACE</div>
            <div class="bg-white p-6 rounded-3xl border text-center">
                <h3 class="font-black italic uppercase">Skip Ads</h3>
                <button class="w-full bg-black text-white py-3 mt-4 rounded-xl font-bold text-xs">Go Pro</button>
            </div>
        </aside>
    </div>
    
    <div id="notification"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://dfsmqnwnqnkbpoeeqkvv.supabase.co';
        const SUPABASE_KEY = 'YOUR_KEY_HERE'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleMessage() {
            const input = document.getElementById('user-input');
            if(!input.value) return;
            document.getElementById('hero-section').style.display = 'none';
            document.getElementById('chat-history').classList.remove('hidden');
            const d = document.createElement('div');
            d.className = "flex justify-end my-4";
            d.innerHTML = `<div class="bg-black text-white p-4 rounded-2xl">${input.value}</div>`;
            document.getElementById('chat-history').appendChild(d);
            input.value = "";
        }
        document.getElementById('send-btn').onclick = handleMessage;
    </script>
</body>
</html>
