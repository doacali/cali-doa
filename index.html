<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doa | AI Operating System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #ffffff; color: #111827; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .os-scrollbar::-webkit-scrollbar { width: 4px; }
    .os-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .os-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    .os-scrollbar::-webkit-scrollbar-thumb:hover { background: #00E676; }

    #main-sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 260px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 60; background: white; border-right: 1px solid #f3f4f6; transform: translateX(0); }
    #main-sidebar.closed { transform: translateX(-100%); }
    main { transition: padding-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding-left: 260px; }
    #main-sidebar.closed ~ main { padding-left: 0; }

    .sidebar-item { transition: all 0.2s; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 12px; font-weight: 700; color: #9ca3af; font-size: 13px; border: none; background: transparent; text-align: left; }
    .sidebar-active { background: #111111 !important; color: white !important; }
    
    #chat-history { display: flex; flex-direction: column; overflow-y: auto; scroll-behavior: smooth; width: 100%; max-width: 42rem; margin: 0 auto; padding-bottom: 20px; }
    .chat-bubble { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    
    .bubble-action-btn { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #9ca3af; letter-spacing: 0.5px; transition: 0.2s; cursor: pointer; background: transparent; border: none; }
    #menu-btn { position: absolute; top: 20px; left: 20px; z-index: 50; transition: 0.2s; opacity: 0; pointer-events: none; }
    #menu-btn.show { opacity: 1; pointer-events: auto; }

    .win-calendar-card { width: 380px; background: #ffffff; border: 1px solid #f3f4f6; border-radius: 40px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.03); }
    .cal-day { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: 0.2s; font-size: 14px; font-weight: 600; color: #374151; position: relative; }
    .cal-day:hover { background: #f3f4f6; }
    .cal-day.past-date { opacity: 0.3; color: #9ca3af; }
    .cal-day.today { background: #00E676 !important; color: #000 !important; font-weight: 800; opacity: 1 !important; }
    .cal-day.selected { border: 2px solid #00E676; }
    .day-speak { position: absolute; top: -2px; right: -2px; width: 14px; height: 14px; background: #00E676; border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 7px; color: black; opacity: 0.8; }

    .left-os-panel { width: 340px; border-right: 1px solid #f9fafb; background: #ffffff; padding: 40px 30px; display: flex; flex-direction: column; height: 100%; }
    .right-os-panel { width: 360px; border-left: 1px solid #f9fafb; background: #ffffff; padding: 40px 30px; display: flex; flex-direction: column; height: 100%; }
  </style>
</head>
<body class="bg-white">

  <div class="flex h-screen w-screen overflow-hidden relative">
    <aside id="main-sidebar" class="flex flex-col h-full shrink-0">
      <div class="p-6 flex items-center justify-between">
        <h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer" onclick="location.reload()">DOA CALI</h1>
        <button onclick="toggleSidebar()" class="text-gray-300 text-[10px] font-bold uppercase tracking-widest hover:text-black">Hide</button>
      </div>
      <nav class="flex-1 px-4 space-y-1">
        <button onclick="startNewChat()" class="sidebar-item hover:bg-gray-50 mb-4 text-black border border-gray-100 transition-all active:scale-95 w-full">+ New Chat</button>
        <button onclick="switchView('chat')" id="btn-chat" class="sidebar-item w-full">💬 Chat With Doa</button>
        <button onclick="switchView('calendar')" id="btn-calendar" class="sidebar-item w-full">📅 Calendar</button>
        <button onclick="switchView('apps')" id="btn-apps" class="sidebar-item w-full">📱 App Factory</button>
      </nav>
      <div class="p-6 text-center border-t border-gray-50"><span class="text-[10px] text-gray-200 font-bold uppercase">OS Engine v4.0</span></div>
    </aside>

    <button id="menu-btn" onclick="toggleSidebar()" class="bg-white border border-gray-100 shadow-md p-3 rounded-2xl flex items-center gap-3 hover:bg-gray-50 active:scale-95 transition-all">
        <span class="text-[#00E676] font-black italic tracking-tighter text-sm uppercase">Doa</span>
        <div class="flex flex-col gap-[3px]"><div class="w-4 h-[2px] bg-gray-400 rounded-full"></div><div class="w-4 h-[2px] bg-gray-400 rounded-full"></div><div class="w-4 h-[2px] bg-gray-400 rounded-full"></div></div>
    </button>

    <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
      <header class="w-full px-8 py-5 flex justify-end items-center gap-8 text-[11px] font-black uppercase text-gray-400">
        <button class="hover:text-black">Login</button>
        <button class="text-black bg-[#00E676] px-5 py-2 rounded-xl font-bold ml-4 hover:shadow-lg active:scale-95 transition-all">Sign Up</button>
      </header>

      <div id="chat-view" class="view-container flex-1 w-full flex flex-col items-center px-10 overflow-hidden">
        <div id="chat-shell" class="w-full max-w-2xl flex flex-col h-full justify-center">
          <div id="chat-history" class="hidden hide-scrollbar py-6"></div>
          <div id="center-group" class="flex flex-col w-full">
            <div id="hero-section" class="text-center">
                <h1 class="text-6xl font-black mb-10 tracking-tighter leading-none">How can <span class="text-[#00E676]">Doa</span><br>help you?</h1>
            </div>
            <div id="input-area" class="w-full bg-white pb-10">
                <div class="flex justify-between items-center mb-3 px-4">
                  <p id="status-text" class="text-[9px] font-black text-gray-300 uppercase tracking-widest"></p>
                  <div class="flex items-center gap-3">
                    <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Live Voice</span>
                    <div id="voice-switch" onclick="toggleVoice()" class="w-8 h-4 bg-gray-100 rounded-full relative cursor-pointer"><div id="voice-knob" class="absolute left-0.5 top-0.5 w-3 h-3 bg-white rounded-full transition-all"></div></div>
                  </div>
                </div>
                <div class="bg-white border border-gray-100 shadow-[0_20px_50px_rgba(0,0,0,0.05)] rounded-[32px] p-3 flex items-center mx-2">
                  <textarea id="user-input" rows="1" class="flex-1 px-5 outline-none text-sm resize-none hide-scrollbar py-2" placeholder="Ask Doa anything..."></textarea>
                  <button onclick="handleMessage()" class="bg-black text-white w-12 h-12 rounded-full font-bold ml-2 hover:bg-gray-800 transition-all flex items-center justify-center">→</button>
                </div>
            </div>
          </div>
        </div>
      </div>

      <div id="calendar-view" class="view-container hidden flex-1 flex flex-row overflow-hidden h-full">
        <div class="left-os-panel">
            <h2 class="text-2xl font-black uppercase tracking-tighter mb-1" id="month-name-label">Month</h2>
            <p class="text-[10px] font-bold text-gray-400 uppercase mb-8 tracking-widest">Upcoming highlights</p>
            <div id="month-summary-list" class="flex-1 space-y-6 overflow-y-auto os-scrollbar pr-2"></div>
        </div>
        <div class="flex-1 flex flex-col items-center justify-center pb-20">
            <div class="win-calendar-card">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-xl font-black uppercase tracking-tighter" id="cal-main-title">May 2026</h1>
                    <div class="flex gap-4">
                        <button onclick="changeMonth(-1)" class="text-gray-300 hover:text-[#00E676] font-bold">↑</button>
                        <button onclick="changeMonth(1)" class="text-gray-300 hover:text-[#00E676] font-bold">↓</button>
                    </div>
                </div>
                <div class="grid grid-cols-7 gap-2 text-center text-[10px] font-black text-gray-300 uppercase mb-4">
                    <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
            </div>
        </div>
        <div class="right-os-panel">
            <h2 id="selected-date-header" class="text-2xl font-black uppercase tracking-tighter mb-6">Today</h2>
            <div id="day-events-list" class="flex-1 space-y-6 overflow-y-auto os-scrollbar pr-2 mb-6"></div>
            <div class="mt-auto space-y-3 pt-6 border-t border-gray-50">
                <input id="quick-add-input" type="text" placeholder="Quick add event..." class="w-full text-sm p-4 outline-none bg-gray-50 border border-transparent focus:border-[#00E676] rounded-2xl transition-all">
                <button onclick="quickAddEvent()" class="w-full text-[11px] font-black uppercase bg-[#00E676] text-black p-4 rounded-2xl shadow-lg active:scale-95 transition-all">Save Event</button>
            </div>
        </div>
      </div>
      <div id="apps-view" class="view-container hidden flex-1 p-10 overflow-y-auto"><h1 class="text-4xl font-black">📱 App Factory</h1></div>
    </main>
  </div>

  <script>
    // --- SETTINGS & STATE ---
    const AI_URL = "https://text.pollinations.ai/";
    let voiceActive = JSON.parse(localStorage.getItem('voice_active')) || false;
    let chatMemory = JSON.parse(localStorage.getItem('doa_chat_cache')) || []; 
    let messageRegistry = []; 
    let events = JSON.parse(localStorage.getItem('doa_events')) || [];
    let isThinking = false;
    let viewDate = new Date(), selectedDate = new Date();

    // --- VOICE ENGINE ---
    function getVoiceForLang(langCode) {
      const v = window.speechSynthesis.getVoices();
      return v.find(x => x.lang === langCode) || v.find(x => x.lang.startsWith(langCode.substring(0,2)));
    }

    function speak(text, lang = 'en-US') {
      if (!voiceActive || !text) return;
      window.speechSynthesis.cancel();
      const clean = text.replace(/\[ACTION:.*?\]/g, "").replace(/\[LANG:.*?\]/g, "").replace(/https?:\/\/\S+/g, "").replace(/\bDoa\b/gi, "Doaa").replace(/[*#`_~]/g, "").trim();
      const u = new SpeechSynthesisUtterance(clean);
      u.lang = lang;
      const voice = getVoiceForLang(lang);
      if (voice) u.voice = voice;
      u.pitch = 1.3; u.rate = 1.0;
      window.speechSynthesis.speak(u);
    }

    // --- SEARCH ENGINE ---
    async function fetchWiki(query) {
      try {
        const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&prop=extracts&exintro&explaintext&redirects=1&titles=${encodeURIComponent(query)}`);
        const data = await res.json();
        const pages = data.query.pages;
        const id = Object.keys(pages)[0];
        return id === "-1" ? "No results found." : pages[id].extract.substring(0, 1000);
      } catch(e) { return "Search failed."; }
    }

    // --- AI & MESSAGE HANDLING ---
    async function handleMessage(injection = null) {
      if (isThinking) return;
      window.speechSynthesis.cancel();
      const input = document.getElementById('user-input');
      const text = injection || input.value.trim();
      if (!text) return;

      if (!injection) {
        setChatMode(true);
        addMessage('user', text);
        input.value = '';
      }

      isThinking = true;
      document.getElementById('status-text').innerText = injection ? "Doa is reading web..." : "Doa is thinking...";

      try {
        const sys = `You are Doa, a sleek AI OS. 
        1. For factual info, reply ONLY: [ACTION: SEARCH_WIKI: topic]
        2. To add events: [ACTION: ADD_EVENT: title, YYYY-MM-DD]
        3. For languages: [LANG: code] (e.g. uk-UA)
        Context: ${new Date().toLocaleString()}`;

        const response = await fetch(AI_URL + encodeURIComponent(text), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [{role: "system", content: sys}, ...chatMemory.slice(-6), {role: "user", content: text}]
          })
        });

        const raw = await response.text();

        // 1. Check Search
        if (raw.includes('[ACTION: SEARCH_WIKI:')) {
          const match = raw.match(/\[ACTION: SEARCH_WIKI:\s*([^\]]+)\]/);
          if (match) {
            const result = await fetchWiki(match[1]);
            isThinking = false;
            return handleMessage(`SOURCE WIKIPEDIA: ${result}. Summarize this.`);
          }
        }

        // 2. Process Actions
        processActions(raw);

        // 3. Lang Detection
        const langMatch = raw.match(/\[LANG:\s*([^\]]+)\]/);
        const lang = langMatch ? langMatch[1].trim() : 'en-US';

        // 4. Display
        const clean = raw.replace(/\[ACTION:[^\]]*\]/g, "").replace(/\[LANG:[^\]]*\]/g, "").trim();
        addMessage('doa', clean);
        speak(clean, lang);

        chatMemory.push({role: "user", content: text}, {role: "assistant", content: raw});
        localStorage.setItem('doa_chat_cache', JSON.stringify(chatMemory));

      } catch(e) { addMessage('doa', "System Error."); }
      finally { isThinking = false; document.getElementById('status-text').innerText = ""; }
    }

    function processActions(text) {
      const regex = /\[ACTION:\s*([^:\]]+):([^|\]]+)\]/g;
      let m;
      while ((m = regex.exec(text)) !== null) {
        const cmd = m[1].trim().toUpperCase();
        const val = m[2].trim();
        if (cmd === 'ADD_EVENT') {
          const p = val.split(',');
          if(p.length >= 2) {
            events.push({title: p[0].trim(), date: new Date(p[1].trim()).toDateString()});
            localStorage.setItem('doa_events', JSON.stringify(events));
            renderCalendar();
          }
        } else if (cmd === 'OPEN_TAB') switchView(val.toLowerCase());
      }
    }

    function addMessage(sender, text) {
      const hist = document.getElementById('chat-history');
      const clean = text.replace(/\[ACTION:.*?\]/g, "").replace(/\[LANG:.*?\]/g, "");
      if(!clean) return;
      const idx = messageRegistry.push(clean) - 1;
      const row = document.createElement('div');
      row.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full chat-bubble mb-6 px-2`;
      row.innerHTML = `<div class="max-w-[85%] group"><div class="${sender === 'user' ? 'bg-black text-white' : 'bg-gray-100 text-gray-900'} p-4 rounded-3xl text-sm whitespace-pre-wrap shadow-sm">${clean}</div>${sender === 'doa' ? `<div class="flex gap-4 mt-2 px-1"><button class="bubble-action-btn" onclick="speak(messageRegistry[${idx}])">🔊 Speak</button><button class="bubble-action-btn" onclick="navigator.clipboard.writeText(messageRegistry[${idx}])">📋 Copy</button></div>`:''}</div>`;
      hist.appendChild(row); hist.scrollTop = hist.scrollHeight;
    }

    // --- CALENDAR LOGIC ---
    function renderCalendar() {
      const grid = document.getElementById('calendar-grid'), title = document.getElementById('cal-main-title'), monthLbl = document.getElementById('month-name-label');
      grid.innerHTML = '';
      const m = viewDate.getMonth(), y = viewDate.getFullYear();
      title.innerText = viewDate.toLocaleString('default', { month: 'long', year: 'numeric' });
      monthLbl.innerText = viewDate.toLocaleString('default', { month: 'long' });
      const first = new Date(y, m, 1).getDay(), total = new Date(y, m + 1, 0).getDate();
      const startOffset = first === 0 ? 6 : first - 1;
      for (let i = 0; i < startOffset; i++) grid.appendChild(document.createElement('div')).className = 'cal-day opacity-0';
      for (let d = 1; d <= total; d++) {
        const date = new Date(y, m, d);
        const el = document.createElement('div');
        el.className = `cal-day ${date < new Date().setHours(0,0,0,0) ? 'past-date' : ''} ${date.toDateString() === new Date().toDateString() ? 'today' : ''}`;
        el.innerText = d;
        const dayEvents = events.filter(e => e.date === date.toDateString());
        if(dayEvents.length > 0) {
          const s = document.createElement('div'); s.className = 'day-speak'; s.innerText = '🔊';
          s.onclick = (e) => { e.stopPropagation(); speak(`On ${date.toDateString()}, you have: ` + dayEvents.map(ev => ev.title).join(', ')); };
          el.appendChild(s);
        }
        el.onclick = () => { selectedDate = date; renderCalendar(); };
        grid.appendChild(el);
      }
      updateSidePanels();
    }

    function updateSidePanels() {
      const listR = document.getElementById('day-events-list'), listL = document.getElementById('month-summary-list'), headR = document.getElementById('selected-date-header');
      listR.innerHTML = ''; listL.innerHTML = '';
      headR.innerText = selectedDate.toLocaleDateString('default', { month: 'short', day: 'numeric' });
      
      events.filter(e => e.date === selectedDate.toDateString()).forEach(e => {
        const d = document.createElement('div'); d.className = "flex items-start gap-4";
        d.innerHTML = `<div class="w-1 h-6 bg-[#00E676] rounded-full mt-1"></div><p class="text-sm font-bold text-gray-800">${e.title}</p>`;
        listR.appendChild(d);
      });

      events.filter(e => new Date(e.date).getMonth() === viewDate.getMonth()).sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(e => {
        const d = document.createElement('div'); d.className = "text-[12px] font-bold text-gray-700";
        d.innerHTML = `<span class="text-[#00E676] mr-2">${new Date(e.date).getDate()}</span> ${e.title}`;
        listL.appendChild(d);
      });
    }

    // --- UI WRAPPERS ---
    function toggleVoice() { voiceActive = !voiceActive; localStorage.setItem('voice_active', voiceActive); updateVoiceUI(); if(voiceActive) speak("Voice ready."); }
    function updateVoiceUI() { const k = document.getElementById('voice-knob'), b = document.getElementById('voice-switch'); if(k&&b){ k.style.left = voiceActive ? "18px" : "2px"; b.style.backgroundColor = voiceActive ? "#00E676" : "#f3f4f6"; } }
    function toggleSidebar() { document.getElementById('main-sidebar').classList.toggle('closed'); }
    function switchView(v) {
      document.querySelectorAll('.view-container').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('sidebar-active'));
      document.getElementById(v + '-view').classList.remove('hidden');
      if(document.getElementById('btn-'+v)) document.getElementById('btn-'+v).classList.add('sidebar-active');
      if(v === 'calendar') renderCalendar();
    }
    function startNewChat() { chatMemory = []; messageRegistry = []; localStorage.removeItem('doa_chat_cache'); document.getElementById('chat-history').innerHTML = ''; setChatMode(false); switchView('chat'); }
    function setChatMode(a) { document.getElementById('hero-section').style.display = a ? 'none' : 'block'; document.getElementById('chat-history').classList.toggle('hidden', !a); }
    function quickAddEvent() { const i = document.getElementById('quick-add-input'); if(i.value){ events.push({title:i.value, date:selectedDate.toDateString()}); localStorage.setItem('doa_events', JSON.stringify(events)); i.value=''; renderCalendar(); } }
    function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); renderCalendar(); }

    window.onload = () => {
      updateVoiceUI();
      window.speechSynthesis.getVoices();
      if(chatMemory.length > 0) { 
        setChatMode(true); 
        chatMemory.forEach(m => addMessage(m.role==='user'?'user':'doa', m.content));
      }
      switchView('chat');
    };
    document.getElementById('user-input').onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); handleMessage(); } };
  </script>
</body>
</html>
