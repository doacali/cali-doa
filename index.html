<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cali Doa | Intelligent Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #FBFBFB; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .sidebar-item { transition: all 0.2s ease; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; padding: 12px; font-weight: 600; color: #9ca3af; }
        .sidebar-item:hover { background-color: #f3f4f6; color: #121212; }
        .sidebar-active { background: #121212 !important; color: white !important; }
        .hero-heading { font-size: clamp(2.2rem, 5vw, 3.8rem); line-height: 1.05; letter-spacing: -0.05em; font-weight: 800; }
        #notification { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #121212; color: #00E676; padding: 12px 24px; border-radius: 50px; font-weight: bold; font-size: 13px; z-index: 9999; transition: all 0.3s ease; opacity: 0; pointer-events: none; }
        #notification.show { opacity: 1; bottom: 40px; }
        .chat-bubble { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="flex h-screen w-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-white border-r border-gray-100 flex flex-col h-full shrink-0">
            <div class="p-6"><h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer">DOA CALI</h1></div>
            <div class="px-4 mb-4"><input class="w-full bg-gray-50 border border-gray-100 rounded-xl py-2 pl-4 text-[11px] font-bold outline-none uppercase tracking-widest" placeholder="SEARCH..."></div>
            <nav class="flex-1 px-4 space-y-1 overflow-y-auto hide-scrollbar">
                <p class="text-[10px] font-extrabold text-gray-300 uppercase tracking-[0.2em] px-2 mb-2">Main Hub</p>
                <button onclick="location.reload()" class="sidebar-item sidebar-active">💬 <span>Chat With Doa</span></button>
                <button class="sidebar-item text-gray-400">📅 <span>Calendar</span></button>
                <button class="sidebar-item text-gray-400">📱 <span>Doa Apps</span></button>
                <p class="text-[10px] font-extrabold text-gray-300 uppercase tracking-[0.2em] px-2 mt-8 mb-2">Workspace</p>
                <button class="sidebar-item text-gray-400">⚡ <span>Code Builder</span></button>
                <button class="sidebar-item text-gray-400">📂 <span>Saved Tabs</span></button>
            </nav>
        </aside>

        <!-- MAIN WORKSPACE -->
        <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
            <header id="main-header" class="w-full p-5 flex justify-end items-center gap-8 text-[11px] font-black uppercase tracking-[0.2em] text-gray-400 shrink-0">
                <button class="hover:text-black transition-colors">Login</button>
                <button class="text-black bg-[#00E676] px-4 py-2 rounded-lg hover:bg-[#00c565] transition-all shadow-sm">Sign Up</button>
            </header>

            <div class="flex-1 w-full flex flex-col items-center justify-start px-10 overflow-hidden">
                <div id="hero-section" class="text-center mt-12 mb-8">
                    <h1 class="hero-heading mb-4">What can <span class="text-[#00E676]">Doa</span> <br> do for you?</h1>
                    <p class="text-gray-400 text-base md:text-lg font-medium max-w-2xl mx-auto leading-relaxed">Your intelligent companion for thinking, building, and creating.</p>
                </div>
                <div id="chat-history" class="w-full max-w-3xl flex-1 overflow-y-auto hide-scrollbar space-y-6 py-4 hidden"></div>

                <div class="w-full max-w-2xl px-4 shrink-0 pb-6">
                    <div id="suggestion-container" class="flex flex-wrap justify-center gap-2 mb-6 min-h-[40px]">
                        <button class="px-4 py-2.5 bg-white border border-gray-100 rounded-full text-[11px] font-bold shadow-sm hover:border-[#00E676] transition-all">Analyze YouTube</button>
                        <button class="px-4 py-2.5 bg-white border border-gray-100 rounded-full text-[11px] font-bold shadow-sm hover:border-[#00E676] transition-all">Learn Spanish</button>
                        <button class="px-4 py-2.5 bg-white border border-gray-100 rounded-full text-[11px] font-bold shadow-sm hover:border-[#00E676] transition-all">Build App</button>
                    </div>
                    <div class="bg-white border border-gray-200 shadow-[0_20px_50px_rgba(0,0,0,0.06)] rounded-[24px] p-2 flex items-center mb-2">
                        <button class="p-3 text-gray-300">+</button>
                        <input id="user-input" class="flex-1 p-2 outline-none text-[14px] font-medium" placeholder="Ask Doa anything...">
                        <button id="send-btn" class="bg-black text-white w-9 h-9 rounded-full →">→</button>
                    </div>
                </div>
            </div>

            <footer class="w-full py-4 px-8 border-t border-gray-50 flex flex-col md:flex-row justify-between items-center text-[8px] font-black text-gray-300 uppercase tracking-[0.3em] bg-white shrink-0">
                <div class="flex gap-8"><a href="#">Privacy Policy</a><a href="#">Terms of Service</a><a href="#">Affiliate</a></div>
                <div>© 2026 DOA CALI. ALL RIGHTS RESERVED.</div>
            </footer>
        </main>
    </div>

    <div id="notification"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // CONFIG
        const SUPABASE_URL = 'https://dfsmqnwnqnkbpoeeqkvv.supabase.co';
        const SUPABASE_KEY = 'YOUR_KEY_HERE';
        const CLOUDFLARE_URL = 'https://doa-brain-proxy.111222lov3.workers.dev';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // VOICE ENGINE (Fixed "Dowa" Pronunciation)
        function speak(text) {
            window.speechSynthesis.cancel();
            const cleanText = text.replace(/\bDoa\b/gi, "Dowa"); // Phonetic fix
            const u = new SpeechSynthesisUtterance(cleanText);
            const voices = window.speechSynthesis.getVoices();
            const pref = voices.find(v => v.name.includes("Female") || v.name.includes("Samantha"));
            if(pref) u.voice = pref;
            u.pitch = 1.2; u.rate = 0.95;
            window.speechSynthesis.speak(u);
        }

        // CHAT LOGIC
        async function handleMessage() {
            const input = document.getElementById('user-input');
            if(!input.value) return;
            document.getElementById('hero-section').classList.add('hidden');
            document.getElementById('chat-history').classList.remove('hidden');
            
            const msg = input.value;
            input.value = "";
            addMsg("user", msg);
            
            // Brain Call
            const res = await fetch(CLOUDFLARE_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: msg})
            });
            const data = await res.json();
            const aiMsg = data.candidates[0].content.parts[0].text;
            addMsg("doa", aiMsg);
            speak(aiMsg);
        }

        function addMsg(s, t) {
            const d = document.createElement('div');
            d.className = s === "user" ? "flex justify-end my-4" : "flex justify-start my-4";
            d.innerHTML = `<div class="${s === 'user' ? 'bg-black text-white' : 'bg-gray-100'} p-4 rounded-3xl max-w-md text-sm">${t.replace(/\bDoa\b/gi, "Doa")}</div>`;
            document.getElementById('chat-history').appendChild(d);
            document.getElementById('chat-history').scrollTop = document.getElementById('chat-history').scrollHeight;
        }

        document.getElementById('send-btn').onclick = handleMessage;
    </script>
</body>
</html>
