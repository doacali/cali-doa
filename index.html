<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cali Doa | AI Operating System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #ffffff; color: #111827; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    #main-sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 260px; transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1); z-index: 60; background: white; border-right: 1px solid #f3f4f6; }
    #main-sidebar.collapsed { transform: translateX(-100%); }
    .sidebar-item { transition: all 0.2s ease; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 12px; font-weight: 700; color: #9ca3af; font-size: 13px; margin-bottom: 4px; }
    .sidebar-item:hover { background-color: #f3f4f6; color: #111827; }
    .sidebar-active { background: #111111 !important; color: white !important; }
    
    /* FIX: Chat history container layout */
    #chat-history { 
      display: flex; 
      flex-direction: column; 
      gap: 16px; 
      padding: 20px 0;
      overflow-y: auto;
      scroll-behavior: smooth;
    }
    
    .chat-bubble { animation: fadeIn 0.2s ease-out forwards; max-width: 85%; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    
    .action-btn { font-size: 10px; color: #9ca3af; font-weight: 800; cursor: pointer; border: none; background: none; }
    #voice-switch { transition: background-color 0.3s; }
  </style>
</head>
<body class="bg-white">

  <div class="flex h-screen w-screen overflow-hidden">
    <!-- SIDEBAR -->
    <aside id="main-sidebar" class="flex flex-col h-full shrink-0 relative">
      <div class="p-6 flex items-center justify-between">
        <h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer" onclick="location.reload()">DOA CALI</h1>
        <button onclick="toggleSidebar()" class="text-gray-300 hover:text-black text-[9px] font-black uppercase tracking-widest">Hide</button>
      </div>
      <nav class="flex-1 px-4 space-y-1 overflow-y-auto hide-scrollbar">
        <button onclick="switchView('chat')" class="sidebar-item sidebar-active">💬 <span>Chat With Doa</span></button>
        <button onclick="askWeather()" class="sidebar-item">🌤️ <span>Check Weather</span></button>
        <button class="sidebar-item">📅 <span>Calendar</span> <span id="side-date" class="ml-auto bg-red-100 text-red-500 text-[10px] px-1.5 rounded font-black">--</span></button>
        <button onclick="switchView('apps')" class="sidebar-item">📱 <span>App Factory</span></button>
      </nav>
    </aside>

    <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
      <header class="w-full px-8 py-5 flex justify-end items-center gap-8 text-[11px] font-black uppercase text-gray-400 shrink-0">
        <button onclick="login()">Login</button>
        <button onclick="signUp()" class="text-black bg-[#00E676] px-5 py-2 rounded-xl font-bold ml-4">Sign Up</button>
      </header>

      <!-- CENTERED CHAT VIEW -->
      <div id="chat-view" class="view-container flex-1 w-full flex flex-col items-center justify-center px-10 relative overflow-hidden">
        <div id="chat-shell" class="w-full max-w-2xl flex flex-col h-full justify-center">
          
          <div id="hero-section" class="text-center py-10">
            <h1 class="text-6xl font-black mb-5 tracking-tighter leading-none">What can <span class="text-[#00E676]">Doa</span><br>do for you?</h1>
            <p class="text-gray-400 text-lg font-medium">Your intelligent companion.</p>
          </div>

          <div id="chat-history" class="hidden w-full overflow-y-auto hide-scrollbar"></div>

          <div id="input-area" class="w-full bg-white pt-4">
            <div id="suggestion-container" class="flex flex-wrap justify-center gap-2 mb-6 min-h-[40px]"></div>
            <div class="flex justify-between items-center mb-3 px-2">
              <p id="status-text" class="text-[9px] font-black text-gray-300 uppercase tracking-widest"></p>
              <div class="flex items-center gap-3">
                <span class="text-[9px] font-black text-gray-300 uppercase tracking-widest">Live Voice</span>
                <div id="voice-switch" onclick="toggleVoice()" class="w-8 h-4 bg-gray-100 rounded-full relative cursor-pointer">
                  <div id="voice-knob" class="absolute left-0.5 top-0.5 w-3 h-3 bg-white rounded-full shadow-sm"></div>
                </div>
              </div>
            </div>
            <div class="bg-white border border-gray-200 shadow-[0_20px_70px_rgba(0,0,0,0.08)] rounded-[24px] p-2.5 flex items-end gap-2">
              <textarea id="user-input" rows="1" class="flex-1 py-2 px-4 outline-none text-[14px] font-medium resize-none hide-scrollbar" placeholder="Ask Doaa anything..."></textarea>
              <button onclick="handleMessage()" class="shrink-0 bg-black text-white w-11 h-11 rounded-full shadow-lg font-bold">→</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const CLOUDFLARE_URL = 'https://doa-brain-proxy.111222lov3.workers.dev';
    const suggestionsPool = ["Weather in Sacramento", "Learn Spanish", "Build App", "Tell Story", "Crypto Stats"];

    let voiceActive = JSON.parse(localStorage.getItem('voice_active')) || false;
    let isThinking = false;
    let selectedVoice = null;
    let chatMemory = []; // 🚨 Handles conversation memory

    function loadVoices() {
      const v = window.speechSynthesis.getVoices();
      selectedVoice = v.find(v => v.name.includes("Samantha") || v.name.includes("Google US English Female") || v.name.includes("Aria") || v.name.includes("Female"));
    }
    window.speechSynthesis.onvoiceschanged = loadVoices; loadVoices();

    function speak(text) {
      if (!voiceActive || !text) return;
      window.speechSynthesis.cancel();
      const cleanText = String(text).replace(/\bDoa\b/gi, "Doaa").replace(/[*#`_~]/g, "").replace(/[^\x00-\x7F]/g, "").trim();
      const u = new SpeechSynthesisUtterance(cleanText);
      if (selectedVoice) u.voice = selectedVoice;
      u.pitch = 1.35; u.rate = 1.05; 
      window.speechSynthesis.speak(u);
    }

    async function handleMessage() {
      if (isThinking) return;
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;

      document.getElementById('hero-section').classList.add('hidden');
      document.getElementById('chat-history').classList.remove('hidden');
      document.getElementById('chat-history').style.display = 'flex';
      
      // 🚨 Capture real time and date from your computer
      const now = new Date();
      const localTime = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const localDate = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

      addMessage('user', text);
      input.value = '';
      isThinking = true;
      document.getElementById('status-text').innerText = "Doaa is syncing...";

      try {
        const res = await fetch(CLOUDFLARE_URL, { 
  method: 'POST', 
  headers: { 'Content-Type': 'application/json' }, 
  body: JSON.stringify({ 
    text: text, 
    localTime: localTime, 
    localDate: localDate, 
    history: chatMemory.slice(-6) 
  }) 
});
        const data = await res.json();
        
        addMessage('doaa', data.response);
        
        // Save to memory
        chatMemory.push({ role: 'user', content: text });
        chatMemory.push({ role: 'assistant', content: data.response });
        
        speak(data.response);
      } catch (error) { 
        addMessage('doaa', "Neural Link fuzzy! Check your Cloudflare Worker."); 
      } finally { 
        isThinking = false; 
        document.getElementById('status-text').innerText = ""; 
      }
    }

    function addMessage(sender, text) {
      const history = document.getElementById('chat-history');
      const row = document.createElement('div');
      row.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full chat-bubble mb-4`;
      
      let content = text.replace(/\*\*/g, ""); 
      const actions = sender === 'doaa' ? `<div class="flex gap-4 mt-2 px-1"><button class="action-btn" onclick="speak('${text.replace(/'/g, "\\'")}')">🔊 Speak</button><button class="action-btn text-red-500 font-bold" onclick="window.speechSynthesis.cancel()">🛑 Stop</button></div>` : '';
      
      row.innerHTML = `<div class="max-w-[85%]">
        <div class="${sender === 'user' ? 'bg-black text-white' : 'bg-gray-100 text-gray-900'} p-4 rounded-3xl text-sm whitespace-pre-wrap shadow-sm">
          ${content}
        </div>
        ${actions}
      </div>`;
      
      history.appendChild(row);
      history.scrollTop = history.scrollHeight;
    }

    function rotateSuggestions() {
        const cont = document.getElementById('suggestion-container');
        const shuffled = [...suggestionsPool].sort(() => Math.random() - 0.5).slice(0, 4);
        cont.innerHTML = shuffled.map(s => `<button class="px-4 py-2 bg-white border border-gray-100 rounded-full text-[10px] font-bold hover:border-[#00E676]" onclick="document.getElementById('user-input').value='${s}';handleMessage()">${s}</button>`).join('');
    }

    function toggleSidebar() { document.getElementById('main-sidebar').classList.toggle('collapsed'); }
    function toggleVoice() { voiceActive = !voiceActive; localStorage.setItem('voice_active', voiceActive); updateVoiceUI(); if (voiceActive) speak("Live voice active."); else window.speechSynthesis.cancel(); }
    function updateVoiceUI() { const knob = document.getElementById('voice-knob'); const bg = document.getElementById('voice-switch'); if(knob && bg) { knob.style.left = voiceActive ? "18px" : "2px"; bg.style.backgroundColor = voiceActive ? "#00E676" : "#f3f4f6"; } }
    function switchView(v) { document.querySelectorAll('.view-container').forEach(el => el.classList.add('hidden')); document.getElementById(v + '-view').classList.remove('hidden'); }
    
    document.getElementById('user-input').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleMessage(); } });
    
    window.onload = () => { 
        updateVoiceUI(); rotateSuggestions(); 
        document.getElementById('side-date').innerText = new Date().getDate();
    };
  </script>
</body>
</html>
