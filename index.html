<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doa | AI Operating System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #ffffff; color: #111827; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .os-scrollbar::-webkit-scrollbar { width: 6px; }
    .os-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    
    #main-sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 260px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 60; background: white; border-right: 1px solid #f3f4f6; }
    #main-sidebar.closed { transform: translateX(-100%); }
    main { transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); margin-left: 260px; }
    #main-sidebar.closed ~ main { margin-left: 0; }

    .win-calendar-card { width: 100%; max-width: 400px; background: #ffffff; padding: 32px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 8px; }
    .cal-day { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; font-size: 13px; font-weight: 600; position: relative; }
    .cal-day:hover { background: #f3f4f6; }
    .cal-day.today { background: #00E676 !important; color: #000 !important; font-weight: 800; }
    .cal-day.selected { border: 2px solid #00E676; }
    .os-panel { width: 340px; height: 100%; background: #ffffff; padding: 40px 30px; display: flex; flex-direction: column; flex-shrink: 0; }
  </style>
</head>
<body class="bg-white">

  <div class="flex h-screen w-screen overflow-hidden relative">
    <aside id="main-sidebar" class="flex flex-col h-full shrink-0">
      <div class="p-6 flex items-center justify-between"><h1 class="text-xl font-black text-[#00E676] italic uppercase">DOA CALI</h1></div>
      <nav class="flex-1 px-4 space-y-1">
        <button onclick="startNewChat()" class="sidebar-item p-3 font-bold text-black border border-gray-100 rounded-xl mb-4">+ New Chat</button>
        <button onclick="switchView('chat')" class="sidebar-item p-3 font-bold text-gray-400">💬 Chat</button>
        <button onclick="switchView('calendar')" class="sidebar-item p-3 font-bold text-gray-400">📅 Calendar</button>
      </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden">
      <!-- CALENDAR VIEW -->
      <div id="calendar-view" class="view-container hidden flex-1 flex flex-row h-full overflow-hidden">
        <div class="os-panel border-r border-gray-100">
            <h2 class="text-xl font-black uppercase mb-1">Highlights</h2>
            <div id="month-summary-list" class="flex-1 overflow-y-auto os-scrollbar space-y-4"></div>
        </div>
        <div class="flex-1 flex items-center justify-center bg-gray-50/10">
            <div class="win-calendar-card">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-xl font-black uppercase" id="cal-main-title">May 2026</h1>
                    <div class="flex gap-4"><button onclick="changeMonth(-1)">↑</button><button onclick="changeMonth(1)">↓</button></div>
                </div>
                <div class="grid grid-cols-7 gap-2 text-center text-[10px] font-black text-gray-400 uppercase mb-4">
                    <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
                </div>
                <div id="calendar-grid" class="cal-grid"></div>
            </div>
        </div>
        <div class="os-panel border-l border-gray-100">
            <h2 id="selected-date-header" class="text-xl font-black uppercase mb-6">Today</h2>
            <div id="day-events-list" class="flex-1 overflow-y-auto os-scrollbar space-y-4"></div>
            <div class="pt-6 border-t border-gray-50">
                <input id="quick-add-input" type="text" placeholder="Add event..." class="w-full text-sm p-4 bg-gray-50 rounded-2xl mb-2">
                <button onclick="quickAddEvent()" class="w-full text-[11px] font-black uppercase bg-[#00E676] py-4 rounded-2xl">Save Event</button>
            </div>
        </div>
      </div>
      
      <div id="chat-view" class="view-container flex-1 flex flex-col items-center justify-center p-10"><div id="chat-history" class="w-full max-w-2xl overflow-y-auto"></div></div>
    </main>
  </div>

  <script>
    let events = JSON.parse(localStorage.getItem('doa_events')) || [];
    let viewDate = new Date(), selectedDate = new Date();

    function renderCalendar() {
      const grid = document.getElementById('calendar-grid');
      const title = document.getElementById('cal-main-title');
      grid.innerHTML = '';
      const m = viewDate.getMonth(), y = viewDate.getFullYear();
      title.innerText = viewDate.toLocaleString('default', { month: 'long', year: 'numeric' });
      const firstDay = (new Date(y, m, 1).getDay() + 6) % 7; 
      const totalDays = new Date(y, m + 1, 0).getDate();
      for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
      for (let d = 1; d <= totalDays; d++) {
        const date = new Date(y, m, d);
        const el = document.createElement('div');
        el.className = 'cal-day'; el.innerText = d;
        if (date.toDateString() === new Date().toDateString()) el.classList.add('today');
        el.onclick = () => { selectedDate = date; renderCalendar(); updateRightPanel(date); };
        grid.appendChild(el);
      }
      updateRightPanel(selectedDate);
    }

    function updateRightPanel(date) {
        const list = document.getElementById('day-events-list');
        list.innerHTML = '';
        events.filter(e => new Date(e.date).toDateString() === date.toDateString()).forEach(e => {
            list.innerHTML += `<div class="p-3 bg-gray-50 rounded-lg text-xs font-bold">${e.title}</div>`;
        });
    }

    function quickAddEvent() {
      const input = document.getElementById('quick-add-input');
      if (!input.value) return;
      events.push({ title: input.value, date: selectedDate.toISOString() });
      localStorage.setItem('doa_events', JSON.stringify(events));
      input.value = '';
      renderCalendar();
    }

    function toggleSidebar() { document.getElementById('main-sidebar').classList.toggle('closed'); }
    function switchView(v) { 
        document.querySelectorAll('.view-container').forEach(el => el.classList.add('hidden')); 
        document.getElementById(v + '-view').classList.remove('hidden'); 
        if(v === 'calendar') renderCalendar();
    }
    window.onload = () => { renderCalendar(); switchView('chat'); };
  </script>
</body>
</html>
