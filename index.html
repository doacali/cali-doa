<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doa | AI Operating System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #ffffff; color: #111827; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    
    /* Layout */
    #main-sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 260px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 60; background: white; border-right: 1px solid #f3f4f6; }
    #main-sidebar.closed { transform: translateX(-100%); }
    main { transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); margin-left: 260px; }
    #main-sidebar.closed ~ main { margin-left: 0; }

    .sidebar-item { transition: all 0.2s; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 12px; font-weight: 700; color: #9ca3af; font-size: 13px; }
    .sidebar-active { background: #111111 !important; color: white !important; }
    
    /* Calendar Grid */
    .win-calendar-card { width: 380px; background: #ffffff; padding: 32px; }
    .cal-day { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: 0.2s; font-size: 14px; font-weight: 600; color: #374151; position: relative; }
    .cal-day:hover { background: #f3f4f6; }
    .cal-day.today { background: #00E676 !important; color: #000 !important; font-weight: 800; }
    .cal-day.selected { border: 2px solid #00E676; }
    
    /* Panels */
    .os-panel { width: 340px; height: 100%; background: #ffffff; padding: 40px 30px; display: flex; flex-direction: column; flex-shrink: 0; }
  </style>
</head>
<body class="bg-white">

  <div class="flex h-screen w-screen overflow-hidden relative">
    
    <aside id="main-sidebar" class="flex flex-col h-full shrink-0">
      <div class="p-6 flex items-center justify-between">
        <h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase">DOA CALI</h1>
        <button onclick="toggleSidebar()" class="text-gray-300 text-[10px] font-bold uppercase tracking-widest">Hide</button>
      </div>
      <nav class="flex-1 px-4 space-y-1">
        <button onclick="startNewChat()" class="sidebar-item mb-4 text-black border border-gray-100">+ New Chat</button>
        <button onclick="switchView('chat')" id="btn-chat" class="sidebar-item">💬 Chat</button>
        <button onclick="switchView('calendar')" id="btn-calendar" class="sidebar-item">📅 Calendar</button>
      </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden">
      <!-- CALENDAR VIEW -->
      <div id="calendar-view" class="view-container hidden flex-1 flex flex-row h-full overflow-hidden">
        
        <!-- Left Panel: Upcoming -->
        <div class="os-panel border-r border-gray-100">
            <h2 class="text-2xl font-black uppercase tracking-tighter mb-1" id="month-name-label">Month</h2>
            <p class="text-[10px] font-bold text-gray-400 uppercase mb-8">Highlights</p>
            <div id="month-summary-list" class="flex-1 overflow-y-auto space-y-4"></div>
        </div>

        <!-- Center: Grid -->
        <div class="flex-1 flex items-center justify-center">
            <div class="win-calendar-card">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-xl font-black uppercase tracking-tighter" id="cal-main-title">May 2026</h1>
                    <div class="flex gap-4">
                        <button onclick="changeMonth(-1)" class="font-bold">↑</button>
                        <button onclick="changeMonth(1)" class="font-bold">↓</button>
                    </div>
                </div>
                <div class="grid grid-cols-7 gap-2 text-center text-[10px] font-black text-gray-400 uppercase mb-4">
                    <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
            </div>
        </div>

        <!-- Right Panel: Schedule -->
        <div class="os-panel border-l border-gray-100">
            <h2 id="selected-date-header" class="text-2xl font-black uppercase tracking-tighter mb-1">Today</h2>
            <p class="text-[10px] font-bold text-gray-400 uppercase mb-8">OS Schedule</p>
            <div id="day-events-list" class="flex-1 overflow-y-auto space-y-4"></div>
            <div class="pt-6 border-t border-gray-50">
                <input id="quick-add-input" type="text" placeholder="Add event..." class="w-full text-sm p-4 bg-gray-50 rounded-2xl mb-2">
                <button onclick="quickAddEvent()" class="w-full text-[11px] font-black uppercase bg-[#00E676] py-4 rounded-2xl">Save Event</button>
            </div>
        </div>
      </div>
      
      <!-- Placeholder Chat/Apps Views -->
      <div id="chat-view" class="view-container flex-1 flex flex-col items-center justify-center p-10">
        <h1 class="text-6xl font-black">How can Doa help you?</h1>
        <div id="chat-history" class="w-full max-w-2xl overflow-y-auto"></div>
      </div>
      <div id="apps-view" class="view-container hidden flex-1 p-10"><h1>Apps</h1></div>
    </main>
  </div>

  <script>
    // ... (Your existing JavaScript logic for renderCalendar, handleMessage, etc.)
    // Note: ensure renderCalendar() and updateLeftPanel() / updateRightPanel() are called inside window.onload
    window.onload = () => { 
        renderCalendar();
        switchView(localStorage.getItem('doa_active_view') || 'chat');
    };
  </script>
</body>
</html>
