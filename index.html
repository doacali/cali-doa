<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cali Doa | AI Operating System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #ffffff; color: #111827; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    #main-sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 260px; transition: 0.28s; z-index: 60; background: white; border-right: 1px solid #f3f4f6; }
    #main-sidebar.collapsed { transform: translateX(-100%); }
    .sidebar-item { transition: all 0.2s; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 12px; font-weight: 700; color: #9ca3af; font-size: 13px; }
    .sidebar-active { background: #111111 !important; color: white !important; }
    #chat-history { display: flex; flex-direction: column; overflow-y: auto; scroll-behavior: smooth; flex: 1; }
    .chat-bubble { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    #voice-switch { transition: background-color 0.3s; }
    .action-btn { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
  </style>
</head>
<body class="bg-white">

  <div class="flex h-screen w-screen overflow-hidden">
    <aside id="main-sidebar" class="flex flex-col h-full shrink-0 relative">
      <div class="p-6 flex items-center justify-between">
        <h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer" onclick="location.reload()">DOA CALI</h1>
        <button onclick="toggleSidebar()" class="text-gray-300 text-[9px] font-black uppercase">Hide</button>
      </div>
      <nav class="flex-1 px-4 space-y-1 overflow-y-auto hide-scrollbar">
        <button onclick="switchView('chat')" class="sidebar-item sidebar-active">💬 Chat With Doa</button>
        <button class="sidebar-item">📅 Calendar</button>
        <button onclick="switchView('apps')" class="sidebar-item">📱 App Factory</button>
      </nav>
    </aside>

    <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
      <header class="w-full px-8 py-5 flex justify-end items-center gap-8 text-[11px] font-black uppercase text-gray-400">
        <button>Login</button>
        <button class="text-black bg-[#00E676] px-5 py-2 rounded-xl font-bold ml-4">Sign Up</button>
      </header>

      <div id="chat-view" class="view-container flex-1 w-full flex flex-col items-center justify-center px-10 overflow-hidden">
        <div id="chat-shell" class="w-full max-w-2xl flex flex-col h-full justify-center">
          
          <div id="hero-section" class="text-center py-10">
            <h1 class="text-6xl font-black mb-5 tracking-tighter leading-none">How can <span class="text-[#00E676]">Doa</span><br>help you?</h1>
          </div>

          <div id="chat-history" class="hidden hide-scrollbar py-6"></div>

          <div class="w-full bg-white pt-4 pb-8">
            <div class="flex justify-between items-center mb-3 px-2">
              <p id="status-text" class="text-[9px] font-black text-gray-300 uppercase tracking-widest"></p>
              <div class="flex items-center gap-3">
                <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Live Voice</span>
                <div id="voice-switch" onclick="toggleVoice()" class="w-8 h-4 bg-gray-100 rounded-full relative cursor-pointer">
                  <div id="voice-knob" class="absolute left-0.5 top-0.5 w-3 h-3 bg-white rounded-full shadow-sm transition-all"></div>
                </div>
              </div>
            </div>
            <div class="bg-white border border-gray-200 shadow-xl rounded-[24px] p-2.5 flex items-center">
              <textarea id="user-input" rows="1" class="flex-1 px-4 outline-none text-sm resize-none hide-scrollbar" placeholder="Ask Doaa anything..."></textarea>
              <button onclick="handleMessage()" class="bg-black text-white w-10 h-10 rounded-full font-bold ml-2">→</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const CLOUDFLARE_URL = 'https://doa-brain-proxy.111222lov3.workers.dev';
    
    let voiceActive = JSON.parse(localStorage.getItem('voice_active')) || false;
    let isThinking = false;
    let chatMemory = []; 
    let selectedVoice = null;

    // ─── DOUGHA VOICE ENGINE (ENHANCED MULTI-LANG) ───
    function loadVoices() {
      const voices = window.speechSynthesis.getVoices();
    }

    function detectLang(text) {
      if (/[\u3040-\u30ff\u3400-\u9fbf]/.test(text)) return "ja-JP"; // Japanese
      if (/[\u0400-\u04FF]/.test(text)) return "uk-UA";             // Ukrainian
      if (/[ñáéíóú¿¡]/i.test(text)) return "es-ES";                // Spanish
      if (/[\u0600-\u06FF]/.test(text)) return "ar-SA";             // Arabic
      return "en-US";
    }

    function pickFemaleVoice(voiceList, lang = "en-US") {
      const femaleNames = [
        "Samantha", "Kyoko", "Nanami", "Microsoft Aria", "Microsoft Jenny", "Google US English Female",
        "Karen", "Moira", "Victoria", "Ava", "Zira"
      ];

      let match = voiceList.find(v => v.lang.startsWith(lang.split('-')[0]) && 
                  femaleNames.some(name => v.name.includes(name)));
      
      if (!match) match = voiceList.find(v => v.lang.startsWith(lang.split('-')[0]));
      
      return match || voiceList[0] || null;
    }

    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function speak(text) {
      if (!voiceActive || !text) return;
      window.speechSynthesis.cancel();

      const cleanText = String(text)
        .replace(/\bDowa\b/gi, "Doaa")
        .replace(/\bDoa\b/gi, "Doaa")
        .replace(/([a-zA-Z])\1{2,}/g, "$1")
        .replace(/[*#`_~]/g, "")
        .replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, "");

      const lang = detectLang(cleanText);
      const u = new SpeechSynthesisUtterance(cleanText);
      
      const voices = window.speechSynthesis.getVoices();
      u.voice = pickFemaleVoice(voices, lang);
      u.lang = lang;

      if (lang === "en-US") {
        u.pitch = 1.35;
        u.rate = 0.95;
      } else {
        u.pitch = 1.0; 
        u.rate = 1.0;
      }
      
      u.volume = 1.0;

      u.onstart = () => {
        const interval = setInterval(() => {
          if (!window.speechSynthesis.speaking) {
            clearInterval(interval);
          } else {
            window.speechSynthesis.pause();
            window.speechSynthesis.resume();
          }
        }, 10000);
      };

      window.speechSynthesis.speak(u);
    }

    function toggleVoice() {
      voiceActive = !voiceActive;
      localStorage.setItem('voice_active', JSON.stringify(voiceActive));
      updateVoiceUI();
      if (voiceActive) speak("Live voice active. My name is Doaa.");
    }

    async function handleMessage() {
      window.speechSynthesis.cancel();
      if (isThinking) return;
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;

      document.getElementById('hero-section').classList.add('hidden');
      document.getElementById('chat-history').classList.remove('hidden');
      document.getElementById('chat-history').style.display = 'flex';
      
      addMessage('user', text);
      input.value = '';
      isThinking = true;
      document.getElementById('status-text').innerText = "Doaa is thinking...";

      try {
        const res = await fetch(CLOUDFLARE_URL, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' }, 
          body: JSON.stringify({ 
            text: text, 
            // ─── UPDATED MULTI-LINGUAL INSTRUCTION ───
            systemInstruction: "Your name is Cali Doa. You are a multi-lingual AI. Respond ONLY in the language the user speaks to you. If they speak Japanese, use Japanese characters (Hiragana/Kanji), NOT Romaji. Do not provide English translations unless asked. NEVER mention the user's location, city, or IP address (e.g. Rocklin). Keep responses concise.",
            history: chatMemory.slice(-6) 
          }) 
        });
        const data = await res.json();
        
        addMessage('doaa', data.response);
        chatMemory.push({ role: 'user', content: text });
        chatMemory.push({ role: 'assistant', content: data.response });
        
        speak(data.response);
      } catch (error) { 
        addMessage('doaa', "System link error."); 
      } finally { 
        isThinking = false; 
        document.getElementById('status-text').innerText = ""; 
      }
    }

    function addMessage(sender, text) {
      const history = document.getElementById('chat-history');
      const row = document.createElement('div');
      row.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full chat-bubble mb-4`;
      let cleanText = text.replace(/[*#`_~]/g, "");
      row.innerHTML = `<div class="max-w-[85%]">
        <div class="${sender === 'user' ? 'bg-black text-white' : 'bg-gray-100 text-gray-900'} p-4 rounded-3xl text-sm whitespace-pre-wrap shadow-sm">
          ${cleanText}
        </div>
        ${sender === 'doaa' ? `
          <div class="flex gap-4 mt-2 px-1">
            <button class="action-btn text-gray-400 hover:text-black" onclick="speak('${text.replace(/'/g, "\\'")}')">🔊 Speak</button>
            <button class="action-btn text-red-500" onclick="window.speechSynthesis.cancel()">🛑 Stop</button>
          </div>` : ''}
      </div>`;
      history.appendChild(row);
      history.scrollTop = history.scrollHeight;
    }

    function toggleSidebar() { 
      window.speechSynthesis.cancel();
      document.getElementById('main-sidebar').classList.toggle('collapsed'); 
    }

    function switchView(v) { 
      window.speechSynthesis.cancel();
      document.querySelectorAll('.view-container').forEach(el => el.classList.add('hidden')); 
      if(document.getElementById(v + '-view')) document.getElementById(v + '-view').classList.remove('hidden'); 
    }

    function updateVoiceUI() { 
      const knob = document.getElementById('voice-knob'); 
      const bg = document.getElementById('voice-switch'); 
      if(knob && bg) { 
        knob.style.left = voiceActive ? "18px" : "2px"; 
        bg.style.backgroundColor = voiceActive ? "#00E676" : "#f3f4f6"; 
      } 
    }

    document.getElementById('user-input').addEventListener('keydown', (e) => { 
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleMessage(); } 
    });
    
    window.onload = () => { 
      updateVoiceUI(); 
      loadVoices();
    };
  </script>
</body>
</html>
