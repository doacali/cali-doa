<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cali Doa | Intelligent Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #FBFBFB; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .sidebar-item { transition: all 0.2s ease; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px; font-weight: 600; color: #9ca3af; }
        .sidebar-item:hover { background-color: #f3f4f6; color: #121212; }
        .sidebar-active { background: #121212 !important; color: white !important; }
        .hero-heading { font-size: clamp(2.2rem, 5vw, 3.8rem); line-height: 1.05; letter-spacing: -0.05em; font-weight: 800; }
        #notification { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #121212; color: #00E676; padding: 12px 24px; border-radius: 50px; font-weight: bold; font-size: 13px; z-index: 9999; transition: all 0.3s ease; opacity: 0; pointer-events: none; }
        #notification.show { opacity: 1; bottom: 40px; }
    </style>
</head>
<body>
    <div class="flex h-screen w-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-white border-r border-gray-100 flex flex-col h-full shrink-0">
            <div class="p-6"><h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase">DOA CALI</h1></div>
            <nav class="flex-1 px-4 space-y-1">
                <button onclick="location.reload()" class="sidebar-item sidebar-active">💬 Chat With Doa</button>
                <button class="sidebar-item">📅 Calendar</button>
                <button class="sidebar-item">📱 Doa Apps</button>
                <button class="sidebar-item">⚡ Code Builder</button>
            </nav>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 flex flex-col bg-white h-full relative">
            <header id="main-header" class="p-5 flex justify-end gap-6 text-[11px] font-black uppercase tracking-[0.2em] text-gray-400">
                <button onclick="login()" class="hover:text-black">Login</button>
                <button onclick="signUp()" class="text-black bg-[#00E676] px-4 py-2 rounded-lg">Sign Up</button>
            </header>

            <div class="flex-1 flex flex-col items-center justify-start px-10">
                <div id="hero-section" class="text-center mt-12 mb-8">
                    <h1 class="hero-heading mb-4">What can <span class="text-[#00E676]">Doa</span> <br> do for you?</h1>
                    <p class="text-gray-400 text-base font-medium">Your intelligent companion.</p>
                </div>
                <div id="chat-history" class="w-full max-w-2xl flex-1 overflow-y-auto space-y-4 hidden"></div>
                <div class="w-full max-w-2xl pb-10">
                    <div id="suggestion-container" class="flex flex-wrap justify-center gap-2 mb-6">
                        <button class="px-4 py-2 bg-white border rounded-full text-xs font-bold">Analyze YouTube</button>
                        <button class="px-4 py-2 bg-white border rounded-full text-xs font-bold">Learn Spanish</button>
                    </div>
                    <div class="bg-white border shadow-xl rounded-[24px] p-2 flex items-center">
                        <input id="user-input" class="flex-1 p-3 outline-none" placeholder="Message Doa...">
                        <button id="send-btn" class="bg-black text-white w-9 h-9 rounded-full">→</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="notification"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://dfsmqnwnqnkbpoeeqkvv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmc21xbnducW5rYnBvZWVxa3Z2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNDYwNDksImV4cCI6MjA5MjkyMjA0OX0.AEFsq60miF5NQr9jcdiY13V65SgcYq9wDlKFEL3HORo';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleMessage() {
            const input = document.getElementById('user-input');
            const text = input.value;
            if(!text) return;
            document.getElementById('hero-section').style.display = 'none';
            document.getElementById('chat-history').classList.remove('hidden');
            const d = document.createElement('div');
            d.className = "flex justify-end my-4";
            d.innerHTML = `<div class="bg-black text-white p-4 rounded-3xl">${text}</div>`;
            document.getElementById('chat-history').appendChild(d);
            input.value = "";
        }

        async function login() { const e = prompt("Email:"), p = prompt("Password:"); await _supabase.auth.signInWithPassword({email:e, password:p}); window.location.reload(); }
        async function signUp() { const e = prompt("Email:"), p = prompt("Password:"); await _supabase.auth.signUp({email:e, password:p}); alert("Check email!"); }
        document.getElementById('send-btn').onclick = handleMessage;
    </script>
</body>
</html>
