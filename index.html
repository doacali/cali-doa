<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cali Doa | Intelligent Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #FBFBFB; }
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; color: #9ca3af; font-weight: 600; }
        .sidebar-item:hover { background-color: #f3f4f6; color: #121212; }
        .sidebar-active { background: #121212 !important; color: white !important; }
        .hero-heading { font-size: clamp(2rem, 4vw, 3.5rem); line-height: 1.1; letter-spacing: -0.05em; font-weight: 800; }
        #notification { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #121212; color: #00E676; padding: 12px 24px; border-radius: 50px; font-weight: bold; font-size: 13px; z-index: 9999; opacity: 0; transition: all 0.3s; pointer-events: none; }
        #notification.show { opacity: 1; bottom: 40px; }
    </style>
</head>
<body class="text-gray-900">

    <div class="flex h-screen w-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-white border-r border-gray-100 flex flex-col shrink-0">
            <div class="p-6"><h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase">DOA CALI</h1></div>
            <nav class="flex-1 px-4 space-y-1">
                <button id="nav-chat" class="w-full sidebar-item sidebar-active">💬 Chat With Doa</button>
                <button id="nav-cal" class="w-full sidebar-item text-gray-400">📅 Calendar</button>
                <button id="nav-apps" class="w-full sidebar-item text-gray-400">📱 Doa Apps</button>
                <button id="nav-code" class="w-full sidebar-item text-gray-400">⚡ Code Builder</button>
            </nav>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
            <header class="p-6 flex justify-end gap-6 text-[10px] font-black uppercase tracking-[0.2em] text-gray-400">
                <button class="hover:text-black">Login</button>
                <button class="text-black bg-[#00E676] px-4 py-2 rounded-lg">Sign Up</button>
            </header>

            <div class="flex-1 flex flex-col items-center justify-center p-10">
                <div class="text-center mb-12">
                    <h1 class="hero-heading mb-4">What can <span class="text-[#00E676]">Doa</span> <br> do for you?</h1>
                    <p class="text-gray-400 text-lg font-medium">Your intelligent companion.</p>
                </div>
                
                <div class="w-full max-w-2xl">
                    <div class="flex flex-wrap justify-center gap-2 mb-8">
                        <button class="px-5 py-2.5 bg-white border border-gray-100 rounded-full text-xs font-bold shadow-sm hover:border-green-500 transition">Analyze YouTube</button>
                        <button class="px-5 py-2.5 bg-white border border-gray-100 rounded-full text-xs font-bold hover:border-green-500 transition">Learn Spanish</button>
                        <button class="px-5 py-2.5 bg-white border border-gray-100 rounded-full text-xs font-bold hover:border-green-500 transition">Build App</button>
                    </div>
                    <div class="bg-white border shadow-xl rounded-[24px] p-2 flex items-center">
                        <input id="user-input" class="flex-1 p-4 outline-none text-sm" placeholder="Message Doa...">
                        <button id="send-btn" class="bg-black text-white w-10 h-10 rounded-full">→</button>
                    </div>
                </div>
            </div>
            
            <footer class="p-6 border-t text-[8px] font-bold text-gray-300 uppercase tracking-widest text-center">
                © 2026 DOA CALI. ALL RIGHTS RESERVED.
            </footer>
        </main>

        <!-- AD PANEL -->
        <aside class="w-72 bg-[#F9F9F9] border-l p-6 flex flex-col shrink-0">
            <div class="w-full aspect-[4/5] bg-white border rounded-3xl flex items-center justify-center text-gray-300 mb-6">AD SPACE</div>
            <div class="bg-white p-6 rounded-3xl border text-center">
                <h3 class="font-black italic uppercase">Skip Ads</h3>
                <button class="w-full mt-4 bg-black text-white py-3 rounded-xl font-bold text-xs">Go Pro</button>
            </div>
        </aside>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // --- MASTER CONFIG ---
        const SUPABASE_URL = 'https://dfsmqnwnqnkbpoeeqkvv.supabase.co';
        const SUPABASE_KEY = 'YOUR_KEY_HERE';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- CORE FUNCTIONS ---
        document.getElementById('send-btn').onclick = () => alert("Chat functionality connecting...");
        // Add all your previous JS logic here...
    </script>
</body>
</html>
