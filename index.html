<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cali Doa | AI Operating System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #FBFBFB; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        #main-sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 260px; }
        #main-sidebar.collapsed { width: 0; padding: 0; border: none; overflow: hidden; opacity: 0; }
        .sidebar-item { transition: all 0.2s ease; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px; font-weight: 600; color: #9ca3af; font-size: 13px; }
        .sidebar-item:hover { background-color: #f3f4f6; color: #121212; }
        .sidebar-active { background: #121212 !important; color: white !important; }
        .chat-bubble { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #ticker-wrap { white-space: nowrap; overflow: hidden; position: fixed; bottom: 0; width: 100%; background: #000; padding: 8px 0; z-index: 1000; border-top: 1px solid #111; }
        #ticker-content { display: inline-block; animation: marquee 40s linear infinite; font-size: 9px; font-weight: 900; text-transform: uppercase; color: #444; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        #voice-switch { transition: background-color 0.3s; }
        #voice-knob { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-gray-900">

    <button id="open-sidebar-btn" onclick="toggleSidebar()" class="hidden fixed top-6 left-6 z-[100] bg-white border border-gray-100 p-2.5 rounded-xl shadow-lg hover:scale-110 transition">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>

    <div class="flex h-screen w-screen overflow-hidden">
        <aside id="main-sidebar" class="bg-white border-r border-gray-100 flex flex-col h-full shrink-0 z-[60] relative">
            <div class="p-6 flex items-center justify-between">
                <h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer" onclick="startNewChat()">DOA CALI</h1>
                <button onclick="toggleSidebar()" class="text-gray-300 hover:text-black text-[9px] font-black uppercase">Hide</button>
            </div>
            <nav class="flex-1 px-4 space-y-1 overflow-y-auto hide-scrollbar">
                <p class="text-[10px] font-extrabold text-gray-300 uppercase tracking-[0.2em] px-2 mb-2">Main Hub</p>
                <button onclick="startNewChat(); switchView('chat')" class="sidebar-item sidebar-active">💬 <span>New Chat</span></button>
                <button onclick="switchView('apps')" class="sidebar-item">📱 <span>Doa Apps</span></button>
                <p class="text-[10px] font-extrabold text-gray-300 uppercase tracking-[0.2em] px-2 mt-10 mb-3">Recent Chats</p>
                <div id="history-list" class="space-y-1 px-1"></div>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
            <header class="w-full p-5 flex justify-end items-center gap-8 text-[11px] font-black uppercase tracking-[0.2em] text-gray-400 shrink-0">
                <div id="auth-zone" class="flex gap-4">
                    <button class="hover:text-black transition">Login</button>
                    <button class="text-black bg-[#00E676] px-5 py-2 rounded-lg shadow-sm font-bold hover:bg-[#00c565]">Sign Up</button>
                </div>
            </header>

            <div id="chat-view" class="view-container flex-1 w-full flex flex-col items-center justify-start px-10 overflow-hidden">
                <div id="hero-section" class="text-center mt-12 mb-8">
                    <h1 class="text-6xl font-black mb-4 tracking-tighter leading-none">What can <span class="text-[#00E676]">Doa</span> <br> do for you?</h1>
                    <p class="text-gray-400 text-lg font-medium max-w-2xl mx-auto text-center">Your intelligent companion for thinking, building, and creating.</p>
                </div>
                
                <div id="chat-history" class="w-full max-w-3xl flex-1 overflow-y-auto hide-scrollbar space-y-6 py-6 hidden"></div>
                
                <div class="w-full max-w-3xl px-4 shrink-0 pb-20">
                    <div class="bg-white border border-gray-200 shadow-[0_20px_50px_rgba(0,0,0,0.06)] rounded-[24px] p-2.5 flex items-center">
                        <button class="p-3 text-gray-300">+</button>
                        <input id="user-input" onkeydown="if(event.key==='Enter') handleMessage()" class="flex-1 p-2 outline-none text-[14px] font-medium" placeholder="Ask Doa anything...">
                        <button onclick="handleMessage()" class="bg-black text-white w-10 h-10 rounded-full shadow-lg hover:bg-[#00E676] transition-colors flex items-center justify-center">→</button>
                    </div>

                    <div class="flex justify-end items-center gap-3 pr-2 mt-4">
                        <span class="text-[9px] font-black text-gray-300 tracking-[0.2em] uppercase">Live Voice</span>
                        <div id="voice-switch" onclick="toggleVoice()" class="w-7 h-3.5 bg-gray-100 rounded-full relative cursor-pointer">
                            <div id="voice-knob" class="absolute left-0.5 top-0.5 w-2.5 h-2.5 bg-white rounded-full shadow-sm"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="apps-view" class="view-container hidden flex-1 w-full p-10 overflow-y-auto">
                <h2 class="text-4xl font-black italic mb-6 uppercase">App Factory</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6"><div class="bg-gray-50 p-10 rounded-3xl border border-gray-100">App Item</div></div>
            </div>

            <div id="ticker-wrap"><div id="ticker-content">Initializing Cali Doa World Feed... ● Local Response System Active ● No API Cost Mode Enabled ●</div></div>
        </main>
    </div>

    <script>
        // --- CONSTANTS & DATA ---
        const CLOUDFLARE_URL = 'https://doa-brain-proxy.111222lov3.workers.dev';
        let voiceActive = JSON.parse(localStorage.getItem('voice_active')) || false;
        let chatHistoryData = JSON.parse(localStorage.getItem('doa_history')) || [];
        let currentChatId = null;
        let lastResponses = []; // Anti-repetition queue

        const SIMPLE_INPUTS = ["hi","hey","hello","yo","sup","hi doa","hey doa","hello doa","good morning","good morning doa","morning","morning doa","good afternoon","good afternoon doa","afternoon","afternoon doa","good evening","good evening doa","evening","evening doa","good night","good night doa","you there","are you there","you around","are you around","whats up","what's up","whats up doa","what's up doa","how are you","how are you doing","how you doing","hows it going","how's it going","hows it going doa","how's it going doa","how are things","hows everything","how's everything","thanks","thank you","thanks doa","thank you doa","appreciate it","much appreciated"];

        const FIRST_RESPONSE_VARIANTS = [
            "hello — doing fantastic, how are you or how can I help you",
            "hey — doing great, how are you or what do you need",
            "hi — everything is exponentially good, how are you or how can I help",
            "good morning — doing fantastic, how are you or how can I help",
            "good afternoon — doing great, how are you or what do you need",
            "good evening — everything’s good, how are you or how can I help",
            "hello — doing fantastic, how are you or what can I do for you",
            "hey there — doing great, how are you or how can I assist",
            "hi there — everything’s good, how are you or what do you need",
            "hello — miraculously well, how are you or how can I help you",
            "hey — splendid, how are you or what can I help with",
            "hi — marvelous, how are you or what do you need",
            "hello — magnificent, how are you or how can I help you",
            "hey — sublime, how are you or what can I do for you",
            "hi — radiantly so, how are you or how can I assist",
            "hello — exuberant, how are you or what do you need",
            "hey — positively electric, how are you or how can I help",
            "hi — boundlessly brilliant, how are you or what can I do",
            "hello — majestically aligned, how are you or how can I help you",
            "hey — exquisitely executed, how are you or what do you need",
            "hi — resplendent, how are you or how can I assist",
            "hello — luxurious, how are you or what can I help with",
            "hey — spectacular, how are you or how can I help",
            "hi — enthralling, how are you or what do you need",
            "hello — doing great, how are you or how can I help",
            "hey — everything’s good, how are you or what do you need",
            "hi — doing well, how are you or how can I help",
            "hello — all good here, how are you or what can I do for you",
            "hey — smooth so far, how are you or how can I assist",
            "hi — steady, how are you or what do you need"
        ];

        const SIMPLE_RESPONSES = {
            presence: ["yeah, I’m here", "I’m here", "right here", "ready when you are", "go ahead"],
            casual: ["what’s up", "everything is exponentially good", "miraculously", "splendid", "marvelous"],
            time: ["good morning", "good afternoon", "good evening", "have a calm day", "have a harmonious day"],
            thanks: ["thank you vehemently", "thank you deeply", "thank you kindly", "much appreciated", "have a harmonious day"]
        };

        // --- CORE LOGIC ---

        function normalize(str) {
            return str.toLowerCase().replace(/[^\w\s]/g, "").replace(/\bdoa\b/g, "").trim();
        }

        function getLocalResponse(input, isFirst) {
            const clean = normalize(input);
            if (!SIMPLE_INPUTS.includes(clean) && !SIMPLE_INPUTS.includes(normalize(input))) return null;

            let pool = [];
            if (isFirst) {
                pool = FIRST_RESPONSE_VARIANTS;
            } else if (clean.includes("thank") || clean.includes("appreciate")) {
                pool = SIMPLE_RESPONSES.thanks;
            } else if (["morning", "afternoon", "evening", "night"].some(t => clean.includes(t))) {
                pool = SIMPLE_RESPONSES.time;
            } else if (clean.includes("there") || clean.includes("around")) {
                pool = SIMPLE_RESPONSES.presence;
            } else {
                pool = SIMPLE_RESPONSES.casual;
            }

            // Anti-repetition Reroll
            let choice;
            let attempts = 0;
            do {
                choice = pool[Math.floor(Math.random() * pool.length)];
                attempts++;
            } while (lastResponses.includes(choice) && attempts < 10);

            lastResponses.push(choice);
            if (lastResponses.length > 5) lastResponses.shift();
            return choice;
        }

        async function handleMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text) return;

            document.getElementById('hero-section').style.display = 'none';
            document.getElementById('chat-history').classList.remove('hidden');
            addBubble('user', text);
            input.value = "";

            let isFirst = (currentChatId === null);
            if (isFirst) {
                currentChatId = Date.now();
                chatHistoryData.unshift({ id: currentChatId, title: text.substring(0, 20), messages: [] });
            }
            
            const chat = chatHistoryData.find(c => c.id === currentChatId);
            chat.messages.push({ role: 'user', text: text });

            // 1. Check Local Brain
            const localReply = getLocalResponse(text, isFirst);
            
            if (localReply) {
                setTimeout(() => {
                    addBubble('doa', localReply);
                    speak(localReply);
                    chat.messages.push({ role: 'doa', text: localReply });
                    saveAndRender();
                }, 300);
            } else {
                // 2. Fallback to Gemini
                try {
                    const res = await fetch(CLOUDFLARE_URL, { 
                        method:'POST', 
                        headers: {'Content-Type': 'application/json'},
                        body:JSON.stringify({text:text}) 
                    });
                    const data = await res.json();
                    const aiText = data.candidates[0].content.parts[0].text;
                    addBubble('doa', aiText);
                    speak(aiText);
                    chat.messages.push({ role: 'doa', text: aiText });
                    saveAndRender();
                } catch(e) { addBubble('doa', "Connection fuzzy. Try again."); }
            }
        }

        // --- UI & UTILS ---
        function addBubble(role, t) {
            const h = document.getElementById('chat-history');
            const d = document.createElement('div');
            d.className = `flex ${role==='user'?'justify-end':'justify-start'} w-full chat-bubble`;
            d.innerHTML = `<div class="${role==='user'?'bg-black text-white':'bg-gray-100'} p-4 rounded-3xl max-w-md text-sm my-1 shadow-sm">${t}</div>`;
            h.appendChild(d); h.scrollTop = h.scrollHeight;
        }

        function saveAndRender() {
            localStorage.setItem('doa_history', JSON.stringify(chatHistoryData));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = chatHistoryData.map(i => `
                <div class="flex items-center justify-between group p-2 hover:bg-gray-50 rounded-lg transition ${currentChatId === i.id ? 'bg-gray-50' : ''}">
                    <p onclick="loadChat(${i.id})" class="text-[11px] font-bold truncate cursor-pointer hover:text-black flex-1 ${currentChatId === i.id ? 'text-black' : 'text-gray-400'}">${i.title}</p>
                    <button onclick="deleteHistory(${i.id}, event)" class="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-500 px-1">✕</button>
                </div>
            `).join('');
        }

        function loadChat(id) {
            currentChatId = id;
            const chat = chatHistoryData.find(c => c.id === id);
            document.getElementById('hero-section').style.display = 'none';
            const historyDiv = document.getElementById('chat-history');
            historyDiv.classList.remove('hidden');
            historyDiv.innerHTML = "";
            chat.messages.forEach(m => addBubble(m.role, m.text));
            switchView('chat');
            renderHistory();
        }

        function startNewChat() {
            currentChatId = null;
            document.getElementById('chat-history').innerHTML = "";
            document.getElementById('chat-history').classList.add('hidden');
            document.getElementById('hero-section').style.display = 'block';
            renderHistory();
        }

        function deleteHistory(id, e) {
            e.stopPropagation();
            chatHistoryData = chatHistoryData.filter(c => c.id !== id);
            if(currentChatId === id) startNewChat();
            saveAndRender();
        }

        function toggleSidebar() {
            const sb = document.getElementById('main-sidebar');
            const btn = document.getElementById('open-sidebar-btn');
            sb.classList.toggle('collapsed');
            btn.classList.toggle('hidden', !sb.classList.contains('collapsed'));
        }

        function switchView(v) {
            document.querySelectorAll('.view-container').forEach(el => el.classList.add('hidden'));
            document.getElementById(v + '-view').classList.remove('hidden');
        }

        // VOICE
        let voices = [];
        let selectedVoice = null;
        function loadVoices() {
            voices = window.speechSynthesis.getVoices();
            selectedVoice = voices.find(v => v.name.includes("Samantha") || v.name.includes("Aria") || v.name.includes("Google US English"));
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        function speak(text) {
            if (!voiceActive) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text.replace(/\bDoa\b/gi, "DOUGH-wah").replace(/[*#`_~]/g, ""));
            if (selectedVoice) u.voice = selectedVoice;
            u.rate = 0.95;
            window.speechSynthesis.speak(u);
        }
        function toggleVoice() {
            voiceActive = !voiceActive;
            localStorage.setItem('voice_active', voiceActive);
            updateVoiceUI();
        }
        function updateVoiceUI() {
            document.getElementById('voice-knob').style.left = voiceActive ? "16px" : "2px";
            document.getElementById('voice-switch').style.backgroundColor = voiceActive ? "#00E676" : "#f3f4f6";
        }

        window.onload = () => { loadVoices(); renderHistory(); updateVoiceUI(); };
    </script>
</body>
</html>
