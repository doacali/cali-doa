<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doa | AI Operating System</title>
    
    <!-- CSS & FONTS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #ffffff; color: #111827; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        #main-sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 260px; transition: 0.3s; z-index: 60; background: white; border-right: 1px solid #f3f4f6; }
        #main-sidebar.closed { transform: translateX(-100%); }
        main { transition: padding-left 0.3s; padding-left: 260px; }
        #main-sidebar.closed ~ main { padding-left: 0; }
        .sidebar-item { transition: 0.2s; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 12px; font-weight: 700; color: #9ca3af; font-size: 13px; }
        .sidebar-active { background: #111111 !important; color: white !important; }
        .chat-bubble { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .win-calendar-card { width: 380px; background: white; border: 1px solid #f3f4f6; border-radius: 40px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.03); }
        .cal-day { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; font-size: 14px; font-weight: 600; }
        .cal-day.today { background: #00E676; color: black; }
        .left-os-panel, .right-os-panel { width: 340px; padding: 40px 30px; border-right: 1px solid #f9fafb; height: 100%; }
        /* Voice Switch Knobs */
        #voice-knob { transition: all 0.2s; }
    </style>
</head>
<body>

<div class="flex h-screen w-screen overflow-hidden relative">
    <aside id="main-sidebar">
        <div class="p-6 flex items-center justify-between">
            <h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer">DOA CALI</h1>
            <button onclick="toggleSidebar()" class="text-gray-300 text-[10px] font-bold uppercase">Hide</button>
        </div>
        <nav class="flex-1 px-4 space-y-1">
            <button onclick="startNewChat()" class="sidebar-item border border-gray-100 mb-4">+ New Chat</button>
            <button onclick="switchView('chat')" id="btn-chat" class="sidebar-item sidebar-active">💬 Chat With Doa</button>
            <button onclick="switchView('calendar')" id="btn-calendar" class="sidebar-item">📅 Calendar</button>
            <button onclick="switchView('apps')" id="btn-apps" class="sidebar-item">📱 App Factory</button>
        </nav>
        <div class="p-6 text-center border-t border-gray-50"><span class="text-[10px] text-gray-300 font-bold uppercase">OS Engine v3.6</span></div>
    </aside>

    <main class="flex-1 flex flex-col bg-white relative">
        <header class="w-full px-8 py-5 flex justify-end items-center gap-8 text-[11px] font-black uppercase text-gray-400">
            <button>Login</button>
            <button class="text-black bg-[#00E676] px-5 py-2 rounded-xl font-bold">Sign Up</button>
        </header>

        <!-- CHAT VIEW -->
        <div id="chat-view" class="view-container flex-1 flex flex-col items-center px-10 overflow-hidden">
            <div id="chat-shell" class="w-full max-w-2xl flex flex-col h-full justify-center">
                <div id="chat-history" class="hidden hide-scrollbar py-6 overflow-y-auto"></div>
                
                <div id="center-group" class="flex flex-col w-full">
                    <div id="hero-section" class="text-center">
                        <h1 class="text-6xl font-black mb-10 tracking-tighter leading-none">How can <span class="text-[#00E676]">Doa</span><br>help you?</h1>
                    </div>

                    <div id="input-area" class="w-full pb-10">
                        <div class="flex justify-between items-center mb-3 px-4">
                            <div class="flex items-center gap-2">
                                <div id="brain-led" class="w-1.5 h-1.5 rounded-full bg-yellow-400 animate-pulse"></div>
                                <p id="status-text" class="text-[9px] font-black text-gray-300 uppercase italic">Linking Neural Bridge...</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-[9px] font-black text-gray-400 uppercase">Live Voice</span>
                                <div id="voice-switch" onclick="toggleVoice()" class="w-8 h-4 bg-gray-100 rounded-full relative cursor-pointer">
                                    <div id="voice-knob" class="absolute left-0.5 top-0.5 w-3 h-3 bg-white rounded-full"></div>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white border border-gray-100 shadow-[0_20px_50px_rgba(0,0,0,0.05)] rounded-[32px] p-3 flex items-center">
                            <textarea id="user-input" rows="1" class="flex-1 px-5 outline-none text-sm resize-none hide-scrollbar py-2" placeholder="Ask Doa anything..."></textarea>
                            <button onclick="handleMessage()" class="bg-black text-white w-12 h-12 rounded-full font-bold ml-2">→</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- CALENDAR VIEW -->
        <div id="calendar-view" class="view-container hidden flex-1 flex flex-row h-full">
            <div class="left-os-panel">
                <h2 class="text-2xl font-black uppercase mb-1" id="month-name-label">Month</h2>
                <div id="month-summary-list" class="space-y-4 overflow-y-auto"></div>
            </div>
            <div class="flex-1 flex flex-col items-center justify-center">
                <div class="win-calendar-card">
                    <h1 class="text-xl font-black uppercase mb-8" id="cal-main-title">Calendar</h1>
                    <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- 1. MODERN NEURAL ENGINE LOADER (V3) -->
<script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0-alpha.19';

    // State
    let generator = null;
    let voiceActive = JSON.parse(localStorage.getItem('voice_active')) || false;
    let chatMemory = [];
    let isThinking = false;

    // UI Elements
    const statusText = document.getElementById('status-text');
    const led = document.getElementById('brain-led');
    const history = document.getElementById('chat-history');
    const hero = document.getElementById('hero-section');

    async function init() {
        try {
            // Configure Environment for GitHub Pages
            env.allowLocalModels = false;
            env.useBrowserCache = true;

            // Load the small, high-quality Qwen2.5 model
            generator = await pipeline('text-generation', 'onnx-community/Qwen2.5-0.5B-Instruct', {
                device: navigator.gpu ? 'webgpu' : 'wasm',
                progress_callback: (info) => {
                    if (info.status === 'progress') {
                        statusText.innerText = `SYNCING BRAIN: ${Math.round(info.progress)}%`;
                    }
                }
            });

            statusText.innerText = "DOA ONLINE | PRIVATE";
            led.classList.replace('bg-yellow-400', 'bg-[#00E676]');
            led.classList.remove('animate-pulse');
            updateVoiceUI();
        } catch (err) {
            console.error(err);
            statusText.innerText = "HARDWARE DISCONNECTED. USE CHROME.";
            led.classList.replace('bg-yellow-400', 'bg-red-500');
        }
    }

    // Chat Handler
    window.handleMessage = async function() {
        if (isThinking || !generator) return;
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        // UI Update
        hero.style.display = 'none';
        history.classList.remove('hidden');
        addMessage('user', text);
        input.value = '';
        isThinking = true;
        statusText.innerText = "DOA IS THINKING...";

        try {
            const messages = [
                { role: 'system', content: 'You are Doaa, a helpful AI OS. No markdown.' },
                ...chatMemory,
                { role: 'user', content: text }
            ];

            const output = await generator(messages, { max_new_tokens: 120, temperature: 0.7 });
            const reply = output[0].generated_text.at(-1).content;

            addMessage('doa', reply);
            chatMemory.push({ role: 'user', content: text }, { role: 'assistant', content: reply });
            if (chatMemory.length > 10) chatMemory.shift();
            
            if (voiceActive) speak(reply);
        } catch (e) {
            addMessage('doa', "Neural Bridge Disrupted.");
        } finally {
            isThinking = false;
            statusText.innerText = "DOA ONLINE";
        }
    };

    function addMessage(sender, text) {
        const row = document.createElement('div');
        row.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full chat-bubble mb-6 px-2`;
        row.innerHTML = `<div class="max-w-[85%]"><div class="${sender === 'user' ? 'bg-black text-white' : 'bg-gray-100 text-gray-900'} p-4 rounded-3xl text-sm shadow-sm">${text}</div></div>`;
        history.appendChild(row);
        history.scrollTop = history.scrollHeight;
    }

    // Voice Engine
    function speak(text) {
        if (!voiceActive) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text.replace(/\bDoa\b/gi, "Doaa"));
        u.pitch = 1.35; u.rate = 0.95;
        window.speechSynthesis.speak(u);
    }

    window.toggleVoice = function() {
        voiceActive = !voiceActive;
        localStorage.setItem('voice_active', voiceActive);
        updateVoiceUI();
        if (voiceActive) speak("Voice active.");
    };

    function updateVoiceUI() {
        const knob = document.getElementById('voice-knob'), bg = document.getElementById('voice-switch');
        knob.style.left = voiceActive ? "18px" : "2px"; 
        bg.style.backgroundColor = voiceActive ? "#00E676" : "#f3f4f6";
    }

    // Sidebar & Navigation
    window.toggleSidebar = () => document.getElementById('main-sidebar').classList.toggle('closed');
    window.switchView = (v) => {
        document.querySelectorAll('.view-container').forEach(el => el.classList.add('hidden'));
        document.getElementById(v + '-view').classList.remove('hidden');
        toggleSidebar();
    };
    window.startNewChat = () => location.reload();

    // Listen for Enter
    document.getElementById('user-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleMessage(); }
    });

    init();
</script>
</body>
</html>
