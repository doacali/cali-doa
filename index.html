<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doa | AI Operating System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #ffffff; color: #111827; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .os-scrollbar::-webkit-scrollbar { width: 4px; }
    .os-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }

    /* Sidebar Physics - Leaves a 10px strip visible so it never fully disappears */
    #main-sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 260px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 60; background: white; border-right: 1px solid #f3f4f6; transform: translateX(0); }
    #main-sidebar.closed { transform: translateX(-250px); } 
    #main-sidebar.closed:hover { transform: translateX(-240px); }
    
    main { transition: padding-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding-left: 260px; }
    #main-sidebar.closed ~ main { padding-left: 10px; }

    .sidebar-item { transition: all 0.2s; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 12px; font-weight: 700; color: #9ca3af; font-size: 13px; }
    .sidebar-active { background: #111111 !important; color: white !important; }
    
    #chat-history { display: flex; flex-direction: column; overflow-y: auto; scroll-behavior: smooth; width: 100%; max-width: 42rem; margin: 0 auto; padding-bottom: 20px; }
    .chat-bubble { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    
    #menu-btn { position: absolute; top: 20px; left: 15px; z-index: 70; transition: 0.3s; opacity: 0; pointer-events: none; }
    #menu-btn.show { opacity: 1; pointer-events: auto; }

    /* Calendar Grid */
    .win-calendar-card { width: 380px; background: #ffffff; border: 1px solid #f3f4f6; border-radius: 40px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.03); }
    .cal-day { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: 0.2s; font-size: 14px; font-weight: 600; color: #374151; position: relative; }
    .cal-day:hover { background: #f3f4f6; }
    .cal-day.today { background: #00E676 !important; color: #000 !important; font-weight: 800; }
    .cal-day.selected { border: 2px solid #00E676; }
    
    .day-speak { position: absolute; top: -2px; right: -2px; width: 16px; height: 16px; background: #00E676; border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; color: black; cursor: pointer; z-index: 10; }

    .left-os-panel { width: 320px; border-right: 1px solid #f9fafb; background: #ffffff; padding: 40px 30px; display: flex; flex-direction: column; height: 100%; }
    .right-os-panel { width: 340px; border-left: 1px solid #f9fafb; background: #ffffff; padding: 40px 30px; display: flex; flex-direction: column; height: 100%; }
    
    .repeat-badge { font-size: 7px; background: #f3f4f6; padding: 2px 5px; border-radius: 4px; color: #9ca3af; text-transform: uppercase; font-weight: 800; margin-top: 2px; display: inline-block; }
  </style>
</head>
<body class="bg-white">

  <div class="flex h-screen w-screen overflow-hidden relative">
    
    <aside id="main-sidebar" class="flex flex-col h-full shrink-0">
      <div class="p-6 flex items-center justify-between">
        <h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer" onclick="location.reload()">DOA CALI</h1>
        <button onclick="toggleSidebar()" class="text-gray-300 text-[10px] font-bold uppercase tracking-widest hover:text-black">Hide</button>
      </div>
      <nav class="flex-1 px-4 space-y-1">
        <button onclick="startNewChat()" class="sidebar-item hover:bg-gray-50 mb-4 text-black border border-gray-100 transition-all">+ New Chat</button>
        <button onclick="switchView('chat')" id="btn-chat" class="sidebar-item">💬 Chat With Doa</button>
        <button onclick="switchView('calendar')" id="btn-calendar" class="sidebar-item">📅 Calendar</button>
      </nav>
      <div class="p-6 text-center border-t border-gray-50"><span class="text-[10px] text-gray-200 font-bold uppercase">OS Engine v3.8</span></div>
    </aside>

    <button id="menu-btn" onclick="toggleSidebar()" class="bg-white border border-gray-100 shadow-xl p-3 rounded-2xl flex items-center gap-3">
        <span class="text-[#00E676] font-black italic tracking-tighter text-sm uppercase">Doa</span>
    </button>

    <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
      <header class="w-full px-8 py-5 flex justify-end items-center gap-8 text-[11px] font-black uppercase text-gray-400">
        <button onclick="window.print()" class="hover:text-black">Print Agenda</button>
        <button onclick="localStorage.clear(); location.reload();" class="text-red-400 font-bold">Reset OS</button>
      </header>

      <!-- CHAT VIEW -->
      <div id="chat-view" class="view-container flex-1 w-full flex flex-col items-center px-10 overflow-hidden">
        <div id="chat-shell" class="w-full max-w-2xl flex flex-col h-full justify-center">
          <div id="chat-history" class="hidden hide-scrollbar py-6"></div>
          <div id="center-group" class="flex flex-col w-full">
            <div id="hero-section" class="text-center">
                <h1 class="text-6xl font-black mb-10 tracking-tighter leading-none">How can <span class="text-[#00E676]">Doa</span><br>help you?</h1>
            </div>
            <div id="input-area" class="w-full bg-white pb-10">
                <div class="flex justify-between items-center mb-3 px-4">
                  <p id="status-text" class="text-[9px] font-black text-gray-300 uppercase tracking-widest"></p>
                  <div class="flex items-center gap-3">
                    <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Voice</span>
                    <div id="voice-switch" onclick="toggleVoice()" class="w-8 h-4 bg-gray-100 rounded-full relative cursor-pointer"><div id="voice-knob" class="absolute left-0.5 top-0.5 w-3 h-3 bg-white rounded-full transition-all"></div></div>
                  </div>
                </div>
                <div class="bg-white border border-gray-100 shadow-[0_20px_50px_rgba(0,0,0,0.05)] rounded-[32px] p-3 flex items-center mx-2">
                  <textarea id="user-input" rows="1" class="flex-1 px-5 outline-none text-sm resize-none hide-scrollbar py-2" placeholder="Ask Doa anything..."></textarea>
                  <button onclick="handleMessage()" class="bg-black text-white w-12 h-12 rounded-full font-bold ml-2 transition-all flex items-center justify-center">→</button>
                </div>
            </div>
          </div>
        </div>
      </div>

      <!-- CALENDAR VIEW -->
      <div id="calendar-view" class="view-container hidden flex-1 flex flex-row overflow-hidden h-full">
        <div class="left-os-panel">
            <h2 class="text-2xl font-black uppercase tracking-tighter mb-1" id="month-name-label">Month</h2>
            <p class="text-[10px] font-bold text-gray-400 uppercase mb-8 tracking-widest">Next 14 Days</p>
            <div id="month-summary-list" class="flex-1 space-y-6 overflow-y-auto os-scrollbar pr-2"></div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center pb-20">
            <div class="win-calendar-card">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-xl font-black uppercase tracking-tighter" id="cal-main-title">May 2026</h1>
                    <div class="flex gap-4">
                        <button onclick="changeMonth(-1)" class="text-gray-300 hover:text-[#00E676] font-bold">↑</button>
                        <button onclick="changeMonth(1)" class="text-gray-300 hover:text-[#00E676] font-bold">↓</button>
                    </div>
                </div>
                <div class="grid grid-cols-7 gap-2 text-center text-[10px] font-black text-gray-300 uppercase mb-4">
                    <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
            </div>
        </div>

        <div class="right-os-panel">
            <h2 id="selected-date-header" class="text-2xl font-black uppercase tracking-tighter mb-6">Today</h2>
            <div id="day-events-list" class="flex-1 space-y-6 overflow-y-auto os-scrollbar pr-2 mb-6"></div>
            <div class="mt-auto space-y-3 pt-6 border-t border-gray-50">
                <input id="quick-add-input" type="text" placeholder="Add event..." class="w-full text-sm p-3 outline-none bg-gray-50 border border-transparent focus:border-[#00E676] rounded-xl transition-all">
                <div class="flex gap-2">
                    <select id="repeat-select" class="flex-1 text-[10px] font-black uppercase bg-gray-50 p-3 rounded-xl outline-none">
                        <option value="none">Once</option>
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="monthly">Monthly</option>
                        <option value="yearly">Yearly / Bday</option>
                    </select>
                    <button onclick="quickAddEvent()" class="bg-[#00E676] text-black text-[10px] font-black px-6 rounded-xl uppercase">Save</button>
                </div>
            </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const AI_URL = 'https://text.pollinations.ai/';
    let voiceActive = JSON.parse(localStorage.getItem('voice_active')) || false;
    let chatMemory = JSON.parse(localStorage.getItem('doa_chat_cache')) || []; 
    let events = JSON.parse(localStorage.getItem('doa_events')) || [];
    let isThinking = false, selectedVoice = null;
    let viewDate = new Date(), selectedDate = new Date();

    function loadVoices() {
      const v = window.speechSynthesis.getVoices();
      const n = ["Samantha", "Karen", "Victoria", "Google US English Female"];
      for (const i of n) { const m = v.find(x => x.name.includes(i)); if (m) { selectedVoice = m; break; } }
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    // Logic for Repeating Events
    function isEventOnDate(event, targetDate) {
        const evStart = new Date(event.date);
        evStart.setHours(0,0,0,0);
        const target = new Date(targetDate);
        target.setHours(0,0,0,0);

        if (target < evStart) return false;

        if (event.repeat === 'daily') return true;
        if (event.repeat === 'weekly') return evStart.getDay() === target.getDay();
        if (event.repeat === 'monthly') return evStart.getDate() === target.getDate();
        if (event.repeat === 'yearly') return evStart.getDate() === target.getDate() && evStart.getMonth() === target.getMonth();
        
        return evStart.toDateString() === target.toDateString();
    }

    function getEventsForDate(date) {
        return events.filter(e => isEventOnDate(e, date));
    }

    function renderCalendar() {
      const grid = document.getElementById('calendar-grid');
      const title = document.getElementById('cal-main-title');
      const monthLabel = document.getElementById('month-name-label');
      grid.innerHTML = '';
      
      const month = viewDate.getMonth(), year = viewDate.getFullYear();
      title.innerText = viewDate.toLocaleString('default', { month: 'long', year: 'numeric' });
      monthLabel.innerText = viewDate.toLocaleString('default', { month: 'long' });

      const firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
      const totalDays = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div')).className = 'cal-day opacity-0 pointer-events-none';

      for (let d = 1; d <= totalDays; d++) {
        const date = new Date(year, month, d);
        const el = document.createElement('div');
        el.className = 'cal-day';
        el.innerText = d;

        if (date.toDateString() === new Date().toDateString()) el.classList.add('today');
        if (date.toDateString() === selectedDate.toDateString()) el.classList.add('selected');
        
        const dayEvents = getEventsForDate(date);
        if (dayEvents.length > 0) {
            const speaker = document.createElement('div');
            speaker.className = 'day-speak';
            speaker.innerHTML = '🔊';
            speaker.onclick = (e) => {
                e.stopPropagation();
                speak(`Agenda for ${date.toDateString()}: ` + dayEvents.map(ev => ev.title).join(', '));
            };
            el.appendChild(speaker);
        }

        el.onclick = () => { selectedDate = new Date(date); renderCalendar(); };
        grid.appendChild(el);
      }
      updateRightPanel(selectedDate);
      updateLeftPanel();
    }

    function updateLeftPanel() {
        const list = document.getElementById('month-summary-list');
        list.innerHTML = '';
        let upcoming = [];
        for(let i=0; i<14; i++) {
            let d = new Date(); d.setDate(d.getDate() + i);
            getEventsForDate(d).forEach(e => upcoming.push({ ...e, occ: new Date(d) }));
        }

        if (!upcoming.length) list.innerHTML = `<p class="text-xs text-gray-300 italic">No upcoming events.</p>`;
        else upcoming.forEach(e => {
            const div = document.createElement('div');
            div.className = "flex items-start gap-4 group cursor-pointer hover:bg-gray-50 p-2 rounded-xl transition-all";
            div.innerHTML = `<div class="min-w-[35px] text-center"><span class="text-[9px] font-black text-[#00E676] block uppercase">${e.occ.toLocaleString('default',{month:'short'})}</span><span class="text-sm font-black">${e.occ.getDate()}</span></div><div class="flex-1"><p class="text-[13px] font-bold text-gray-800 leading-tight">${e.title}</p>${e.repeat!=='none'?`<span class="repeat-badge">${e.repeat}</span>`:''}</div><button onclick="deleteEvent('${e.id}')" class="opacity-0 group-hover:opacity-100 text-gray-200 hover:text-red-400">✕</button>`;
            div.onclick = (ev) => { if(ev.target.tagName !== 'BUTTON') { selectedDate = e.occ; viewDate = new Date(e.occ); renderCalendar(); } };
            list.appendChild(div);
        });
    }

    function updateRightPanel(date) {
        const list = document.getElementById('day-events-list');
        const header = document.getElementById('selected-date-header');
        list.innerHTML = '';
        header.innerText = date.toLocaleDateString('default', { month: 'short', day: 'numeric' });
        
        const dayEvents = getEventsForDate(date);
        if (!dayEvents.length) list.innerHTML = `<p class="text-xs text-gray-300 italic">Nothing scheduled.</p>`;
        else dayEvents.forEach(e => {
            const div = document.createElement('div');
            div.className = "flex items-start gap-4 group bg-gray-50 p-3 rounded-2xl";
            div.innerHTML = `<div class="w-1 h-8 bg-[#00E676] rounded-full"></div><div class="flex-1"><p class="text-sm font-bold text-gray-800 cursor-pointer" onclick="editEvent('${e.id}')">${e.title}</p>${e.repeat!=='none'?`<span class="repeat-badge">${e.repeat}</span>`:''}</div><div class="flex gap-2 opacity-0 group-hover:opacity-100"><button onclick="speak('${e.title}')" class="text-[#00E676] text-xs">🔊</button><button onclick="deleteEvent('${e.id}')" class="text-red-400 text-xs">✕</button></div>`;
            list.appendChild(div);
        });
    }

    function quickAddEvent() {
        const input = document.getElementById('quick-add-input'), repeat = document.getElementById('repeat-select').value;
        if (!input.value.trim()) return;
        events.push({ id: 'ev-'+Date.now(), title: input.value.trim(), date: selectedDate.toISOString(), repeat: repeat });
        localStorage.setItem('doa_events', JSON.stringify(events));
        input.value = ''; renderCalendar();
    }

    function deleteEvent(id) { events = events.filter(e => e.id !== id); localStorage.setItem('doa_events', JSON.stringify(events)); renderCalendar(); }
    function editEvent(id) { const ev = events.find(e => e.id === id); const nt = prompt("Edit Event:", ev.title); if(nt){ ev.title = nt; localStorage.setItem('doa_events', JSON.stringify(events)); renderCalendar(); } }
    function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); renderCalendar(); }

    async function handleMessage() {
      if (isThinking) return;
      const input = document.getElementById('user-input'), text = input.value.trim();
      if (!text) return;
      setChatMode(true); addMessage('user', text); input.value = '';
      isThinking = true; document.getElementById('status-text').innerText = "Doa is thinking...";
      
      try {
        const systemPrompt = `You are Doa, a minimalist AI OS. Date: ${new Date().toDateString()}. Keep responses short. Suggest actions like [ACTION: ADD_EVENT:Title,YYYY-MM-DD|Add Event].`;
        const res = await fetch(AI_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            messages: [{ role: 'system', content: systemPrompt }, ...chatMemory.slice(-6), { role: 'user', content: text }],
            model: 'openai'
          })
        });
        const reply = await res.text();
        const display = reply.replace(/\[ACTION:[^\]]*\]/g, "").trim();
        addMessage('doa', display);
        chatMemory.push({ role: 'user', content: text }, { role: 'assistant', content: reply });
        localStorage.setItem('doa_chat_cache', JSON.stringify(chatMemory));
        speak(display);
      } catch (e) { addMessage('doa', "Connection error."); } finally { isThinking = false; document.getElementById('status-text').innerText = ""; }
    }

    function speak(text) {
      if (!voiceActive || !text) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      if (selectedVoice) u.voice = selectedVoice;
      u.pitch = 1.3; u.rate = 0.95;
      window.speechSynthesis.speak(u);
    }

    function addMessage(sender, text) {
      const history = document.getElementById('chat-history');
      const row = document.createElement('div');
      row.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full chat-bubble mb-6 px-2`;
      row.innerHTML = `<div class="max-w-[85%] group"><div class="${sender === 'user' ? 'bg-black text-white' : 'bg-gray-100 text-gray-900'} p-4 rounded-3xl text-sm shadow-sm relative">${text}</div></div>`;
      history.appendChild(row); history.scrollTop = history.scrollHeight;
    }

    function toggleSidebar() { document.getElementById('main-sidebar').classList.toggle('closed'); document.getElementById('menu-btn').classList.toggle('show'); }
    function switchView(v) { localStorage.setItem('doa_active_view', v); document.querySelectorAll('.view-container').forEach(el => el.classList.add('hidden')); document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('sidebar-active')); document.getElementById(v+'-view').classList.remove('hidden'); document.getElementById('btn-'+v).classList.add('sidebar-active'); if(v==='calendar') renderCalendar(); }
    function setChatMode(active) { document.getElementById('hero-section').style.display = active ? 'none' : 'block'; document.getElementById('chat-history').classList.toggle('hidden', !active); }
    function toggleVoice() { voiceActive = !voiceActive; localStorage.setItem('voice_active', voiceActive); updateVoiceUI(); }
    function updateVoiceUI() { const k = document.getElementById('voice-knob'), b = document.getElementById('voice-switch'); k.style.left = voiceActive ? "18px" : "2px"; b.style.backgroundColor = voiceActive ? "#00E676" : "#f3f4f6"; }
    document.getElementById('user-input').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleMessage(); } });
    
    window.onload = () => { 
      updateVoiceUI(); loadVoices(); 
      if (chatMemory.length) { chatMemory.forEach(m => addMessage(m.role==='user'?'user':'doa', m.content.replace(/\[ACTION:.*?\]/g,""))); setChatMode(true); }
      switchView(localStorage.getItem('doa_active_view') || 'chat');
    };
  </script>
</body>
</html>
