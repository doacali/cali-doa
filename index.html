<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cali Doa | Intelligent Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; }
        .hidden-section { display: none; }
        .sidebar-active { background: #121212 !important; color: white !important; border-radius: 12px; }
        .chat-bubble { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#FBFBFB]">

    <div class="flex h-screen w-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-white border-r border-gray-100 flex flex-col h-full shrink-0">
            <div class="p-6"><h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase">DOA CALI</h1></div>
            <nav class="flex-1 px-4 space-y-1">
                <button id="nav-chat" onclick="Doa.navigate('chat')" class="w-full text-left p-3 sidebar-active">💬 Chat</button>
                <button id="nav-calendar" onclick="Doa.navigate('calendar')" class="w-full text-left p-3 text-gray-400 hover:bg-gray-50 rounded-xl">📅 Calendar</button>
                <button id="nav-apps" onclick="Doa.navigate('apps')" class="w-full text-left p-3 text-gray-400 hover:bg-gray-50 rounded-xl">📱 App Factory</button>
                <button id="nav-language" onclick="Doa.navigate('language')" class="w-full text-left p-3 text-gray-400 hover:bg-gray-50 rounded-xl">🌐 Language Academy</button>
            </nav>
        </aside>

        <!-- MAIN WORKSPACE -->
        <main class="flex-1 flex flex-col h-full relative">
            <header class="p-5 flex justify-end gap-4 text-xs font-black uppercase tracking-widest text-gray-400">
                <button onclick="Doa.login()">Login</button>
            </header>

            <div id="workspace" class="flex-1 overflow-y-auto p-10">
                <!-- Chat Section -->
                <section id="view-chat" data-view="chat">
                    <div id="hero-section" class="text-center mt-20">
                        <h1 class="text-5xl font-black mb-4">What can <span class="text-[#00E676]">Doa</span> do?</h1>
                    </div>
                    <div id="chat-history" class="space-y-4 mb-20"></div>
                </section>

                <!-- App Factory -->
                <section id="view-apps" data-view="apps" class="hidden-section">
                    <h2 class="text-2xl font-black mb-6">App Factory</h2>
                    <div id="app-grid" class="grid grid-cols-3 gap-6"></div>
                </section>
                
                <!-- Calendar Section -->
                <section id="view-calendar" data-view="calendar" class="hidden-section">
                    <h2 class="text-2xl font-black">Calendar</h2>
                </section>

                <!-- Language Section -->
                <section id="view-language" data-view="language" class="hidden-section">
                    <h2 class="text-2xl font-black">Language Academy</h2>
                </section>
            </div>

            <!-- INPUT AREA -->
            <div class="p-6 bg-white border-t">
                <div class="max-w-2xl mx-auto flex items-center border rounded-full p-2 shadow-lg">
                    <input id="user-input" class="flex-1 p-2 outline-none" placeholder="Talk to Doa...">
                    <button id="send-btn" class="bg-black text-white px-6 py-2 rounded-full">Send</button>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const Doa = {
            // Configuration
            config: {
                supabaseUrl: 'YOUR_SUPABASE_URL',
                supabaseKey: 'YOUR_SUPABASE_KEY'
            },
            
            // Navigation
            navigate(view) {
                document.querySelectorAll('section[data-view]').forEach(s => s.classList.add('hidden-section'));
                document.getElementById('view-' + view).classList.remove('hidden-section');
                document.querySelectorAll('nav button').forEach(b => b.classList.remove('sidebar-active'));
                document.getElementById('nav-' + view).classList.add('sidebar-active');
            },

            // Brain Logic
            process(text) {
                const lower = text.toLowerCase();
                if(lower.includes('calendar')) this.navigate('calendar');
                else if(lower.includes('app')) this.navigate('apps');
                else if(lower.includes('language')) this.navigate('language');
                else this.navigate('chat');
                
                // Add message to chat history here...
            },
            
            login() { alert("Login logic"); }
        };

        // Ad Timer (Every 10 mins)
        setInterval(() => {
            console.log("Showing Ad...");
            alert("Upgrade to Pro to remove these ads!");
        }, 600000);

        // Voice Engine Initialization...
    </script>
</body>
</html>
