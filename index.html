<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cali Doa | AI OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #ffffff; color: #111827; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    #main-sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 260px; transition: 0.28s; z-index: 60; background: white; border-right: 1px solid #f3f4f6; }
    #main-sidebar.collapsed { transform: translateX(-100%); }
    .sidebar-item { transition: all 0.2s; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 12px; font-weight: 700; color: #9ca3af; font-size: 13px; }
    .sidebar-active { background: #111111 !important; color: white !important; }
    #chat-history { display: flex; flex-direction: column; overflow-y: auto; scroll-behavior: smooth; }
    .chat-bubble { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .gender-btn { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: 0.2s; border: 1px solid #f3f4f6; }
    .gender-active { background: #00E676; border-color: #00E676; color: white; box-shadow: 0 4px 12px rgba(0, 230, 118, 0.3); }
  </style>
</head>
<body class="bg-white">

  <div class="flex h-screen w-screen overflow-hidden">
    <!-- SIDEBAR -->
    <aside id="main-sidebar" class="flex flex-col h-full shrink-0">
      <div class="p-6 flex items-center justify-between">
        <h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer" onclick="location.reload()">DOA CALI</h1>
        <button onclick="toggleSidebar()" class="text-gray-300 text-[9px] font-black uppercase">Hide</button>
      </div>
      <nav class="flex-1 px-4 space-y-1 overflow-y-auto hide-scrollbar">
        <button onclick="switchView('chat')" class="sidebar-item sidebar-active">💬 Chat With Doa</button>
        <button class="sidebar-item">📅 Calendar</button>
        <button class="sidebar-item">📱 App Factory</button>
      </nav>
    </aside>

    <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
      <header class="w-full px-8 py-5 flex justify-end items-center gap-8 text-[11px] font-black uppercase text-gray-400">
        <button>Login</button>
        <button class="text-black bg-[#00E676] px-5 py-2 rounded-xl font-bold">Sign Up</button>
      </header>

      <div id="chat-view" class="view-container flex-1 w-full flex flex-col items-center justify-center px-10 overflow-hidden">
        <div id="chat-shell" class="w-full max-w-2xl flex flex-col h-full justify-center">
          
          <div id="hero-section" class="text-center py-10">
            <h1 class="text-6xl font-black mb-5 tracking-tighter leading-none">How can <span class="text-[#00E676]">Doa</span><br>help you?</h1>
          </div>

          <div id="chat-history" class="hidden flex-1 hide-scrollbar py-6"></div>

          <!-- INPUT AREA -->
          <div class="w-full bg-white pt-4 pb-8">
            <div class="flex justify-between items-center mb-3 px-2">
              <p id="status-text" class="text-[9px] font-black text-gray-300 uppercase tracking-widest"></p>
              
              <div class="flex items-center gap-4">
                <!-- GENDER SWITCHER -->
                <div class="flex items-center gap-1.5">
                  <button onclick="setVoiceGender('female')" id="btn-female" class="gender-btn">👩</button>
                  <button onclick="setVoiceGender('male')" id="btn-male" class="gender-btn">👨</button>
                </div>
                <!-- VOICE TOGGLE -->
                <div id="voice-switch" onclick="toggleVoice()" class="w-8 h-4 bg-gray-100 rounded-full relative cursor-pointer">
                  <div id="voice-knob" class="absolute left-0.5 top-0.5 w-3 h-3 bg-white rounded-full shadow-sm transition-all"></div>
                </div>
              </div>
            </div>

            <div class="bg-white border border-gray-200 shadow-xl rounded-[24px] p-2.5 flex items-center">
              <textarea id="user-input" rows="1" class="flex-1 px-4 outline-none text-sm resize-none hide-scrollbar" placeholder="Ask Doaa anything..."></textarea>
              <button onclick="handleMessage()" class="bg-black text-white w-10 h-10 rounded-full font-bold ml-2">→</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const CLOUDFLARE_URL = 'https://doa-brain-proxy.111222lov3.workers.dev';
    let voiceActive = JSON.parse(localStorage.getItem('voice_active')) || false;
    let voiceGender = localStorage.getItem('voice_gender') || 'female';
    let isThinking = false;
    let chatMemory = [];

    // 🔊 DUET Speech Engine: Can switch between voices mid-sentence
    function speak(fullText) {
      window.speechSynthesis.cancel();
      if (!voiceActive || !fullText) return;

      // 🚨 SPLIT BY LANGUAGE TAGS to support "Two voices together"
      const segments = fullText.split(/(\[[a-z]{2}-[A-Z]{2}\])/g).filter(s => s.trim().length > 0);
      let currentLang = "en-US";

      segments.forEach((segment) => {
        if (segment.match(/\[[a-z]{2}-[A-Z]{2}\]/)) {
          currentLang = segment.replace(/[\[\]]/g, "");
          return; // Skip the tag itself
        }

        const cleanText = segment.replace(/\bDoa\b/gi, "Doaa").replace(/[*#`_~]/g, "").trim();
        const u = new SpeechSynthesisUtterance(cleanText);
        u.lang = currentLang;

        const voices = window.speechSynthesis.getVoices();
        
        // 🚨 Find voice based on Language AND User's Gender preference
        let bestVoice = voices.find(v => v.lang.startsWith(currentLang.split('-')[0]) && 
            (v.name.toLowerCase().includes(voiceGender) || v.name.includes(voiceGender === 'female' ? "Samantha" : "David") || v.name.includes(voiceGender === 'female' ? "Aria" : "Guy")));

        if (!bestVoice) bestVoice = voices.find(v => v.lang.startsWith(currentLang.split('-')[0]));
        if (bestVoice) u.voice = bestVoice;

        // Pitch tuning based on gender
        u.pitch = voiceGender === 'female' ? 1.35 : 0.95;
        u.rate = 1.1;
        
        window.speechSynthesis.speak(u);
      });
    }

    async function handleMessage() {
      window.speechSynthesis.cancel();
      if (isThinking) return;
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;

      document.getElementById('hero-section').classList.add('hidden');
      document.getElementById('chat-history').classList.remove('hidden');
      document.getElementById('chat-history').style.display = 'flex';
      
      const now = new Date();
      addMessage('user', text);
      input.value = '';
      isThinking = true;
      document.getElementById('status-text').innerText = "DOAA IS SYNCING...";

      try {
        const res = await fetch(CLOUDFLARE_URL, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' }, 
          body: JSON.stringify({ text, localTime: now.toLocaleTimeString(), localDate: now.toDateString(), history: chatMemory.slice(-6) }) 
        });
        const data = await res.json();
        addMessage('doaa', data.response);
        chatMemory.push({ role: 'user', content: text }, { role: 'assistant', content: data.response });
        speak(data.response);
      } catch (e) { addMessage('doaa', "Connection lost."); }
      finally { isThinking = false; document.getElementById('status-text').innerText = ""; }
    }

    function addMessage(sender, text) {
      const history = document.getElementById('chat-history');
      const row = document.createElement('div');
      row.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full mb-4 px-2`;
      let visibleContent = text.replace(/^\[[a-z]{2}-[A-Z]{2}\]\s*/gi, "").replace(/[*#`_~]/g, "");
      
      row.innerHTML = `<div class="max-w-[85%]">
        <div class="${sender === 'user' ? 'bg-black text-white rounded-[22px] rounded-tr-[4px]' : 'bg-gray-100 text-gray-900 rounded-[22px] rounded-tl-[4px]'} p-4 text-sm whitespace-pre-wrap shadow-sm">
          ${visibleContent}
        </div>
      </div>`;
      history.appendChild(row);
      history.scrollTop = history.scrollHeight;
    }

    function setVoiceGender(g) {
      window.speechSynthesis.cancel();
      voiceGender = g;
      localStorage.setItem('voice_gender', g);
      updateUI();
      if (voiceActive) speak(`[en-US] ${g} voice selected.`);
    }

    function toggleVoice() {
      voiceActive = !voiceActive;
      localStorage.setItem('voice_active', voiceActive);
      updateUI();
      if (!voiceActive) window.speechSynthesis.cancel();
      else speak("[en-US] Voice active.");
    }

    function updateUI() {
      const knob = document.getElementById('voice-knob');
      const bg = document.getElementById('voice-switch');
      knob.style.left = voiceActive ? "18px" : "2px";
      bg.style.backgroundColor = voiceActive ? "#00E676" : "#f3f4f6";
      
      document.getElementById('btn-female').classList.toggle('gender-active', voiceGender === 'female');
      document.getElementById('btn-male').classList.toggle('gender-active', voiceGender === 'male');
    }

    function toggleSidebar() { window.speechSynthesis.cancel(); document.getElementById('main-sidebar').classList.toggle('collapsed'); }
    function switchView(v) { window.speechSynthesis.cancel(); document.querySelectorAll('.view-container').forEach(el => el.classList.add('hidden')); document.getElementById(v + '-view').classList.remove('hidden'); }
    document.getElementById('user-input').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleMessage(); } });
    window.onload = () => { updateUI(); document.getElementById('side-date').innerText = new Date().getDate(); };
    window.speechSynthesis.onvoiceschanged = () => {};
  </script>
</body>
</html>
