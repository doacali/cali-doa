<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doa | AI Operating System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #ffffff; color: #111827; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    
    #main-sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 260px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 60; background: white; border-right: 1px solid #f3f4f6; transform: translateX(0); }
    #main-sidebar.closed { transform: translateX(-100%); }
    .sidebar-item { transition: all 0.2s; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 12px; font-weight: 700; color: #9ca3af; font-size: 13px; }
    .sidebar-active { background: #111111 !important; color: white !important; }
    
    #chat-history { display: flex; flex-direction: column; overflow-y: auto; scroll-behavior: smooth; width: 100%; max-width: 42rem; margin: 0 auto; }
    .chat-bubble { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    
    #menu-btn { position: absolute; top: 20px; left: 20px; z-index: 50; transition: 0.2s; opacity: 0; pointer-events: none; }
    #menu-btn.show { opacity: 1; pointer-events: auto; }
    #chat-shell { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

    /* Calendar Grid Fixes */
    .cal-day { aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 16px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; position: relative; font-size: 1rem; font-weight: 700; }
    .cal-day:hover { background: #f9fafb; border-color: #f3f4f6; }
    .cal-day.today { background: #00E676; color: black; }
    .cal-day.has-event::after { content: ''; width: 5px; height: 5px; background: #00E676; border-radius: 50%; position: absolute; bottom: 8px; }
    .cal-day.today.has-event::after { background: black; }
    
    .mini-month { background: white; padding: 12px; border-radius: 20px; transition: 0.2s; cursor: pointer; border: 1px solid #f3f4f6; }
    .mini-month:hover { border-color: #00E676; transform: translateY(-2px); }
  </style>
</head>
<body class="bg-white">

  <div class="flex h-screen w-screen overflow-hidden relative">
    
    <button id="menu-btn" onclick="toggleSidebar()" class="bg-white border border-gray-100 shadow-md p-3 rounded-2xl flex items-center gap-3 hover:bg-gray-50 active:scale-95 transition-all">
        <span class="text-[#00E676] font-black italic tracking-tighter text-sm uppercase">Doa</span>
        <div class="flex flex-col gap-[3px]"><div class="w-4 h-[2px] bg-gray-400 rounded-full"></div><div class="w-4 h-[2px] bg-gray-400 rounded-full"></div><div class="w-4 h-[2px] bg-gray-400 rounded-full"></div></div>
    </button>

    <aside id="main-sidebar" class="flex flex-col h-full shrink-0">
      <div class="p-6 flex items-center justify-between">
        <h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer" onclick="location.reload()">DOA CALI</h1>
        <button onclick="toggleSidebar()" class="text-gray-400 text-[10px] font-bold uppercase tracking-widest hover:text-black">Hide</button>
      </div>
      <nav class="flex-1 px-4 space-y-1">
        <button onclick="startNewChat()" class="sidebar-item hover:bg-gray-50 mb-4 text-black border border-gray-100 transition-all active:scale-95">+ New Chat</button>
        <button onclick="switchView('chat')" id="btn-chat" class="sidebar-item">💬 Chat With Doa</button>
        <button onclick="switchView('calendar')" id="btn-calendar" class="sidebar-item">📅 Calendar</button>
        <button onclick="switchView('apps')" id="btn-apps" class="sidebar-item">📱 App Factory</button>
      </nav>
      <div class="p-6 text-center border-t border-gray-50"><span class="text-[10px] text-gray-300 font-bold uppercase">OS Engine v2.8</span></div>
    </aside>

    <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
      <header class="w-full px-8 py-5 flex justify-end items-center gap-8 text-[11px] font-black uppercase text-gray-400">
        <button class="hover:text-black">Login</button>
        <button class="text-black bg-[#00E676] px-5 py-2 rounded-xl font-bold ml-4 hover:shadow-lg active:scale-95 transition-all">Sign Up</button>
      </header>

      <!-- CHAT VIEW -->
      <div id="chat-view" class="view-container flex-1 w-full flex flex-col items-center px-10 overflow-hidden">
        <div id="chat-shell" class="w-full max-w-2xl flex flex-col h-full justify-center">
          <div id="chat-history" class="hidden hide-scrollbar py-6"></div>
          <div id="center-group" class="flex flex-col w-full">
            <div id="hero-section" class="text-center"><h1 class="text-6xl font-black mb-10 tracking-tighter leading-none">How can <span class="text-[#00E676]">Doa</span><br>help you?</h1></div>
            <div id="input-area" class="w-full bg-white pb-10">
                <div class="flex justify-between items-center mb-3 px-4">
                  <p id="status-text" class="text-[9px] font-black text-gray-300 uppercase tracking-widest"></p>
                  <div class="flex items-center gap-3">
                    <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Live Voice</span>
                    <div id="voice-switch" onclick="toggleVoice()" class="w-8 h-4 bg-gray-100 rounded-full relative cursor-pointer"><div id="voice-knob" class="absolute left-0.5 top-0.5 w-3 h-3 bg-white rounded-full transition-all"></div></div>
                  </div>
                </div>
                <div class="bg-white border border-gray-100 shadow-[0_20px_50px_rgba(0,0,0,0.06)] rounded-[32px] p-3 flex items-center mx-2">
                  <textarea id="user-input" rows="1" class="flex-1 px-5 outline-none text-sm resize-none hide-scrollbar py-2" placeholder="Ask Doa anything..."></textarea>
                  <button onclick="handleMessage()" class="bg-black text-white w-12 h-12 rounded-full font-bold ml-2 hover:bg-gray-800 transition-all flex items-center justify-center">→</button>
                </div>
            </div>
          </div>
        </div>
      </div>

      <!-- CALENDAR VIEW -->
      <div id="calendar-view" class="view-container hidden flex-1 flex flex-col p-8 overflow-hidden">
        <div class="flex flex-1 gap-8 overflow-hidden">
            <div class="flex-[3] flex flex-col overflow-hidden">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h1 class="text-4xl font-black uppercase tracking-tighter inline-block mr-4" id="cal-main-title">Calendar</h1>
                        <button onclick="toggleCalendarView()" id="view-toggle-btn" class="bg-gray-50 text-[10px] font-black uppercase px-4 py-2 rounded-xl hover:bg-gray-100">Show 12 Months</button>
                    </div>
                    <div id="month-nav-controls" class="flex gap-2">
                        <button onclick="changeMonth(-1)" class="w-10 h-10 hover:bg-gray-100 rounded-full font-bold">←</button>
                        <button onclick="changeMonth(1)" class="w-10 h-10 hover:bg-gray-100 rounded-full font-bold">→</button>
                    </div>
                </div>

                <div id="calendar-content-area" class="flex-1 overflow-y-auto hide-scrollbar">
                    <div id="single-month-container" class="h-full flex flex-col">
                        <div class="grid grid-cols-7 gap-2 text-center text-[10px] font-black text-gray-400 uppercase mb-4">
                            <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
                        </div>
                        <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
                    </div>
                    <div id="year-view-container" class="hidden grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
                </div>
            </div>

            <div class="w-80 bg-gray-50 rounded-[40px] p-8 flex flex-col shadow-sm border border-gray-100">
                <h2 class="text-2xl font-black mb-1 uppercase tracking-tighter" id="selected-date-label">Today</h2>
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-8">OS Schedule</p>
                <div id="event-list" class="flex-1 overflow-y-auto hide-scrollbar space-y-3 mb-6"></div>
                <div class="mt-auto space-y-3">
                    <input id="event-input" type="text" placeholder="Event name..." class="w-full bg-white border border-gray-100 p-4 rounded-2xl text-sm outline-none shadow-sm focus:border-[#00E676] transition-all">
                    <select id="event-recurrence" class="w-full bg-white border border-gray-100 p-3 rounded-2xl text-[11px] font-bold uppercase outline-none shadow-sm cursor-pointer">
                        <option value="none">None</option>
                        <option value="monthly">Repeat Monthly</option>
                        <option value="yearly">Repeat Yearly</option>
                    </select>
                    <button onclick="saveEvent()" class="w-full bg-[#00E676] text-black font-black uppercase py-5 rounded-2xl text-[11px] tracking-widest active:scale-95 transition-all shadow-lg shadow-[#00E676]/20">Save Event</button>
                </div>
            </div>
        </div>

        <div class="h-28 mt-6 border-t border-gray-100 pt-6">
            <p class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-4">Coming Up</p>
            <div id="upcoming-list" class="flex gap-4 overflow-x-auto hide-scrollbar"></div>
        </div>
      </div>

      <div id="apps-view" class="view-container hidden flex-1 p-10"><h1>📱 App Factory</h1></div>
    </main>
  </div>

  <script>
    const CLOUDFLARE_URL = 'https://doa-brain-proxy.111222lov3.workers.dev';
    let voiceActive = JSON.parse(localStorage.getItem('voice_active')) || false;
    let chatMemory = JSON.parse(localStorage.getItem('doa_chat_cache')) || []; 
    let events = JSON.parse(localStorage.getItem('doa_events')) || [];
    let isThinking = false, selectedVoice = null;
    let viewDate = new Date(), selectedDate = new Date(), isYearView = false;

    // ─── 1. CALENDAR ENGINE (RECURRENCE & MON-SUN) ───
    function getDaysInMonth(year, month) { return new Date(year, month + 1, 0).getDate(); }
    function getFirstDayOfMonth(year, month) { 
        let day = new Date(year, month, 1).getDay(); 
        return day === 0 ? 6 : day - 1; 
    }

    function isSameDay(d1, d2) { return d1.toDateString() === d2.toDateString(); }

    function matchesEvent(event, date) {
        const evDate = new Date(event.date);
        if (event.recurrence === 'monthly') return evDate.getDate() === date.getDate() && date >= evDate;
        if (event.recurrence === 'yearly') return evDate.getDate() === date.getDate() && evDate.getMonth() === date.getMonth() && date >= evDate;
        return isSameDay(evDate, date);
    }

    function renderCalendar() {
      const grid = document.getElementById('calendar-grid');
      const title = document.getElementById('cal-main-title');
      grid.innerHTML = '';
      const month = viewDate.getMonth(), year = viewDate.getFullYear();
      title.innerText = viewDate.toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();

      const firstDay = getFirstDayOfMonth(year, month);
      const totalDays = getDaysInMonth(year, month);

      for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

      for (let d = 1; d <= totalDays; d++) {
        const date = new Date(year, month, d);
        const el = document.createElement('div');
        el.className = 'cal-day';
        el.innerText = d;
        if (isSameDay(date, new Date())) el.classList.add('today');
        if (isSameDay(date, selectedDate)) el.style.border = '2px solid #00E676';
        if (events.some(e => matchesEvent(e, date))) el.classList.add('has-event');
        el.onclick = () => selectDate(date);
        grid.appendChild(el);
      }
      renderEvents();
      renderUpcoming();
    }

    function saveEvent() {
      const input = document.getElementById('event-input');
      const rec = document.getElementById('event-recurrence').value;
      if (!input.value) return;
      events.push({ title: input.value, date: selectedDate.toISOString(), recurrence: rec });
      localStorage.setItem('doa_events', JSON.stringify(events));
      input.value = '';
      renderCalendar(); // This triggers both RenderEvents and RenderUpcoming
    }

    function renderEvents() {
      const list = document.getElementById('event-list');
      list.innerHTML = '';
      const dayEvents = events.filter(e => matchesEvent(e, selectedDate));
      if (dayEvents.length === 0) list.innerHTML = `<p class="text-[11px] text-gray-300 italic">Clear schedule.</p>`;
      dayEvents.forEach((e) => {
        const div = document.createElement('div');
        div.className = "bg-white p-4 rounded-2xl text-[11px] font-bold flex justify-between items-center shadow-sm border border-gray-50";
        div.innerHTML = `<span>${e.title}</span><button onclick="deleteEvent(${events.indexOf(e)})" class="text-gray-200 hover:text-red-400">✕</button>`;
        list.appendChild(div);
      });
    }

    function renderUpcoming() {
      const list = document.getElementById('upcoming-list');
      list.innerHTML = '';
      const now = new Date().setHours(0,0,0,0);
      const sorted = events.filter(e => new Date(e.date) >= now || e.recurrence !== 'none')
                          .sort((a,b) => new Date(a.date) - new Date(b.date)).slice(0, 10);
      
      sorted.forEach(e => {
        const div = document.createElement('div');
        div.className = "min-w-[140px] bg-gray-50 p-4 rounded-[20px] cursor-pointer border border-transparent hover:border-[#00E676] transition-all";
        const dateStr = new Date(e.date).toLocaleDateString('default', {month:'short', day:'numeric'});
        div.innerHTML = `<p class="text-[9px] font-black text-[#00E676] mb-1 uppercase">${e.recurrence !== 'none' ? '↻ ' + e.recurrence : dateStr}</p><p class="text-[11px] font-bold truncate">${e.title}</p>`;
        div.onclick = () => { viewDate = new Date(e.date); selectedDate = new Date(e.date); if(isYearView) toggleCalendarView(); else renderCalendar(); };
        list.appendChild(div);
      });
    }

    function deleteEvent(idx) { events.splice(idx, 1); localStorage.setItem('doa_events', JSON.stringify(events)); renderCalendar(); }
    function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); renderCalendar(); }
    function selectDate(date) { selectedDate = date; document.getElementById('selected-date-label').innerText = date.toLocaleDateString('default', { month: 'short', day: 'numeric' }); renderCalendar(); }
    
    function toggleCalendarView() {
        const single = document.getElementById('single-month-container'), year = document.getElementById('year-view-container'), nav = document.getElementById('month-nav-controls'), btn = document.getElementById('view-toggle-btn');
        isYearView = !isYearView;
        if (isYearView) { single.classList.add('hidden'); year.classList.remove('hidden'); nav.classList.add('invisible'); btn.innerText = "Back to Month"; renderYearView();
        } else { single.classList.remove('hidden'); year.classList.add('hidden'); nav.classList.remove('invisible'); btn.innerText = "Show 12 Months"; renderCalendar(); }
    }

    function renderYearView() {
        const container = document.getElementById('year-view-container');
        container.innerHTML = '';
        const currentYear = viewDate.getFullYear();
        for (let m = 0; m < 12; m++) {
            const div = document.createElement('div');
            div.className = 'mini-month';
            div.innerHTML = `<p class="text-[10px] font-black uppercase mb-2 text-[#00E676]">${new Date(currentYear, m).toLocaleString('default', {month:'short'})}</p>`;
            div.onclick = () => { viewDate = new Date(currentYear, m, 1); toggleCalendarView(); };
            container.appendChild(div);
        }
    }

    // ─── 2. DOUGHA VOICE ENGINE ───
    function loadVoices() {
      const v = window.speechSynthesis.getVoices();
      const n = ["Samantha", "Karen", "Aria", "Google US English Female"];
      for (const i of n) { const m = v.find(x => x.name.includes(i)); if (m) { selectedVoice = m; break; } }
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function speak(text) {
      if (!voiceActive || !text) return;
      window.speechSynthesis.cancel();
      const speech = text.replace(/\[ACTION:.*?\]/g, "").replace(/https?:\/\/\S+/g, "").replace(/\bDoa\b/gi, "Doaa").replace(/[*#`_~]/g, "").trim();
      const u = new SpeechSynthesisUtterance(speech);
      if (selectedVoice) u.voice = selectedVoice;
      u.pitch = 1.35; u.rate = 0.95;
      u.onstart = () => { setInterval(() => { if(window.speechSynthesis.speaking){ window.speechSynthesis.pause(); window.speechSynthesis.resume(); } }, 10000); };
      window.speechSynthesis.speak(u);
    }

    // ─── 3. UI NAVIGATION ───
    function toggleSidebar() {
      const sb = document.getElementById('main-sidebar'), mb = document.getElementById('menu-btn');
      sb.classList.toggle('closed');
      if (sb.classList.contains('closed')) mb.classList.add('show'); else mb.classList.remove('show');
    }

    function switchView(v) {
      localStorage.setItem('doa_active_view', v);
      document.querySelectorAll('.view-container').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('sidebar-active'));
      const t = document.getElementById(v + '-view'); if(t) t.classList.remove('hidden');
      const b = document.getElementById('btn-' + v); if(b) b.classList.add('sidebar-active');
      if (!document.getElementById('main-sidebar').classList.contains('closed')) toggleSidebar();
      if (v === 'chat') setChatMode(chatMemory.length > 0);
      if (v === 'calendar') renderCalendar();
    }

    function setChatMode(chatting) {
      const hero = document.getElementById('hero-section'), history = document.getElementById('chat-history'), shell = document.getElementById('chat-shell');
      if (chatting) { hero.style.display = 'none'; history.classList.remove('hidden'); history.style.display = 'flex'; shell.classList.remove('justify-center'); shell.classList.add('justify-end'); shell.style.paddingBottom = '0';
      } else { hero.style.display = 'block'; history.classList.add('hidden'); shell.classList.remove('justify-end'); shell.classList.add('justify-center'); shell.style.paddingBottom = '15vh'; }
    }

    function startNewChat() { window.speechSynthesis.cancel(); chatMemory = []; localStorage.removeItem('doa_chat_cache'); document.getElementById('chat-history').innerHTML = ''; setChatMode(false); switchView('chat'); }

    async function handleMessage() {
      window.speechSynthesis.cancel();
      if (isThinking) return;
      const input = document.getElementById('user-input'), rawText = input.value.trim();
      if (!rawText) return;
      setChatMode(true); addMessage('user', rawText); input.value = '';
      isThinking = true; document.getElementById('status-text').innerText = "Doa is thinking...";
      try {
        const res = await fetch(CLOUDFLARE_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: rawText, history: chatMemory.slice(-10) }) });
        const data = await res.json();
        const display = data.response.replace(/\[ACTION:.*?\]/g, "").trim();
        addMessage('doa', display);
        chatMemory.push({ role: 'user', content: rawText }, { role: 'assistant', content: data.response });
        localStorage.setItem('doa_chat_cache', JSON.stringify(chatMemory));
        speak(display);
      } catch (e) { addMessage('doa', "Connection disrupted."); } finally { isThinking = false; document.getElementById('status-text').innerText = ""; }
    }

    function addMessage(sender, text) {
      const history = document.getElementById('chat-history');
      const row = document.createElement('div');
      row.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full chat-bubble mb-6 px-2`;
      row.innerHTML = `<div class="max-w-[85%] group"><div class="${sender === 'user' ? 'bg-black text-white' : 'bg-gray-100 text-gray-900'} p-4 rounded-3xl text-sm whitespace-pre-wrap shadow-sm relative">${text}</div>${sender === 'doa' ? `<div class="flex gap-4 mt-2 px-1"><button class="bubble-action-btn" onclick="speak('${text.replace(/'/g, "\\'")}')">🔊 Speak</button><button class="bubble-action-btn red" onclick="window.speechSynthesis.cancel()">🛑 Stop</button></div>` : ''}</div>`;
      history.appendChild(row); history.scrollTop = history.scrollHeight;
    }

    function toggleVoice() { voiceActive = !voiceActive; localStorage.setItem('voice_active', voiceActive); updateVoiceUI(); if (voiceActive) speak("Voice active."); else window.speechSynthesis.cancel(); }
    function updateVoiceUI() { const knob = document.getElementById('voice-knob'), bg = document.getElementById('voice-switch'); if(knob && bg) { knob.style.left = voiceActive ? "18px" : "2px"; bg.style.backgroundColor = voiceActive ? "#00E676" : "#f3f4f6"; } }
    document.getElementById('user-input').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleMessage(); } });
    
    window.onload = () => { 
      updateVoiceUI(); loadVoices(); 
      const lastView = localStorage.getItem('doa_active_view') || 'chat';
      if (chatMemory.length > 0) {
        chatMemory.forEach(msg => addMessage(msg.role === 'user' ? 'user' : 'doa', msg.content.replace(/\[ACTION:.*?\]/g, "")));
        if (lastView === 'chat') setChatMode(true);
      } else { setChatMode(false); }
      switchView(lastView);
      document.getElementById('main-sidebar').classList.remove('closed'); 
    };
  </script>
</body>
</html>
