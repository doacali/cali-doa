<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doa | Local AI OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #ffffff; color: #111827; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .os-scrollbar::-webkit-scrollbar { width: 4px; }
    .os-scrollbar::-webkit-scrollbar-thumb { background: #00E676; border-radius: 10px; }

    #main-sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 260px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 60; background: white; border-right: 1px solid #f3f4f6; transform: translateX(0); }
    #main-sidebar.closed { transform: translateX(-100%); }
    main { transition: padding-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding-left: 260px; }
    #main-sidebar.closed ~ main { padding-left: 0; }

    .sidebar-item { transition: all 0.2s; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 12px; font-weight: 700; color: #9ca3af; font-size: 13px; }
    .sidebar-active { background: #111111 !important; color: white !important; }
    
    #chat-history { display: flex; flex-direction: column; overflow-y: auto; scroll-behavior: smooth; width: 100%; max-width: 42rem; margin: 0 auto; padding-bottom: 20px; }
    .chat-bubble { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    
    #menu-btn { position: absolute; top: 20px; left: 20px; z-index: 50; opacity: 0; pointer-events: none; }
    #menu-btn.show { opacity: 1; pointer-events: auto; }

    .win-calendar-card { width: 380px; background: #ffffff; border: 1px solid #f3f4f6; border-radius: 40px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.03); }
    .cal-day { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: 0.2s; font-size: 14px; font-weight: 600; color: #374151; position: relative; }
    .cal-day.today { background: #00E676 !important; color: #000 !important; font-weight: 800; }
    .cal-day.selected { border: 2px solid #00E676; }
  </style>
</head>
<body class="bg-white">

  <div class="flex h-screen w-screen overflow-hidden relative">
    
    <aside id="main-sidebar" class="flex flex-col h-full shrink-0">
      <div class="p-6 flex items-center justify-between">
        <h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer" onclick="location.reload()">DOA</h1>
        <button onclick="toggleSidebar()" class="text-gray-300 text-[10px] font-bold uppercase hover:text-black">Hide</button>
      </div>
      <nav class="flex-1 px-4 space-y-1">
        <button onclick="startNewChat()" class="sidebar-item hover:bg-gray-50 mb-4 text-black border border-gray-100">+ New Chat</button>
        <button onclick="switchView('chat')" id="btn-chat" class="sidebar-item">💬 Chat With Doa</button>
        <button onclick="switchView('calendar')" id="btn-calendar" class="sidebar-item">📅 Calendar</button>
      </nav>
      <div class="p-6 text-center border-t border-gray-50"><span class="text-[10px] text-gray-200 font-bold uppercase">Local Brain v1.0</span></div>
    </aside>

    <button id="menu-btn" onclick="toggleSidebar()" class="bg-white border border-gray-100 shadow-md p-3 rounded-2xl flex items-center gap-3">
        <span class="text-[#00E676] font-black italic text-sm uppercase">Doa</span>
    </button>

    <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
      <!-- CHAT VIEW -->
      <div id="chat-view" class="view-container flex-1 w-full flex flex-col items-center px-10 overflow-hidden">
        <div id="chat-shell" class="w-full max-w-2xl flex flex-col h-full justify-center">
          <div id="chat-history" class="hidden hide-scrollbar py-6"></div>
          <div id="center-group" class="flex flex-col w-full">
            <div id="hero-section" class="text-center">
                <h1 class="text-6xl font-black mb-10 tracking-tighter leading-none">How can <span class="text-[#00E676]">Doa</span><br>help you?</h1>
            </div>
            <div id="input-area" class="w-full bg-white pb-10">
                <div class="flex justify-between items-center mb-3 px-4">
                  <p id="status-text" class="text-[9px] font-black text-gray-300 uppercase tracking-widest">SYSTEM READY</p>
                  <div class="flex items-center gap-3">
                    <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Voice</span>
                    <div id="voice-switch" onclick="toggleVoice()" class="w-8 h-4 bg-gray-100 rounded-full relative cursor-pointer"><div id="voice-knob" class="absolute left-0.5 top-0.5 w-3 h-3 bg-white rounded-full transition-all"></div></div>
                  </div>
                </div>
                <div class="bg-white border border-gray-100 shadow-[0_20px_50px_rgba(0,0,0,0.05)] rounded-[32px] p-3 flex items-center mx-2">
                  <textarea id="user-input" rows="1" class="flex-1 px-5 outline-none text-sm resize-none hide-scrollbar py-2" placeholder="Type a command (e.g., 'add event Meeting tomorrow')"></textarea>
                  <button onclick="handleMessage()" class="bg-black text-white w-12 h-12 rounded-full font-bold ml-2">→</button>
                </div>
            </div>
          </div>
        </div>
      </div>

      <!-- CALENDAR VIEW -->
      <div id="calendar-view" class="view-container hidden flex-1 flex flex-col items-center justify-center h-full">
            <div class="win-calendar-card">
                <h1 class="text-xl font-black uppercase mb-4" id="cal-title">Calendar</h1>
                <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
                <div id="event-list" class="mt-6 text-sm font-bold text-gray-500"></div>
            </div>
      </div>
    </main>
  </div>

  <script>
    /* --- THE BRAIN LOGIC (NO API KEY) --- */
    const DoaBrain = {
        process: function(input) {
            const text = input.toLowerCase();
            
            // 1. CALENDAR COMMANDS
            if (text.includes("add event") || text.includes("schedule")) {
                const eventTitle = input.replace(/add event|schedule/gi, "").trim();
                const date = new Date().toDateString(); // Default to today for demo
                saveEvent(eventTitle, date);
                return `Done! I've added "${eventTitle}" to your calendar for today. [ACTION:OPEN_TAB:calendar]`;
            }

            // 2. NAVIGATION COMMANDS
            if (text.includes("open calendar") || text.includes("show calendar")) {
                switchView('calendar');
                return "Opening your calendar now.";
            }

            // 3. SYSTEM INFO
            if (text.includes("time")) return `The current system time is ${new Date().toLocaleTimeString()}.`;
            if (text.includes("date")) return `Today is ${new Date().toDateString()}.`;
            if (text.includes("status")) return "All systems functional. Local Brain is active.";

            // 4. GREETINGS
            if (text.includes("hello") || text.includes("hi ")) return "Hello! I am Doa. How can I assist your workflow today?";

            // 5. FALLBACK
            return "I'm not sure how to do that yet. Try 'add event Lunch' or 'what time is it?'.";
        }
    };

    /* --- OS CORE FUNCTIONS --- */
    let voiceActive = false;
    let events = JSON.parse(localStorage.getItem('doa_events')) || [];

    function handleMessage() {
        const input = document.getElementById('user-input');
        const rawText = input.value.trim();
        if (!rawText) return;

        setChatMode(true);
        addMessage('user', rawText);
        input.value = '';

        // Simulate thinking
        document.getElementById('status-text').innerText = "DOA IS PROCESSING...";
        
        setTimeout(() => {
            const response = DoaBrain.process(rawText);
            addMessage('doa', response.replace(/\[ACTION:.*?\]/g, ""));
            
            if (voiceActive) speak(response);
            if (response.includes("[ACTION:")) handleAction(response);
            
            document.getElementById('status-text').innerText = "SYSTEM READY";
        }, 600);
    }

    function handleAction(text) {
        if (text.includes("OPEN_TAB:calendar")) switchView('calendar');
    }

    function addMessage(sender, text) {
        const history = document.getElementById('chat-history');
        const row = document.createElement('div');
        row.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full chat-bubble mb-6 px-2`;
        row.innerHTML = `<div class="max-w-[85%]"><div class="${sender === 'user' ? 'bg-black text-white' : 'bg-gray-100 text-gray-900'} p-4 rounded-3xl text-sm shadow-sm">${text}</div></div>`;
        history.appendChild(row);
        history.scrollTop = history.scrollHeight;
    }

    function saveEvent(title, date) {
        events.push({ title, date });
        localStorage.setItem('doa_events', JSON.stringify(events));
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        const days = 31; // Simplified for demo
        for (let i = 1; i <= days; i++) {
            const day = document.createElement('div');
            day.className = 'cal-day hover:bg-gray-100';
            day.innerText = i;
            if (i === new Date().getDate()) day.classList.add('today');
            grid.appendChild(day);
        }
        
        const list = document.getElementById('event-list');
        list.innerHTML = events.length ? "Upcoming: " + events.map(e => e.title).join(", ") : "No upcoming events.";
    }

    function switchView(view) {
        document.querySelectorAll('.view-container').forEach(v => v.classList.add('hidden'));
        document.getElementById(view + '-view').classList.remove('hidden');
        if (view === 'calendar') renderCalendar();
    }

    function setChatMode(active) {
        const hero = document.getElementById('hero-section');
        const history = document.getElementById('chat-history');
        if (active) {
            hero.style.display = 'none';
            history.classList.remove('hidden');
        }
    }

    function toggleSidebar() {
        const sb = document.getElementById('main-sidebar');
        const mb = document.getElementById('menu-btn');
        sb.classList.toggle('closed');
        mb.classList.toggle('show', sb.classList.contains('closed'));
    }

    function toggleVoice() {
        voiceActive = !voiceActive;
        document.getElementById('voice-knob').style.left = voiceActive ? "18px" : "2px";
        document.getElementById('voice-switch').style.backgroundColor = voiceActive ? "#00E676" : "#f3f4f6";
    }

    function speak(text) {
        const clean = text.replace(/\[ACTION:.*?\]/g, "");
        const speech = new SpeechSynthesisUtterance(clean);
        speech.rate = 1;
        speech.pitch = 1.2;
        window.speechSynthesis.speak(speech);
    }

    document.getElementById('user-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleMessage();
        }
    });

    function startNewChat() {
        document.getElementById('chat-history').innerHTML = '';
        setChatMode(false);
        switchView('chat');
    }
  </script>
</body>
</html>
