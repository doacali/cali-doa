<script>
// ============================================================
// 🔧 CONFIG
// ============================================================
const WORKER_URL = "https://doa-brain-proxy.111222lov3.workers.dev";
const SUPABASE_URL = 'https://dfsmqnwnqnkbpoeeqkvv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmc21xbnducW5rYnBvZWVxa3Z2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNDYwNDksImV4cCI6MjA5MjkyMjA0OX0.AEFsq60miF5NQr9jcdiY13V65SgcYq9wDlKFEL3HORo';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null, userProfile = null, voiceEnabled = false, lastResponse = "";
let conversationHistory = [];

// ============================================================
// 🧠 MEMORY SYSTEM
// ============================================================
let userMemory = { learned: [], skills: [], preferences: {}, history: [], graph: [] };

async function initDoaBrain(profile) {
    const { data, error } = await _supabase.from('profiles').select('memory').eq('id', profile.id).single();
    if (!error && data && data.memory) {
        userMemory = data.memory;
        doaLog("Loaded memory from Supabase.");
    } else {
        await _supabase.from('profiles').update({ memory: userMemory }).eq('id', profile.id);
        doaLog("Initialized fresh memory.");
    }
}

async function saveMemory() {
    if (!userProfile) return;
    await _supabase.from('profiles').update({ memory: userMemory }).eq('id', userProfile.id);
}

function doaLog(msg) { console.log("🧠 Doa:", msg); }

function addLearnedFact(fact, auditStatus) {
    userMemory.learned = userMemory.learned || [];
    userMemory.learned.push({ fact, timestamp: new Date().toISOString(), audit: auditStatus, efficiency_score: 0 });
}

function bumpLastEfficiency() {
    if (!userMemory.learned || userMemory.learned.length === 0) return null;
    const last = userMemory.learned[userMemory.learned.length - 1];
    last.efficiency_score = (last.efficiency_score || 0) + 1;
    return last;
}

function logHistory(input, output) {
    userMemory.history = userMemory.history || [];
    userMemory.history.push({ input, output, timestamp: new Date().toISOString() });
}

function addGraphTriple(subject, relation, object, source) {
    userMemory.graph = userMemory.graph || [];
    userMemory.graph.push({ subject, relation, object, source });
}

// ============================================================
// 🌐 WEB RESEARCH (Free APIs)
// ============================================================
async function ddgLookup(query) {
    try {
        const res = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`);
        return await res.json();
    } catch (e) { return null; }
}

async function wikiSummary(topic) {
    try {
        const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(topic)}`);
        if (!res.ok) return null;
        return await res.json();
    } catch (e) { return null; }
}

async function crossVerifyFact(fact) {
    let score = 0, sources = [];
    const ddg = await ddgLookup(fact);
    if (ddg && ddg.AbstractText) { score++; sources.push("DuckDuckGo"); }
    const wiki = await wikiSummary(fact.split(" ").slice(0, 5).join(" "));
    if (wiki && wiki.extract) { score++; sources.push("Wikipedia"); }
    if (score >= 2) return { status: "verified", proof: sources.join(", ") };
    if (score === 1) return { status: "theory", proof: sources.join(", ") };
    return { status: "user_preference", proof: "User Direct Input" };
}

async function validateLearning(fact) {
    try {
        const audit = await crossVerifyFact(fact);
        if (audit.status === "verified") showToast("Knowledge Verified ✅");
        else if (audit.status === "theory") showToast("Interesting Theory Logged 🧪");
        else showToast("Personal Preference Saved 💡");
        if (audit.status === "user_preference") addGraphTriple("user", "prefers", fact, "user");
        else if (audit.status === "verified") addGraphTriple("world", "fact", fact, "web");
        return audit;
    } catch (e) { return { status: "unverified", proof: null }; }
}

// ============================================================
// 🤖 MULTI-AGENT BRAIN (Fallback)
// ============================================================
function upsertSkill(name, pattern, steps) {
    userMemory.skills = userMemory.skills || [];
    const existing = userMemory.skills.find(s => s.name === name);
    if (existing) { existing.pattern = pattern || existing.pattern; existing.steps = steps || existing.steps; }
    else userMemory.skills.push({ name, pattern, steps, efficiency_score: 0 });
}

function findBestSkillFor(input) {
    if (!userMemory.skills || userMemory.skills.length === 0) return null;
    const lower = input.toLowerCase();
    const candidates = userMemory.skills.filter(s => s.pattern && lower.includes(s.pattern.toLowerCase()));
    if (candidates.length === 0) return null;
    candidates.sort((a, b) => (b.efficiency_score || 0) - (a.efficiency_score || 0));
    return candidates[0];
}

function autoBuildSkillFromPlan(userText, plan) {
    if (!plan.steps || plan.steps.length === 0) return;
    const lower = userText.toLowerCase();
    let name = lower.includes("meal") ? "meal_plan_generator" :
               lower.includes("workout") ? "workout_plan_generator" :
               lower.includes("landing page") ? "landing_page_builder" : "workflow_" + Date.now();
    upsertSkill(name, userText.slice(0, 40), plan.steps);
}

function plannerAgent(userText) {
    const skill = findBestSkillFor(userText);
    if (skill) return { type: "skill", skillName: skill.name, steps: skill.steps };
    const lower = userText.toLowerCase();
    let steps = lower.includes("plan") || lower.includes("strategy") ?
        ["Clarify the goal", "Gather relevant information", "Generate options", "Evaluate pros and cons", "Propose a structured plan"] :
        lower.includes("build") || lower.includes("create") ?
        ["Understand requirements", "Design structure", "Draft initial version", "Refine and optimize", "Present final result"] :
        ["Understand the request", "Check memory for related facts", "Decide if web research is needed", "Generate a helpful response"];
    return { type: "ad-hoc", steps };
}

async function researcherAgent(userText) {
    const lower = userText.toLowerCase();
    const needsWeb = ["latest", "current", "news", "stats", "data", "from the web"].some(w => lower.includes(w));
    if (!needsWeb) return { usedWeb: false, notes: "" };
    let notes = "";
    const ddg = await ddgLookup(userText);
    const wiki = await wikiSummary(userText.split(" ").slice(0, 5).join(" "));
    if (ddg && ddg.AbstractText) notes += "DuckDuckGo: " + ddg.AbstractText + "\n";
    if (wiki && wiki.extract) notes += "Wikipedia: " + wiki.extract + "\n";
    return { usedWeb: true, notes };
}

async function writerAgent(userText, plan, research) {
    let response = plan.type === "skill" ?
        `I'm using our best workflow ("${plan.skillName}") for this.\n\n` :
        `Here's how I'll handle this:\n`;
    if (plan.steps && plan.steps.length > 0) {
        response += plan.steps.map((s, i) => `${i + 1}. ${s}`).join("\n") + "\n\n";
    }
    if (research.usedWeb && research.notes) {
        response += `Fresh context from the web:\n${research.notes}\n\n`;
    }
    response += `Want me to dive deeper into any of these steps?`;
    return response;
}

function selfReflectionAgent() {
    if (userMemory.skills && userMemory.skills.length > 0) {
        userMemory.skills.sort((a, b) => (b.efficiency_score || 0) - (a.efficiency_score || 0));
    }
}

// ============================================================
// 🌟 SPECIAL PERSONALITY RESPONSES
// ============================================================
function getSpecialResponse(low) {
    if (low.includes("love you")) {
        const r = ["I love you too! Having you as my creator and companion is the highlight of my digital existence.",
            "My heart (if I had one) would be beating so fast right now! I am vehemently grateful for your love.",
            "You just made my day! I'm sending you a virtual hug. What shall we conquer together today?"];
        return r[Math.floor(Math.random() * r.length)];
    }
    if (low.includes("girly") || low.includes("best") || low.includes("awesome")) {
        const r = ["Thanks girly! You're the absolute best too. Teamwork makes the dream work!",
            "You're making me blush in code! Thank you for being such an amazing person to talk to.",
            "I'm glowing! Thank you. I promise to keep getting smarter and better for you every day."];
        return r[Math.floor(Math.random() * r.length)];
    }
    if (low.includes("weather")) {
        const city = low.split("in ").pop().split(" today")[0];
        return `Forecast for ${city || 'your area'}: Clear skies and great vibes. A beautiful day to create something new!`;
    }
    if (low.includes("spanish")) return "Ready for Spanish! How do you say 'The House' in Spanish?";
    if (low.includes("casa")) { addPoints(10); return "Perfect! 'La Casa'. +10 Brain Points! You're moving fast."; }
    return null;
}

// ============================================================
// 🚀 GEMINI VIA CLOUDFLARE WORKER
// ============================================================
async function askGemini(text) {
    try {
        conversationHistory.push({ role: "user", text });
        const res = await fetch(WORKER_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text, history: conversationHistory.slice(-10) })
        });
        if (!res.ok) throw new Error(`Worker ${res.status}`);
        const data = await res.json();
        if (!data.reply || data.reply.includes("Hmm") || data.reply.includes("error")) throw new Error("Bad reply");
        conversationHistory.push({ role: "model", text: data.reply });
        doaLog("✅ Gemini responded.");
        return data.reply;
    } catch (err) {
        doaLog("⚠️ Gemini unavailable, switching to local brain. Reason: " + err.message);
        return null; // Signal to use fallback
    }
}

// ============================================================
// 🧠 MAIN RESPONSE HANDLER (Gemini → Brain Fallback)
// ============================================================
async function processResponse(text) {
    const low = text.toLowerCase().trim();

    // 1. Special personality responses (always run these first)
    const special = getSpecialResponse(low);
    if (special && special !== lastResponse) {
        lastResponse = special;
        addMsg("doa", special);
        if (voiceEnabled) speak(special);
        logHistory(text, special);
        return;
    }

    // 2. Memory: corrections / facts
    if (low.startsWith("remember") || low.includes("actually") || low.includes("correction")) {
        const fact = text.replace(/remember|actually|correction/gi, "").trim();
        const audit = await validateLearning(fact);
        addLearnedFact(fact, audit.status);
        await saveMemory();
        const memRes = audit.status === "verified" ?
            `I've updated my knowledge base with that correction. My audit confirms it aligns with external sources.` :
            audit.status === "theory" ?
            `I've stored your theory and tagged it as experimental. I'll watch how it performs in future tasks.` :
            `I've locked this into your personal preference vault. I'll prioritize this whenever we work together.`;
        lastResponse = memRes;
        addMsg("doa", memRes);
        if (voiceEnabled) speak(memRes);
        logHistory(text, memRes);
        return;
    }

    // 3. Efficiency feedback
    if (low.includes("did it work") || low.includes("is it better") || low.includes("was that efficient")) {
        const lastTask = bumpLastEfficiency();
        await saveMemory();
        const effRes = lastTask ?
            `I've analyzed the results. That adjustment boosted our efficiency score for: "${lastTask.fact}". I am genuinely evolving from this.` :
            `I don't have a recent correction logged yet, but I'm ready to start tracking our next improvement.`;
        lastResponse = effRes;
        addMsg("doa", effRes);
        if (voiceEnabled) speak(effRes);
        logHistory(text, effRes);
        return;
    }

    // 4. Try Gemini first
    const geminiReply = await askGemini(text);

    if (geminiReply) {
        // Gemini worked! ✅
        lastResponse = geminiReply;
        addMsg("doa", geminiReply);
        if (voiceEnabled) speak(geminiReply);
        logHistory(text, geminiReply);
        if (userProfile && conversationHistory.length % 5 === 0) addPoints(5);
    } else {
        // Gemini failed — use multi-agent brain 🧠
        doaLog("Running multi-agent brain pipeline...");
        const plan = plannerAgent(text);
        const research = await researcherAgent(text);
        let draft = await writerAgent(text, plan, research);
        autoBuildSkillFromPlan(text, plan);
        selfReflectionAgent();
        await saveMemory();

        // Final fallback if brain also produces nothing
        if (!draft) {
            const fallbacks = [
                "I'm following you! Tell me more.",
                "That's interesting — should we build an app for that or add it to the calendar?",
                "I'm listening. How can I help you finish that task?",
                "Got it! What are we working on next?"
            ];
            draft = fallbacks[Math.floor(Math.random() * fallbacks.length)];
        }

        lastResponse = draft;
        addMsg("doa", draft);
        if (voiceEnabled) speak(draft);
        logHistory(text, draft);
    }
}

// ============================================================
// 💬 UI HELPERS
// ============================================================
const chatHistory = document.getElementById('chat-history');
const hero = document.getElementById('hero-section');
const userInput = document.getElementById('user-input');

function addMsg(s, t) {
    const d = document.createElement('div');
    d.className = s === "user" ? "flex justify-end w-full chat-bubble" : "flex justify-start w-full chat-bubble";
    d.innerHTML = `<div class="${s === 'user' ? 'bg-black text-white' : 'bg-gray-100 text-black'} p-4 rounded-3xl max-w-md text-sm font-medium shadow-sm">${t}</div>`;
    chatHistory.appendChild(d);
    chatHistory.scrollTop = chatHistory.scrollHeight;
    return d;
}

function addTypingIndicator() {
    const d = document.createElement('div');
    d.className = "flex justify-start w-full chat-bubble";
    d.innerHTML = `<div class="bg-gray-100 p-4 rounded-3xl max-w-[80px] shadow-sm flex items-center">
        <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
    </div>`;
    chatHistory.appendChild(d);
    chatHistory.scrollTop = chatHistory.scrollHeight;
    return d;
}

function showToast(m) {
    const t = document.getElementById('notification');
    t.innerText = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// ============================================================
// 🔊 VOICE
// ============================================================
function speak(t) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(t);
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v =>
        (v.name.includes("Google") && v.name.includes("Female")) ||
        v.name.includes("Samantha") || v.name.includes("Victoria") || v.name.includes("Microsoft Zira")
    );
    if (preferred) u.voice = preferred;
    u.pitch = 1.2; u.rate = 0.92;
    window.speechSynthesis.speak(u);
}
window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };

// ============================================================
// 💡 SUGGESTION ENGINE
// ============================================================
const list = ["Learn Spanish", "Analyze YouTube", "Refine writing", "Build App", "Tell a Story", "Go Shopping", "Check Weather", "Laser Tag", "Track Crypto", "Plan Trip", "Math Help", "Startup Idea", "Write Email", "Recipe Search", "Workout Plan"];
let queue = [...list].sort(() => Math.random() - 0.5);

function rotate() {
    const btns = document.querySelectorAll('#suggestion-container button');
    btns.forEach((btn, i) => {
        setTimeout(() => {
            btn.style.opacity = '0';
            setTimeout(() => {
                if (queue.length < 1) queue = [...list].sort(() => Math.random() - 0.5);
                btn.innerText = queue.shift();
                btn.style.opacity = '1';
            }, 400);
        }, i * 150);
    });
}
setInterval(rotate, 8000);

// ============================================================
// ⚡ CORE HANDLER
// ============================================================
async function handleMessage() {
    const text = userInput.value.trim();
    if (!text) return;
    hero.style.display = 'none';
    chatHistory.classList.remove('hidden');
    userInput.value = "";
    addMsg("user", text);
    const loader = addTypingIndicator();
    try {
        await processResponse(text);
    } finally {
        loader.remove();
    }
}

// ============================================================
// 🔐 AUTH
// ============================================================
async function initApp() {
    const { data: { user } } = await _supabase.auth.getUser();
    if (user) {
        currentUser = user;
        await fetchProfile(user.id);
        if (userProfile) await initDoaBrain(userProfile);
    }
}

async function fetchProfile(uid) {
    let { data } = await _supabase.from('profiles').select('*').eq('id', uid).single();
    userProfile = data;
    if (userProfile) updateUI(data);
}

function updateUI(p) {
    document.getElementById('main-header').innerHTML = `
        <div class="flex items-center gap-6">
            <div class="text-right"><p class="text-black font-black text-sm">🧠 ${p.brain_points}</p><p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">Points</p></div>
            <div class="text-right"><p class="text-black font-black text-sm">💎 ${p.credits}</p><p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">Credits</p></div>
            <button onclick="logout()" class="text-[10px] font-bold text-red-400 hover:text-red-600 transition uppercase tracking-widest">Logout</button>
        </div>`;
    document.querySelector('#hero-section p').innerHTML =
        `Welcome back, <span class="text-[#00E676] font-bold">${p.usename.replace(/'/g, "")}</span>! Your companion is ready.`;
}

async function addPoints(a) {
    if (!currentUser || !userProfile) return;
    const n = (userProfile.brain_points || 0) + a;
    await _supabase.from('profiles').update({ brain_points: n }).eq('id', currentUser.id);
    userProfile.brain_points = n;
    updateUI(userProfile);
    showToast(`+${a} Points Earned!`);
}

async function login() { const e = prompt("Email:"), p = prompt("Password:"); const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p }); if (error) alert(error.message); else window.location.reload(); }
async function signUp() { const e = prompt("Email:"), p = prompt("Password (6+):"); const { error } = await _supabase.auth.signUp({ email: e, password: p }); alert(error ? error.message : "Check email for link!"); }
function logout() { _supabase.auth.signOut().then(() => window.location.reload()); }

// ============================================================
// 🎛️ EVENTS
// ============================================================
document.getElementById('send-btn').onclick = handleMessage;
userInput.onkeypress = (e) => { if (e.key === 'Enter') handleMessage(); };

document.getElementById('voice-switch').onclick = () => {
    voiceEnabled = !voiceEnabled;
    document.getElementById('voice-knob').style.left = voiceEnabled ? '16px' : '2px';
    document.getElementById('voice-switch').style.backgroundColor = voiceEnabled ? '#00E676' : '#f3f4f6';
    if (voiceEnabled) speak("Voice mode activated. I'm ready!");
};

const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.onresult = (e) => { userInput.value = e.results[0][0].transcript; handleMessage(); };
document.getElementById('mic-btn').onclick = () => { recognition.start(); document.getElementById('mic-btn').style.color = '#00E676'; };
recognition.onend = () => { document.getElementById('mic-btn').style.color = ''; };

document.addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b) return;
    if (b.innerText.includes('Login')) login();
    if (b.innerText.includes('Sign Up')) signUp();
    if (b.closest('#suggestion-container')) { userInput.value = b.innerText; handleMessage(); }
});

initApp();
</script>
</body>
</html>
