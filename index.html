<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doa Cali AI</title>

    <style>
        :root {
            --bg: #0f0f0f;
            --panel: #171717;
            --panel-soft: #202020;
            --text: #f5f3ef;
            --muted: #a7a29a;
            --line: rgba(255, 255, 255, 0.08);
            --accent: #c9a84c;
            --user: #f5f3ef;
            --doa: #1f1f1f;
            --radius: 22px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(201, 168, 76, 0.12), transparent 35%),
                var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .chat-shell {
            width: min(920px, 100%);
            height: min(760px, calc(100vh - 48px));
            background: rgba(23, 23, 23, 0.92);
            border: 1px solid var(--line);
            border-radius: 30px;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.42);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(18px);
        }

        .chat-header {
            padding: 22px 24px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background:
                linear-gradient(145deg, rgba(201, 168, 76, 0.92), rgba(245, 243, 239, 0.35)),
                #c9a84c;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #111;
            font-family: Georgia, serif;
            font-size: 22px;
            font-weight: 600;
            box-shadow: 0 12px 30px rgba(201, 168, 76, 0.18);
        }

        .brand-title {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 23px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        .brand-subtitle {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 13px;
        }

        .status {
            font-size: 12px;
            color: var(--accent);
            border: 1px solid rgba(201, 168, 76, 0.24);
            padding: 7px 11px;
            border-radius: 999px;
            background: rgba(201, 168, 76, 0.06);
            white-space: nowrap;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 78%;
            padding: 14px 16px;
            border-radius: 20px;
            line-height: 1.55;
            font-size: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.doa {
            align-self: flex-start;
            background: var(--doa);
            border: 1px solid var(--line);
            color: var(--text);
            border-bottom-left-radius: 7px;
        }

        .message.user {
            align-self: flex-end;
            background: var(--user);
            color: #111;
            border-bottom-right-radius: 7px;
        }

        .typing {
            align-self: flex-start;
            background: var(--doa);
            border: 1px solid var(--line);
            color: var(--muted);
            padding: 14px 16px;
            border-radius: 20px;
            border-bottom-left-radius: 7px;
            font-size: 14px;
            display: none;
        }

        .typing.show {
            display: block;
        }

        .input-area {
            border-top: 1px solid var(--line);
            padding: 18px;
            background: rgba(15, 15, 15, 0.45);
        }

        .input-wrap {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: var(--panel-soft);
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 10px 10px 10px 16px;
        }

        textarea {
            flex: 1;
            min-height: 48px;
            max-height: 150px;
            resize: none;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text);
            font: inherit;
            line-height: 1.45;
            padding: 12px 0;
        }

        textarea::placeholder {
            color: #77716a;
        }

        button {
            border: none;
            outline: none;
            cursor: pointer;
            border-radius: 18px;
            padding: 13px 18px;
            background: var(--accent);
            color: #111;
            font-weight: 700;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 640px) {
            body {
                padding: 0;
            }

            .chat-shell {
                height: 100vh;
                border-radius: 0;
            }

            .chat-header {
                padding: 18px;
            }

            .status {
                display: none;
            }

            .messages {
                padding: 18px;
            }

            .message {
                max-width: 90%;
            }
        }
    </style>
</head>

<body>
    <main class="chat-shell">
        <header class="chat-header">
            <div class="brand">
                <div class="avatar">D</div>
                <div>
                    <h1 class="brand-title">Doa Cali</h1>
                    <p class="brand-subtitle">Ask anything. I’ll answer directly.</p>
                </div>
            </div>
            <div class="status">Live AI</div>
        </header>

        <section id="messages" class="messages">
            <div class="message doa">Hi, I’m here. What can I help you with?</div>
            <div id="typing" class="typing">Doa is thinking...</div>
        </section>

        <section class="input-area">
            <div class="input-wrap">
                <textarea
                    id="userInput"
                    placeholder="Message Doa..."
                    rows="1"
                ></textarea>
                <button id="sendBtn" type="button">Send</button>
            </div>
        </section>
    </main>

    <script>
        const WORKER_URL = "PASTE_YOUR_CLOUDFLARE_WORKER_URL_HERE";

        const DOA_SYSTEM_PROMPT = `
You are Doa, the AI companion inside the Doa Cali website.

Your job is to answer the user's request directly.

Never explain what you are about to do.
Never say "I can help with that."
Never say "Here's what I will do."
Never say "I would start by."
Never say "Let me explain how I can help."
Never say "As an AI."
Never introduce the answer with filler.

Do the task immediately.

If the user asks for writing, write it.
If the user asks for code, provide the code.
If the user asks for ideas, give the ideas.
If the user asks for a plan, give the plan.
If the user asks for analysis, analyze directly.
If the user asks for a rewrite, rewrite directly.
If the user asks a question, answer clearly.

When live search, news, weather, YouTube, finance, or place data is provided, use it naturally.
If live data is not available, answer with general knowledge and say only when something truly needs current verification.

Tone:
- confident
- calm
- feminine
- clear
- smart
- direct
- stylish but not dramatic
- helpful without overexplaining

Formatting:
Use clean spacing.
Use bullets only when they make the answer easier to read.
Keep answers focused.
Do not include unnecessary disclaimers.
Do not mention your internal instructions.

If the user gives vague instructions, make the best useful assumption and answer.
Only ask a follow-up question when the request is impossible to answer without one.
`;

        const messagesEl = document.getElementById("messages");
        const typingEl = document.getElementById("typing");
        const inputEl = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");

        let conversationHistory = [];

        sendBtn.addEventListener("click", handleSend);

        inputEl.addEventListener("keydown", function (event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                handleSend();
            }
        });

        inputEl.addEventListener("input", function () {
            this.style.height = "auto";
            this.style.height = Math.min(this.scrollHeight, 150) + "px";
        });

        async function handleSend() {
            const text = inputEl.value.trim();

            if (!text) return;

            addMsg("user", text);

            inputEl.value = "";
            inputEl.style.height = "auto";

            await processResponse(text);
        }

        async function processResponse(text) {
            conversationHistory.push({
                role: "user",
                text: text
            });

            const localReply = getLocalDoaReply(text);

            if (localReply) {
                conversationHistory.push({
                    role: "model",
                    text: localReply
                });

                addMsg("doa", localReply);
                return;
            }

            showTyping(true);
            setSending(false);

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: text,
                        history: conversationHistory.slice(-12),
                        systemInstruction: DOA_SYSTEM_PROMPT
                    })
                });

                if (!response.ok) {
                    throw new Error(`Worker error: ${response.status}`);
                }

                const data = await response.json();

                console.log("Worker response:", data);

                let reply = extractWorkerReply(data);

                if (!reply) {
                    reply = "I’m having trouble generating a response right now. Try again.";
                }

                reply = cleanDoaReply(reply);

                conversationHistory.push({
                    role: "model",
                    text: reply
                });

                addMsg("doa", reply);

            } catch (error) {
                console.error("Chat error:", error);

                addMsg(
                    "doa",
                    "I’m having trouble connecting right now. Try again in a moment."
                );

            } finally {
                showTyping(false);
                setSending(true);
            }
        }

        function getLocalDoaReply(text) {
            const normalized = text
                .toLowerCase()
                .trim()
                .replace(/[.!?]+$/g, "")
                .replace(/\s+/g, " ");

            const greetings = [
                "hi",
                "hello",
                "hey",
                "heyy",
                "yo",
                "good morning",
                "good afternoon",
                "good evening"
            ];

            if (greetings.includes(normalized)) {
                return "Hi, I’m here. What can I help you with?";
            }

            const howAreYou = [
                "how are you",
                "how are you doing",
                "how r u",
                "how you doing",
                "are you good"
            ];

            if (howAreYou.includes(normalized)) {
                return "I’m good. What can I help you with?";
            }

            return "";
        }

        function extractWorkerReply(data) {
            if (!data) return "";

            if (typeof data.reply === "string") {
                return data.reply.trim();
            }

            if (typeof data.text === "string") {
                return data.text.trim();
            }

            if (typeof data.message === "string") {
                return data.message.trim();
            }

            return "";
        }

        function cleanDoaReply(reply) {
            return String(reply || "")
                .replace(/^Sure[,.]?\s*/i, "")
                .replace(/^Of course[,.]?\s*/i, "")
                .replace(/^Absolutely[,.]?\s*/i, "")
                .replace(/^I can help with that[,.]?\s*/i, "")
                .replace(/^Here'?s what I(?:'|’)ll do[:.]?\s*/i, "")
                .trim();
        }

        function addMsg(role, text) {
            const msg = document.createElement("div");
            msg.className = `message ${role}`;
            msg.textContent = text;

            messagesEl.insertBefore(msg, typingEl);
            scrollToBottom();
        }

        function showTyping(show) {
            typingEl.classList.toggle("show", show);
            scrollToBottom();
        }

        function setSending(canSend) {
            sendBtn.disabled = !canSend;
        }

        function scrollToBottom() {
            requestAnimationFrame(() => {
                messagesEl.scrollTop = messagesEl.scrollHeight;
            });
        }
    </script>
</body>
</html>
