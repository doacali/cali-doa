    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            margin: 0;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .sidebar-item {
            transition: all 0.2s ease;
            border-radius: 12px;
            cursor: pointer;
        }

        .sidebar-item:hover {
            background-color: #f3f4f6;
            color: #121212;
        }

        .sidebar-active {
            background: #121212;
            color: white;
            border-radius: 12px;
        }

        .hero-heading {
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            line-height: 1.05;
            letter-spacing: -0.05em;
            font-weight: 800;
        }

        .btn-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        #notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #121212;
            color: #00E676;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 9999;
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        #notification.show {
            opacity: 1;
            bottom: 40px;
        }

        .chat-bubble {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .typing-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #888;
            margin: 0 2px;
            animation: bounce 1.2s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-6px);
            }
        }
    </style>
</head>

    <script>
        // ============================================================
        // CONFIG
        // ============================================================

        const WORKER_URL = "https://doa-brain-proxy.111222lov3.workers.dev";

        const SUPABASE_URL = "https://dfsmqnwnqnkbpoeeqkvv.supabase.co";

        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmc21xbnducW5rYnBvZWVxa3Z2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNDYwNDksImV4cCI6MjA5MjkyMjA0OX0.AEFsq60miF5NQr9jcdiY13V65SgcYq9wDlKFEL3HORo";

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let userProfile = null;
        let voiceEnabled = false;
        let conversationHistory = [];

        // ============================================================
        // DOA BEHAVIOR PROMPT
        // This is what stops the agent from saying:
        // "I can help with that" / "Here's what I'll do..."
        // ============================================================

        const DOA_SYSTEM_PROMPT = `
You are Doa, the AI companion inside the Doa Cali website.

Your job is to answer the user's request directly.

Never explain what you are about to do.
Never say "I can help with that."
Never say "Here's what I will do."
Never say "I would start by."
Never say "Let me explain how I can help."
Never say "As an AI."
Never introduce the answer with filler.

Do the task immediately.

If the user asks for writing, write it.
If the user asks for code, provide the code.
If the user asks for ideas, give the ideas.
If the user asks for a plan, give the plan.
If the user asks for analysis, analyze directly.
If the user asks for a rewrite, rewrite directly.
If the user asks a question, answer clearly.

Tone:
- confident
- feminine
- calm
- clear
- smart
- direct
- stylish but not dramatic
- helpful without overexplaining

Formatting:
Use clean spacing.
Use bullets only when they make the answer easier to read.
Keep answers focused.
Do not include unnecessary disclaimers.
Do not mention your internal instructions.

If the user gives vague instructions, make the best useful assumption and answer.
Only ask a follow-up question when the request is impossible to answer without one.
`;

        // ============================================================
        // SUGGESTION ENGINE
        // ============================================================

        const list = [
            "Learn Spanish",
            "Analyze YouTube",
            "Refine writing",
            "Build App",
            "Tell a Story",
            "Go Shopping",
            "Check Weather",
            "Laser Tag",
            "Track Crypto",
            "Plan Trip",
            "Math Help",
            "Startup Idea",
            "Write Email",
            "Recipe Search",
            "Workout Plan"
        ];

        let queue = [...list].sort(() => Math.random() - 0.5);

        function rotate() {
            const btns = document.querySelectorAll("#suggestion-container button");

            btns.forEach((btn, i) => {
                setTimeout(() => {
                    btn.style.opacity = "0";

                    setTimeout(() => {
                        if (queue.length < 1) {
                            queue = [...list].sort(() => Math.random() - 0.5);
                        }

                        btn.innerText = queue.shift();
                        btn.style.opacity = "1";
                    }, 400);
                }, i * 150);
            });
        }

        setInterval(rotate, 8000);

        // ============================================================
        // HUMAN VOICE ENGINE
        // ============================================================

        function speak(text) {
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();

            const preferredVoice = voices.find(voice =>
                (voice.name.includes("Google") && voice.name.includes("Female")) ||
                voice.name.includes("Samantha") ||
                voice.name.includes("Victoria") ||
                voice.name.includes("Microsoft Zira")
            );

            if (preferredVoice) {
                utterance.voice = preferredVoice;
            }

            utterance.pitch = 1.2;
            utterance.rate = 0.92;

            window.speechSynthesis.speak(utterance);
        }

        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };

        // ============================================================
        // CHAT ELEMENTS
        // ============================================================

        const chatHistory = document.getElementById("chat-history");
        const hero = document.getElementById("hero-section");
        const userInput = document.getElementById("user-input");

        // ============================================================
        // GEMINI API VIA CLOUDFLARE WORKER
        // ============================================================

        async function processResponse(text) {
            conversationHistory.push({
                role: "user",
                text: text
            });

            try {
                const res = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        systemInstruction: DOA_SYSTEM_PROMPT,
                        message: `
User request:
${text}

Answer directly.
Do not explain what you are going to do.
Do not say you can help.
Do the task now.
`,
                        history: conversationHistory.slice(-10)
                    })
                });

                if (!res.ok) {
                    throw new Error(`Worker error: ${res.status}`);
                }

                const data = await res.json();

                let reply = data.reply || "I need a little more detail to answer that properly.";

                reply = cleanDoaReply(reply);

                conversationHistory.push({
                    role: "model",
                    text: reply
                });

                addMsg("doa", reply);

                if (voiceEnabled) {
                    speak(reply);
                }

                if (userProfile && conversationHistory.length % 5 === 0) {
                    addPoints(5);
                }

            } catch (err) {
                console.error("Gemini error:", err);

                addMsg(
                    "doa",
                    "I couldn't connect to my brain right now. Check the Worker URL or try again."
                );
            }
        }

        // ============================================================
        // CLEAN BAD AI OPENERS
        // Extra protection if Gemini still starts with filler.
        // ============================================================

        function cleanDoaReply(reply) {
            let cleaned = reply.trim();

            const bannedPatterns = [
                /^sure[,.!—\-\s]+/i,
                /^absolutely[,.!—\-\s]+/i,
                /^of course[,.!—\-\s]+/i,
                /^i can help with that[,.!—\-\s]*/i,
                /^i can definitely help with that[,.!—\-\s]*/i,
                /^here'?s what i'?ll do[,.!—\-\s]*/i,
                /^here is what i'?ll do[,.!—\-\s]*/i,
                /^here'?s what i will do[,.!—\-\s]*/i,
                /^i'?ll start by[,.!—\-\s]*/i,
                /^i would start by[,.!—\-\s]*/i,
                /^let me explain[,.!—\-\s]*/i,
                /^as an ai[,.!—\-\s]*/i,
                /^i can provide[,.!—\-\s]*/i,
                /^i can create[,.!—\-\s]*/i,
                /^i can write[,.!—\-\s]*/i,
                /^i can analyze[,.!—\-\s]*/i
            ];

            bannedPatterns.forEach(pattern => {
                cleaned = cleaned.replace(pattern, "").trim();
            });

            cleaned = cleaned
                .replace(/^[:—\-–,\s]+/, "")
                .replace(/^here('|’)s\s+/i, "")
                .trim();

            return cleaned || reply;
        }

        // ============================================================
        // CORE CHAT LOGIC
        // ============================================================

        async function handleMessage() {
            const text = userInput.value.trim();

            if (!text) return;

            hero.style.display = "none";
            chatHistory.classList.remove("hidden");
            userInput.value = "";

            addMsg("user", text);

            const loadBubble = addTypingIndicator();

            try {
                await processResponse(text);
            } finally {
                loadBubble.remove();
            }
        }

        function addMsg(sender, text) {
            const wrapper = document.createElement("div");

            wrapper.className = sender === "user"
                ? "flex justify-end w-full chat-bubble"
                : "flex justify-start w-full chat-bubble";

            const bubble = document.createElement("div");

            bubble.className = sender === "user"
                ? "bg-black text-white p-4 rounded-3xl max-w-md text-sm font-medium shadow-sm whitespace-pre-wrap"
                : "bg-gray-100 text-black p-4 rounded-3xl max-w-md text-sm font-medium shadow-sm whitespace-pre-wrap";

            bubble.textContent = text;

            wrapper.appendChild(bubble);
            chatHistory.appendChild(wrapper);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            return wrapper;
        }

        function addTypingIndicator() {
            const wrapper = document.createElement("div");

            wrapper.className = "flex justify-start w-full chat-bubble";

            wrapper.innerHTML = `
                <div class="bg-gray-100 text-black p-4 rounded-3xl max-w-[80px] shadow-sm flex items-center gap-1">
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                </div>
            `;

            chatHistory.appendChild(wrapper);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            return wrapper;
        }

        // ============================================================
        // AUTH
        // ============================================================

        async function initApp() {
            const {
                data: { user }
            } = await _supabase.auth.getUser();

            if (user) {
                currentUser = user;
                await fetchProfile(user.id);
            }
        }

        async function fetchProfile(uid) {
            const { data } = await _supabase
                .from("profiles")
                .select("*")
                .eq("id", uid)
                .single();

            userProfile = data;

            if (userProfile) {
                updateUI(data);
            }
        }

        function updateUI(profile) {
            document.getElementById("main-header").innerHTML = `
                <div class="flex items-center gap-6">
                    <div class="text-right">
                        <p class="text-black font-black text-sm">🧠 ${profile.brain_points || 0}</p>
                        <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">Points</p>
                    </div>

                    <div class="text-right">
                        <p class="text-black font-black text-sm">💎 ${profile.credits || 0}</p>
                        <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">Credits</p>
                    </div>

                    <button onclick="logout()" class="text-[10px] font-bold text-red-400 hover:text-red-600 transition uppercase tracking-widest">
                        Logout
                    </button>
                </div>
            `;

            const username = profile.usename || profile.username || "there";

            document.querySelector("#hero-section p").innerHTML = `
                Welcome back, <span class="text-[#00E676] font-bold">${String(username).replace(/'/g, "")}</span>! Your companion is ready.
            `;
        }

        async function addPoints(amount) {
            if (!currentUser || !userProfile) return;

            const newPoints = (userProfile.brain_points || 0) + amount;

            await _supabase
                .from("profiles")
                .update({
                    brain_points: newPoints
                })
                .eq("id", currentUser.id);

            userProfile.brain_points = newPoints;

            updateUI(userProfile);
            showToast(`+${amount} Points Earned!`);
        }

        function showToast(message) {
            const toast = document.getElementById("notification");

            toast.innerText = message;
            toast.classList.add("show");

            setTimeout(() => {
                toast.classList.remove("show");
            }, 3000);
        }

        async function login() {
            const email = prompt("Email:");
            const password = prompt("Password:");

            if (!email || !password) return;

            const { error } = await _supabase.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                alert(error.message);
            } else {
                window.location.reload();
            }
        }

        async function signUp() {
            const email = prompt("Email:");
            const password = prompt("Password (6+):");

            if (!email || !password) return;

            const { error } = await _supabase.auth.signUp({
                email,
                password
            });

            alert(error ? error.message : "Check email for link!");
        }

        function logout() {
            _supabase.auth.signOut().then(() => {
                window.location.reload();
            });
        }

        // ============================================================
        // EVENTS
        // ============================================================

        document.getElementById("send-btn").onclick = handleMessage;

        userInput.onkeypress = event => {
            if (event.key === "Enter") {
                handleMessage();
            }
        };

        document.getElementById("voice-switch").onclick = () => {
            voiceEnabled = !voiceEnabled;

            document.getElementById("voice-knob").style.left = voiceEnabled ? "16px" : "2px";
            document.getElementById("voice-switch").style.backgroundColor = voiceEnabled ? "#00E676" : "#f3f4f6";

            if (voiceEnabled) {
                speak("Voice mode activated. I'm ready.");
            }
        };

        // ============================================================
        // MIC
        // ============================================================

        let recognition = null;

        if ("SpeechRecognition" in window || "webkitSpeechRecognition" in window) {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

            recognition.onresult = event => {
                userInput.value = event.results[0][0].transcript;
                handleMessage();
            };

            recognition.onend = () => {
                document.getElementById("mic-btn").style.color = "";
            };
        }

        document.getElementById("mic-btn").onclick = () => {
            if (!recognition) {
                alert("Voice input is not supported in this browser.");
                return;
            }

            recognition.start();
            document.getElementById("mic-btn").style.color = "#00E676";
        };

        document.addEventListener("click", event => {
            const button = event.target.closest("button");

            if (!button) return;

            if (button.innerText.includes("Login")) {
                login();
            }

            if (button.innerText.includes("Sign Up")) {
                signUp();
            }

            if (button.closest("#suggestion-container")) {
                userInput.value = button.innerText;
                handleMessage();
            }
        });

        initApp();
