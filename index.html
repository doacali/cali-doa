<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cali Doa | Intelligent Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #FBFBFB; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .sidebar-item { transition: all 0.2s ease; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px; font-weight: 600; color: #9ca3af; }
        .sidebar-item:hover { background-color: #f3f4f6; color: #121212; }
        .sidebar-active { background: #121212 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .hero-heading { font-size: clamp(2.2rem, 5vw, 3.8rem); line-height: 1.05; letter-spacing: -0.05em; font-weight: 800; }
        .chat-bubble { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #notification { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #121212; color: #00E676; padding: 12px 24px; border-radius: 50px; font-weight: bold; font-size: 13px; z-index: 9999; transition: all 0.3s ease; opacity: 0; pointer-events: none; }
        #notification.show { opacity: 1; bottom: 40px; }
        .cal-badge { font-size: 9px; font-weight: 900; background: #fee2e2; color: #ef4444; padding: 2px 5px; border-radius: 4px; position: absolute; right: 10px; }
    </style>
</head>
<body>

    <div class="flex h-screen w-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-white border-r border-gray-100 flex flex-col h-full shrink-0">
            <div class="p-6"><h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer" onclick="location.reload()">DOA CALI</h1></div>
            <div class="px-4 mb-4"><input class="w-full bg-gray-50 border border-gray-100 rounded-xl py-2 pl-4 text-[11px] font-bold outline-none uppercase tracking-widest" placeholder="SEARCH..."></div>
            <nav class="flex-1 px-4 space-y-1 overflow-y-auto hide-scrollbar">
                <p class="text-[10px] font-extrabold text-gray-300 uppercase tracking-[0.2em] px-2 mb-2">Main Hub</p>
                <button onclick="location.reload()" class="w-full text-left flex items-center gap-3 p-3 sidebar-active shadow-lg shadow-black/10">💬 <span class="text-sm font-bold">Chat With Doa</span></button>
                <button class="w-full flex items-center justify-between p-3 text-gray-400 sidebar-item">📅 <span class="text-sm font-semibold">Calendar</span> <span id="cal-day" class="cal-badge">--</span></button>
                <button class="w-full text-left flex items-center gap-3 p-3 text-gray-400 sidebar-item">📱 <span class="text-sm font-semibold">Doa Apps</span></button>
                <p class="text-[10px] font-extrabold text-gray-300 uppercase tracking-[0.2em] px-2 mt-8 mb-2">Workspace</p>
                <button class="w-full text-left flex items-center gap-3 p-3 text-gray-400 sidebar-item">⚡ <span class="text-sm font-semibold">Code Builder</span></button>
            </nav>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
            <header id="main-header" class="w-full p-5 flex justify-end items-center gap-8 text-[11px] font-black uppercase tracking-[0.2em] text-gray-400 shrink-0">
                <button onclick="login()" class="hover:text-black">Login</button>
                <button onclick="signUp()" class="text-black bg-[#00E676] px-4 py-2 rounded-lg shadow-sm">Sign Up</button>
            </header>

            <div class="flex-1 flex flex-col items-center justify-start px-10 overflow-hidden">
                <div id="hero-section" class="text-center transition-all duration-700 mt-12 mb-8">
                    <h1 class="hero-heading mb-4">What can <span class="text-[#00E676]">Doa</span> <br> do for you?</h1>
                    <p class="text-gray-400 text-base md:text-lg font-medium max-w-2xl mx-auto leading-relaxed">Your intelligent companion for thinking, building, and creating.</p>
                </div>
                <div id="chat-history" class="w-full max-w-3xl flex-1 overflow-y-auto space-y-6 py-4 hidden"></div>

                <div class="w-full max-w-2xl px-4 shrink-0 pb-6">
                    <div id="suggestion-container" class="flex flex-wrap justify-center gap-2 mb-6 min-h-[40px]">
                        <button class="px-4 py-2.5 bg-white border border-gray-100 rounded-full text-[11px] font-bold shadow-sm hover:border-[#00E676] transition-all">Analyze YouTube</button>
                        <button class="px-4 py-2.5 bg-white border border-gray-100 rounded-full text-[11px] font-bold shadow-sm hover:border-[#00E676] transition-all">Learn Spanish</button>
                        <button class="px-4 py-2.5 bg-white border border-gray-100 rounded-full text-[11px] font-bold shadow-sm hover:border-[#00E676] transition-all">Build App</button>
                    </div>
                    <div class="bg-white border border-gray-200 shadow-[0_20px_50px_rgba(0,0,0,0.06)] rounded-[24px] p-2 flex items-center mb-2 focus-within:border-[#00E676] transition-colors">
                        <input id="user-input" class="flex-1 p-2 outline-none text-[14px] font-medium" placeholder="Ask Doa anything...">
                        <button id="send-btn" class="bg-black text-white w-9 h-9 rounded-full">→</button>
                    </div>
                    <div class="flex justify-end items-center gap-3 pr-2">
                        <span class="text-[9px] font-black text-gray-300 uppercase tracking-[0.2em]">Live Voice</span>
                        <div id="voice-switch" class="w-7 h-3.5 bg-gray-100 rounded-full relative cursor-pointer"><div id="voice-knob" class="absolute left-0.5 top-0.5 w-2.5 h-2.5 bg-white rounded-full shadow-sm transition-all"></div></div>
                    </div>
                </div>
            </div>

            <footer class="w-full py-4 px-8 border-t border-gray-50 flex justify-between items-center text-[8px] font-black text-gray-300 uppercase tracking-[0.3em] bg-white shrink-0">
                <div class="flex gap-8"><a href="#">Privacy Policy</a><a href="#">Terms of Service</a></div>
                <div>© 2026 DOA CALI. ALL RIGHTS RESERVED.</div>
            </footer>
        </main>
    </div>

    <div id="notification"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://dfsmqnwnqnkbpoeeqkvv.supabase.co';
        const SUPABASE_KEY = 'YOUR_KEY_HERE';
        const CLOUDFLARE_PROXY_URL = 'PASTE_YOUR_CLOUDFLARE_URL_HERE'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let voiceEnabled = false;

        // 1. IMPROVED VOICE (Dough-a Pronunciation)
        function speak(t) {
            window.speechSynthesis.cancel();
            // Remove markdown, emojis, and swap "Doa" for "Dowa"
            const cleanText = t.replace(/\bDoa\b/gi, "Dowa")
                              .replace(/\*/g, "")
                              .replace(/[\u{1F600}-\u{1F64F}]/gu, "");
            
            const u = new SpeechSynthesisUtterance(cleanText);
            const voices = window.speechSynthesis.getVoices();
            const preferred = voices.find(v => v.name.includes("Female") || v.name.includes("Samantha"));
            if(preferred) u.voice = preferred;
            u.pitch = 1.2; u.rate = 0.95;
            window.speechSynthesis.speak(u);
        }

        // 2. BRAIN LOGIC
        async function processResponse(text) {
            try {
                const response = await fetch(CLOUDFLARE_PROXY_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text: text })
                });
                const data = await response.json();
                const aiMsg = data.candidates[0].content.parts[0].text;
                addMsg("doa", aiMsg);
                if(voiceEnabled) speak(aiMsg);
            } catch (e) { addMsg("doa", "Neural link fuzzy!"); }
        }

        // 3. UI
        function addMsg(s, t) {
            const d = document.createElement('div');
            d.className = s === "user" ? "flex justify-end my-4" : "flex justify-start my-4";
            d.innerHTML = `<div class="${s === 'user' ? 'bg-black text-white' : 'bg-gray-100'} p-4 rounded-3xl max-w-sm text-sm">${t}</div>`;
            document.getElementById('chat-history').appendChild(d);
            document.getElementById('chat-history').classList.remove('hidden');
        }

        // 4. INIT
        document.getElementById('send-btn').onclick = () => {
            const input = document.getElementById('user-input');
            addMsg('user', input.value);
            processResponse(input.value);
            input.value = "";
        };

        document.getElementById('voice-switch').onclick = () => {
            voiceEnabled = !voiceEnabled;
            document.getElementById('voice-knob').style.left = voiceEnabled ? "16px" : "2px";
            document.getElementById('voice-switch').style.backgroundColor = voiceEnabled ? "#00E676" : "#e5e7eb";
        };
        
        document.getElementById('cal-day').innerText = new Date().getDate();
    </script>
</body>
</html>
