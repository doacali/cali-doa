<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cali Doa | Intelligent Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #FBFBFB; }
        .hero-heading { font-size: clamp(2.2rem, 5vw, 3.8rem); line-height: 1.05; letter-spacing: -0.05em; font-weight: 800; }
        #notification { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #121212; color: #00E676; padding: 12px 24px; border-radius: 50px; font-weight: bold; font-size: 13px; z-index: 9999; transition: all 0.3s ease; opacity: 0; pointer-events: none; }
        #notification.show { opacity: 1; bottom: 40px; }
    </style>
</head>
<body class="text-gray-900">

    <div class="flex h-screen w-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-white border-r border-gray-100 flex flex-col h-full shrink-0">
            <div class="p-6"><h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase">DOA CALI</h1></div>
            <nav class="flex-1 px-4 space-y-1 overflow-y-auto">
                <button class="w-full flex items-center gap-3 p-3 bg-black text-white rounded-2xl">💬 <span class="text-sm font-bold">Chat With Doa</span></button>
            </nav>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 flex flex-col bg-white h-full relative">
            <header class="p-5 flex justify-end gap-6 text-[10px] font-black uppercase tracking-[0.2em] text-gray-400">
                <button onclick="login()" class="hover:text-black">Login</button>
                <button onclick="signUp()" class="text-black bg-[#00E676] px-4 py-2 rounded-lg">Sign Up</button>
            </header>

            <div class="flex-1 flex flex-col items-center justify-center p-10">
                <div id="hero-section" class="text-center mb-12">
                    <h1 class="hero-heading mb-4">What can <span class="text-[#00E676]">Doa</span> <br> do for you?</h1>
                    <p class="text-gray-400 text-base font-medium">Your intelligent companion.</p>
                </div>
                <div id="chat-history" class="w-full max-w-2xl flex-1 overflow-y-auto space-y-4 mb-4 hidden"></div>
                
                <div class="w-full max-w-2xl">
                    <div class="bg-white border shadow-xl rounded-[24px] p-2 flex items-center">
                        <input id="user-input" class="flex-1 p-3 outline-none" placeholder="Ask Doa anything...">
                        <button id="send-btn" class="bg-black text-white w-10 h-10 rounded-full">→</button>
                    </div>
                    <div class="flex justify-end items-center gap-3 mt-4">
                        <span class="text-[9px] font-black text-gray-300 uppercase">Live Voice</span>
                        <div id="voice-switch" class="w-8 h-4 bg-gray-200 rounded-full relative cursor-pointer"><div id="voice-knob" class="absolute left-1 top-1 w-2 h-2 bg-white rounded-full transition-all"></div></div>
                    </div>
                </div>
            </div>
            
            <footer class="p-6 border-t flex justify-between text-[9px] font-black uppercase tracking-[0.2em] text-gray-300">
                <span>© 2026 DOA CALI</span>
                <span>Privacy • Terms</span>
            </footer>
        </main>
    </div>

    <div id="notification"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const CLOUDFLARE_PROXY_URL = 'https://doa-brain-proxy.111222lov3.workers.dev'; 
        let voiceEnabled = false;

        async function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t.replace(/\*/g, "").replace(/[\u{1F600}-\u{1F64F}]/gu, ""));
            const voices = window.speechSynthesis.getVoices();
            const pref = voices.find(v => v.name.includes("Female") || v.name.includes("Samantha"));
            if(pref) u.voice = pref;
            u.pitch = 1.2; u.rate = 0.95;
            window.speechSynthesis.speak(u);
        }

        async function processResponse(text) {
            try {
                const res = await fetch(CLOUDFLARE_PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const data = await res.json();
                const aiMsg = data.candidates[0].content.parts[0].text;
                addMsg("doa", aiMsg);
                if(voiceEnabled) speak(aiMsg);
            } catch (e) { addMsg("doa", "Neural link fuzzy!"); }
        }

        async function handleMessage() {
            const input = document.getElementById('user-input');
            if(!input.value) return;
            document.getElementById('hero-section').style.display = 'none';
            document.getElementById('chat-history').classList.remove('hidden');
            addMsg("user", input.value);
            const val = input.value;
            input.value = "";
            await processResponse(val);
        }

        function addMsg(s, t) {
            const d = document.createElement('div');
            d.className = s === "user" ? "flex justify-end my-4" : "flex justify-start my-4";
            d.innerHTML = `<div class="${s === 'user' ? 'bg-black text-white' : 'bg-gray-100'} p-4 rounded-3xl max-w-md text-sm">${t}</div>`;
            document.getElementById('chat-history').appendChild(d);
        }

        document.getElementById('send-btn').onclick = handleMessage;
        document.getElementById('voice-switch').onclick = () => { 
            voiceEnabled = !voiceEnabled; 
            document.getElementById('voice-knob').style.left = voiceEnabled ? "16px" : "2px"; 
            document.getElementById('voice-switch').style.backgroundColor = voiceEnabled ? "#00E676" : "#e5e7eb";
        };
    </script>
</body>
</html>
