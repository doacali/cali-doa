<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free AI Agent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      color: #00ffcc;
    }

    #status {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 20px;
    }

    #chat-box {
      width: 90%;
      max-width: 700px;
      height: 400px;
      background: #111;
      border-radius: 16px;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px solid #222;
    }

    .message {
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 80%;
      font-size: 0.95rem;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .user-message {
      background: #1a1aff22;
      border: 1px solid #1a1aff44;
      align-self: flex-end;
      color: #aaaaff;
    }

    .ai-message {
      background: #00ffcc11;
      border: 1px solid #00ffcc33;
      align-self: flex-start;
      color: #00ffcc;
    }

    .thinking {
      color: #555;
      font-style: italic;
      align-self: flex-start;
    }

    #controls {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      width: 90%;
      max-width: 700px;
    }

    #user-input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid #333;
      background: #111;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }

    #user-input:focus {
      border-color: #00ffcc;
    }

    button {
      padding: 14px 20px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      transition: all 0.2s;
    }

    #send-btn {
      background: #00ffcc;
      color: #000;
    }

    #send-btn:hover {
      background: #00ddaa;
    }

    #mic-btn {
      background: #1a1aff;
      color: #fff;
      font-size: 1.3rem;
    }

    #mic-btn.listening {
      background: #ff1a1a;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 #ff1a1a66; }
      70%  { box-shadow: 0 0 0 10px #ff1a1a00; }
      100% { box-shadow: 0 0 0 0 #ff1a1a00; }
    }

    #stop-btn {
      background: #333;
      color: #fff;
    }

    #stop-btn:hover {
      background: #444;
    }

    #model-status {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #555;
    }

    #progress-bar {
      width: 90%;
      max-width: 700px;
      height: 4px;
      background: #222;
      border-radius: 4px;
      margin-top: 8px;
      overflow: hidden;
      display: none;
    }

    #progress-fill {
      height: 100%;
      background: #00ffcc;
      width: 0%;
      transition: width 0.3s;
    }

    #memory-count {
      margin-top: 10px;
      font-size: 0.75rem;
      color: #444;
    }

    #voice-select {
      padding: 10px;
      border-radius: 10px;
      background: #111;
      color: #fff;
      border: 1px solid #333;
      margin-top: 10px;
      width: 90%;
      max-width: 700px;
    }
  </style>
</head>
<body>

  <h1>🤖 Free AI Agent</h1>
  <div id="status">⏳ Loading AI model into your browser...</div>

  <div id="progress-bar">
    <div id="progress-fill"></div>
  </div>

  <div id="chat-box">
    <div class="message ai-message">
      👋 Hi! I'm your free AI agent. I run entirely in your browser — no servers, no cost, unlimited users!
    </div>
  </div>

  <select id="voice-select">
    <option>🔊 Loading voices...</option>
  </select>

  <div id="controls">
    <input 
      type="text" 
      id="user-input" 
      placeholder="Type a message or use mic..." 
      onkeydown="if(event.key==='Enter') sendMessage()"
    />
    <button id="mic-btn" onclick="toggleMic()">🎤</button>
    <button id="send-btn" onclick="sendMessage()">Send</button>
    <button id="stop-btn" onclick="stopSpeaking()">⏹</button>
  </div>

  <div id="model-status">Model: Not loaded yet</div>
  <div id="memory-count">💾 Memory: 0 conversations stored</div>

  <!-- Transformers.js from CDN -->
  <script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

    // ─────────────────────────────────────
    // CONFIG
    // ─────────────────────────────────────
    env.allowLocalModels = false;

    const MODEL_NAME = 'Xenova/Phi-3-mini-4k-instruct';
    // Lighter alternative if slow:
    // const MODEL_NAME = 'Xenova/TinyLlama-1.1B-Chat-v1.0';

    let generator = null;
    let isListening = false;
    let recognition = null;
    let voices = [];
    let selectedVoice = null;
    let conversationHistory = [];

    // ─────────────────────────────────────
    // LOAD VOICES
    // ─────────────────────────────────────
    function loadVoices() {
      voices = window.speechSynthesis.getVoices();
      const select = document.getElementById('voice-select');
      select.innerHTML = '';
      voices.forEach((voice, i) => {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = `${voice.name} (${voice.lang})`;
        select.appendChild(option);
      });
      select.addEventListener('change', () => {
        selectedVoice = voices[select.value];
      });
      if (voices.length > 0) selectedVoice = voices[0];
    }

    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    // ─────────────────────────────────────
    // MEMORY (localStorage)
    // ─────────────────────────────────────
    function saveMemory(userMsg, aiMsg) {
      let memory = JSON.parse(localStorage.getItem('ai_memory') || '[]');
      memory.push({ user: userMsg, ai: aiMsg, time: Date.now() });
      if (memory.length > 100) memory = memory.slice(-100); // keep last 100
      localStorage.setItem('ai_memory', JSON.stringify(memory));
      updateMemoryCount();
    }

    function loadMemory() {
      const memory = JSON.parse(localStorage.getItem('ai_memory') || '[]');
      conversationHistory = memory.flatMap(m => [
        { role: 'user', content: m.user },
        { role: 'assistant', content: m.ai }
      ]);
      updateMemoryCount();
    }

    function updateMemoryCount() {
      const memory = JSON.parse(localStorage.getItem('ai_memory') || '[]');
      document.getElementById('memory-count').textContent =
        `💾 Memory: ${memory.length} conversations stored`;
    }

    // ─────────────────────────────────────
    // CHAT UI
    // ─────────────────────────────────────
    function addMessage(text, type) {
      const chatBox = document.getElementById('chat-box');
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    // ─────────────────────────────────────
    // SPEAK
    // ─────────────────────────────────────
    function speak(text) {
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      if (selectedVoice) utterance.voice = selectedVoice;
      utterance.rate = 1.0;
      utterance.pitch = 1.0;
      utterance.volume = 1.0;
      window.speechSynthesis.speak(utterance);
    }

    window.stopSpeaking = function() {
      window.speechSynthesis.cancel();
    };

    // ─────────────────────────────────────
    // SPEECH RECOGNITION (mic)
    // ─────────────────────────────────────
    window.toggleMic = function() {
      const btn = document.getElementById('mic-btn');

      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('Speech recognition not supported in this browser. Try Chrome!');
        return;
      }

      if (isListening) {
        recognition.stop();
        isListening = false;
        btn.classList.remove('listening');
        btn.textContent = '🎤';
        return;
      }

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.continuous = false;
      recognition.interimResults = false;

      recognition.onstart = () => {
        isListening = true;
        btn.classList.add('listening');
        btn.textContent = '🔴';
        document.getElementById('status').textContent = '🎤 Listening...';
      };

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        document.getElementById('user-input').value = transcript;
        isListening = false;
        btn.classList.remove('listening');
        btn.textContent = '🎤';
        sendMessage();
      };

      recognition.onerror = (e) => {
        isListening = false;
        btn.classList.remove('listening');
        btn.textContent = '🎤';
        document.getElementById('status').textContent = '❌ Mic error: ' + e.error;
      };

      recognition.onend = () => {
        isListening = false;
        btn.classList.remove('listening');
        btn.textContent = '🎤';
      };

      recognition.start();
    };

    // ─────────────────────────────────────
    // SEND MESSAGE
    // ─────────────────────────────────────
    window.sendMessage = async function() {
      const input = document.getElementById('user-input');
      const userText = input.value.trim();
      if (!userText) return;
      if (!generator) {
        alert('AI model is still loading, please wait...');
        return;
      }

      input.value = '';
      addMessage(userText, 'user-message');

      const thinkingDiv = addMessage('🤔 Thinking...', 'message thinking');

      // Build prompt with history
      conversationHistory.push({ role: 'user', content: userText });

      // Keep last 10 exchanges for context
      const recentHistory = conversationHistory.slice(-20);

      try {
        const output = await generator(recentHistory, {
          max_new_tokens: 256,
          temperature: 0.7,
          do_sample: true,
          repetition_penalty: 1.1,
        });

        const aiText = output[0]?.generated_text?.at(-1)?.content || 
                       'Sorry, I could not generate a response.';

        thinkingDiv.remove();
        addMessage(aiText, 'ai-message');
        speak(aiText);

        conversationHistory.push({ role: 'assistant', content: aiText });
        saveMemory(userText, aiText);

      } catch (err) {
        thinkingDiv.remove();
        addMessage('❌ Error: ' + err.message, 'message thinking');
        console.error(err);
      }
    };

    // ─────────────────────────────────────
    // LOAD AI MODEL
    // ─────────────────────────────────────
    async function loadModel() {
      const statusEl = document.getElementById('status');
      const modelStatusEl = document.getElementById('model-status');
      const progressBar = document.getElementById('progress-bar');
      const progressFill = document.getElementById('progress-fill');

      progressBar.style.display = 'block';
      statusEl.textContent = '⏳ Downloading AI model (first time only)...';

      try {
        generator = await pipeline('text-generation', MODEL_NAME, {
          progress_callback: (progress) => {
            if (progress.progress) {
              const pct = Math.round(progress.progress);
              progressFill.style.width = pct + '%';
              statusEl.textContent = `⏳ Loading model: ${pct}% — ${progress.file || ''}`;
            }
          }
        });

        progressBar.style.display = 'none';
        statusEl.textContent = '✅ AI Ready! — Running 100% in your browser';
        modelStatusEl.textContent = `Model: ${MODEL_NAME} ✅`;
        loadMemory();
        addMessage('✅ AI model loaded! I remember your previous conversations. Ask me anything!', 'ai-message');
        speak('AI model loaded and ready! I remember your previous conversations. Ask me anything!');

      } catch (err) {
        statusEl.textContent = '❌ Failed to load model: ' + err.message;
        console.error(err);
      }
    }

    // START
    loadModel();

  </script>

</body>
</html>
