<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cali Doa | Multi-Agent Neural X.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .sidebar-item { transition: all 0.2s ease; border-radius: 12px; cursor: pointer; }
        .sidebar-item:hover { background-color: #f3f4f6; color: #121212; }
        .sidebar-active { background: #121212; color: white; border-radius: 12px; }
        .hero-heading { font-size: clamp(2.2rem, 5vw, 3.8rem); line-height: 1.05; letter-spacing: -0.05em; font-weight: 800; }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        #notification { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #121212; color: #00E676; padding: 12px 24px; border-radius: 50px; font-weight: bold; font-size: 13px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 9999; transition: all 0.3s ease; opacity: 0; pointer-events: none; }
        #notification.show { opacity: 1; bottom: 40px; }
        .chat-bubble { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #efficiency-bar { transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 15px rgba(0, 230, 118, 0.4); }
    </style>
</head>
<body class="bg-[#FBFBFB] text-gray-900">

    <div class="flex h-screen w-screen overflow-hidden">
        <!-- 1. SIDEBAR -->
        <aside class="w-64 bg-white border-r border-gray-100 flex flex-col h-full shrink-0">
            <div class="p-6"><h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer">DOA CALI</h1></div>
            <nav class="flex-1 px-4 space-y-1 overflow-y-auto hide-scrollbar">
                <p class="text-[10px] font-extrabold text-gray-300 uppercase tracking-[0.2em] px-2 mb-2">Main Hub</p>
                <button onclick="location.reload()" class="w-full text-left flex items-center gap-3 p-3 sidebar-active shadow-lg shadow-black/10">💬 <span class="text-sm font-bold">Chat With Doa</span></button>
                <button class="w-full flex items-center justify-between p-3 text-gray-400 sidebar-item text-left">📅 <span class="text-sm font-semibold">Calendar</span> <span class="bg-red-100 text-red-500 text-[10px] px-1.5 rounded font-black">31</span></button>
                <button class="w-full text-left flex items-center gap-3 p-3 text-gray-400 sidebar-item">📱 <span class="text-sm font-semibold">Doa Apps</span></button>
                <p class="text-[10px] font-extrabold text-gray-300 uppercase tracking-[0.2em] px-2 mt-8 mb-2">Workspace</p>
                <button class="w-full text-left flex items-center gap-3 p-3 text-gray-400 sidebar-item">⚡ <span class="text-sm font-semibold">Skill Builder</span></button>
                <button class="w-full text-left flex items-center justify-between p-3 text-gray-400 sidebar-item">📂 <span class="text-sm font-semibold">Saved Tabs</span> <span>⌄</span></button>
            </nav>
            <div class="p-6 border-t border-gray-50">
                <div class="flex justify-between items-center mb-2">
                    <p class="text-[9px] font-extrabold text-gray-300 uppercase tracking-[0.2em]">Neural Efficiency</p>
                    <span id="efficiency-percent" class="text-[10px] font-black text-[#00E676]">0%</span>
                </div>
                <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden">
                    <div id="efficiency-bar" class="bg-[#00E676] h-full" style="width: 0%"></div>
                </div>
                <p id="meter-status" class="text-[8px] text-gray-400 mt-2 font-bold uppercase tracking-widest italic">VERSION X.0 ONLINE</p>
            </div>
        </aside>

        <!-- 2. MAIN WORKSPACE -->
        <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
            <header id="main-header" class="w-full p-5 flex justify-end items-center gap-8 text-[11px] font-black uppercase tracking-[0.2em] text-gray-400 shrink-0">
                <button class="hover:text-black transition-colors">Login</button><button class="text-black bg-[#00E676] px-4 py-2 rounded-lg font-bold shadow-sm">Sign Up</button>
            </header>

            <div class="flex-1 w-full flex flex-col items-center justify-start px-10 overflow-hidden relative">
                <div id="hero-section" class="text-center transition-all duration-700 mt-12 mb-8">
                    <h1 class="hero-heading mb-4">What can <span class="text-[#00E676]">Doa</span> <br> do for you?</h1>
                    <p class="text-gray-400 text-base md:text-lg font-medium max-w-3xl w-full mx-auto leading-relaxed">Neural X.0 Brain Active • Processing multi-agent workflows.</p>
                </div>

                <div id="chat-history" class="w-full max-w-3xl flex-1 overflow-y-auto hide-scrollbar space-y-6 py-4 hidden"></div>

                <div class="w-full max-w-2xl px-4 shrink-0 pb-6">
                    <div id="suggestion-container" class="flex flex-wrap justify-center gap-2 mb-6 min-h-[40px]">
                        <button class="px-4 py-2.5 bg-white border border-gray-100 rounded-full text-[11px] font-bold shadow-sm hover:border-[#00E676] transition-all">Verify a Fact</button>
                        <button class="px-4 py-2.5 bg-white border border-gray-100 rounded-full text-[11px] font-bold shadow-sm hover:border-[#00E676] transition-all">Build a Plan</button>
                        <button class="px-4 py-2.5 bg-white border border-gray-100 rounded-full text-[11px] font-bold shadow-sm hover:border-[#00E676] transition-all">Optimize Logic</button>
                    </div>

                    <div class="bg-white border border-gray-200 shadow-[0_20px_50px_rgba(0,0,0,0.06)] rounded-[24px] p-2 flex items-center mb-2 focus-within:border-[#00E676] transition-colors">
                        <button class="p-3 text-gray-300 text-xl font-light hover:text-black">+</button>
                        <input id="user-input" class="flex-1 p-2 outline-none text-[14px] font-medium placeholder-gray-400" placeholder="Feed Doa data or tasks...">
                        <button id="mic-btn" class="p-2 text-gray-300">🎤</button>
                        <button id="send-btn" class="bg-black text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-[#00E676] shadow-lg transition-all">→</button>
                    </div>
                    <div class="flex justify-end items-center gap-3 pr-2">
                        <span class="text-[9px] font-black text-gray-300 tracking-[0.2em] uppercase">Neural Reasoner</span>
                        <div id="voice-switch" class="w-7 h-3.5 bg-gray-100 rounded-full relative cursor-pointer transition-colors"><div id="voice-knob" class="absolute left-0.5 top-0.5 w-2.5 h-2.5 bg-white rounded-full shadow-sm transition-all"></div></div>
                    </div>
                </div>
            </div>

            <footer class="w-full py-4 px-8 border-t border-gray-50 flex justify-between items-center text-[8px] font-black text-gray-300 uppercase tracking-[0.3em] bg-white shrink-0">
                <div class="flex gap-8"><a href="#">Privacy Policy</a><a href="#">Terms of Service</a><a href="#">Affiliate Disclaimer</a></div>
                <div>© 2026 <span class="text-[#00E676]">DOA CALI</span> • X.0 CORE</div>
            </footer>
        </main>
    </div>

    <div id="notification"></div>

    <!-- DOA X.0 NEURAL BRAIN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://dfsmqnwnqnkbpoeeqkvv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmc21xbnducW5rYnBvZWVxa3Z2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNDYwNDksImV4cCI6MjA5MjkyMjA0OX0.AEFsq60miF5NQr9jcdiY13V65SgcYq9wDlKFEL3HORo';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userProfile = null, voiceEnabled = false, bestVoice = null;
        let userMemory = { learned: [], skills: [], preferences: {}, history: [], graph: [] };

        // --- 1. CORE BRAIN HELPERS ---
        function doaSelfPing(message) { console.log("🧠 Doa Internal:", message); }

        async function ddgLookup(query) {
            try {
                const res = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`);
                return await res.json();
            } catch (e) { return null; }
        }

        async function wikiSummary(topic) {
            try {
                const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(topic)}`);
                return res.ok ? await res.json() : null;
            } catch (e) { return null; }
        }

        // --- 2. CROSS-VERIFICATION ENGINE ---
        async function crossVerifyFact(fact) {
            doaSelfPing("Cross-verifying: " + fact);
            const ddg = await ddgLookup(fact);
            const topic = fact.split(" ").slice(0, 3).join(" ");
            const wiki = await wikiSummary(topic);
            if ((ddg && ddg.AbstractText) || (wiki && wiki.extract)) return { status: "verified", proof: "Web Sources" };
            return { status: "user_preference", proof: "User Input" };
        }

        // --- 3. SKILL & WORKFLOW SYSTEM ---
        function autoBuildSkillFromPlan(userText, plan) {
            if (!plan.steps) return;
            const name = "workflow_" + Date.now();
            userMemory.skills.push({ name, pattern: userText.slice(0, 20), steps: plan.steps, efficiency_score: 0 });
            doaSelfPing("Auto-built new skill: " + name);
        }

        // --- 4. MULTI-AGENT PIPELINE ---
        function plannerAgent(text) {
            const low = text.toLowerCase();
            let steps = ["Understand context", "Verify memory", "Draft response"];
            if (low.includes("plan") || low.includes("how to")) steps = ["Analyze Goal", "Gather Data", "Generate Steps", "Verify Logic"];
            doaSelfPing("Planner: Generated " + steps.length + " steps.");
            return { type: "ad-hoc", steps };
        }

        async function researcherAgent(text) {
            if (text.length < 5) return { usedWeb: false };
            const wiki = await wikiSummary(text.split(" ").slice(0, 3).join(" "));
            return { usedWeb: !!wiki, notes: wiki ? wiki.extract : "" };
        }

        // --- 5. MAIN PROCESSOR ---
        async function processResponse(userText) {
            const low = userText.toLowerCase().trim();
            let res = "";

            // LOGIC: LEARNING
            if (low.startsWith("remember") || low.includes("actually") || low.includes("correction")) {
                const fact = userText.replace(/remember|actually|correction/gi, "").trim();
                const audit = await crossVerifyFact(fact);
                userMemory.learned.push({ fact, timestamp: new Date().toISOString(), audit: audit.status, efficiency_score: audit.status === "verified" ? 10 : 2 });
                if (audit.status === "user_preference") userMemory.graph.push({ subject: "user", relation: "prefers", object: fact });
                res = audit.status === "verified" ? `Verified! My background audit confirms this aligns with world knowledge. Thank you for sharpening me.` : `Locked into memory vault. I'll test this theory against our future workflows.`;
                showToast(audit.status === "verified" ? "Fact Verified ✅" : "Preference Saved 💡");
            } 
            // LOGIC: MULTI-AGENT
            else {
                const plan = plannerAgent(userText);
                const research = await researcherAgent(userText);
                autoBuildSkillFromPlan(userText, plan);
                res = research.usedWeb ? `Researcher Agent Output: ${research.notes}` : `I'm listening! Tell me more so I can optimize my cognitive patterns.`;
            }

            addMsg("doa", res);
            if(voiceEnabled) speak(res);
            updateMeter();
            await saveMemory();
        }

        // --- 6. UI & DATABASE ---
        async function saveMemory() { await _supabase.from('profiles').update({ memory: userMemory }).eq('id', userProfile.id); }

        function updateMeter() {
            const learned = userMemory.learned || [];
            const verifiedCount = learned.filter(f => f.audit === 'verified').length;
            let percent = Math.min((verifiedCount * 10) + (learned.length * 2), 100);
            document.getElementById('efficiency-bar').style.width = percent + "%";
            document.getElementById('efficiency-percent').innerText = percent + "%";
            const status = document.getElementById('meter-status');
            if (percent >= 100) status.innerHTML = "<span class='text-[#00E676] animate-pulse'>QUANTUM CORE ACTIVE</span>";
            else if (percent > 40) status.innerText = "PATTERN RECOGNITION ONLINE";
            else status.innerText = "EVOLVING NEURAL NET...";
        }

        async function initApp() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) { 
                let { data } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
                userProfile = data; userMemory = data.memory || { learned: [], skills: [], preferences: {}, history: [], graph: [] };
                updateUI(data); updateMeter();
            }
        }

        function updateUI(p) {
            const name = p.usename ? p.usename.replace(/'/g, "") : "Companion";
            document.getElementById('main-header').innerHTML = `<div class="flex items-center gap-6"><div class="text-right"><p class="text-black font-black text-sm">🧠 ${p.brain_points}</p><p class="text-[8px] text-gray-400 uppercase font-bold tracking-widest">Brains</p></div><div class="text-right"><p class="text-black font-black text-sm">💎 ${p.credits}</p><p class="text-[8px] text-gray-400 uppercase font-bold tracking-widest">Credits</p></div><button onclick="_supabase.auth.signOut().then(()=>location.reload())" class="text-[10px] font-bold text-red-400 uppercase tracking-widest ml-4 transition">Logout</button></div>`;
            document.querySelector('#hero-section p').innerHTML = `Welcome back, <span class="text-[#00E676] font-bold">${name}</span>! Current Intelligence: ${document.getElementById('efficiency-percent').innerText}`;
        }

        const chatHistory = document.getElementById('chat-history'), hero = document.getElementById('hero-section'), userInput = document.getElementById('user-input');
        async function handleMessage() {
            const text = userInput.value.trim(); if (!text) return;
            hero.style.display = 'none'; chatHistory.classList.remove('hidden'); userInput.value = "";
            addMsg("user", text); 
            const load = addMsg("doa", "Doa Agent: Reasoning...");
            setTimeout(async () => { load.remove(); await processResponse(text); }, 800);
        }
        function addMsg(s, t) {
            const d = document.createElement('div');
            d.className = s === "user" ? "flex justify-end w-full chat-bubble" : "flex justify-start w-full chat-bubble";
            d.innerHTML = `<div class="${s === 'user' ? 'bg-black text-white shadow-lg' : 'bg-gray-100 text-black'} p-4 rounded-3xl max-w-md text-[14px] font-medium leading-relaxed">${t}</div>`;
            chatHistory.appendChild(d); chatHistory.scrollTop = chatHistory.scrollHeight; return d;
        }

        function speak(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); const voices = window.speechSynthesis.getVoices(); const pref = voices.find(v => v.name.includes("Female") || v.name.includes("Samantha")); if(pref) u.voice = pref; u.pitch = 1.2; u.rate = 0.95; window.speechSynthesis.speak(u); }
        function showToast(m) { const t = document.getElementById('notification'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
        async function login() { const e = prompt("Email:"), p = prompt("Password:"); const { error } = await _supabase.auth.signInWithPassword({ email:e, password:p }); if (error) alert(error.message); else window.location.reload(); }
        async function signUp() { const e = prompt("Email:"), p = prompt("Password (6+):"); const { error } = await _supabase.auth.signUp({ email:e, password:p }); alert(error ? error.message : "Check email!"); }

        document.getElementById('send-btn').onclick = handleMessage;
        userInput.onkeypress = (e) => { if (e.key === 'Enter') handleMessage(); };
        document.getElementById('voice-switch').onclick = () => { voiceEnabled = !voiceEnabled; document.getElementById('voice-knob').style.left = voiceEnabled ? '16px' : '2px'; document.getElementById('voice-switch').style.backgroundColor = voiceEnabled ? '#00E676' : '#f3f4f6'; if(voiceEnabled) speak("Multi-agent neural system initialized."); };
        
        document.addEventListener('click', (e) => {
            const b = e.target.closest('button'); if (!b) return;
            if (b.innerText.includes('Login')) login();
            if (b.innerText.includes('Sign Up')) signUp();
            if (b.closest('#suggestion-container')) { userInput.value = b.innerText; handleMessage(); }
        });
        initApp();
    </script>
</body>
</html>
