<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Essential for WebGPU Performance -->
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
  <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
  
  <title>Doa | Local AI Operating System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #ffffff; color: #111827; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    
    .os-scrollbar::-webkit-scrollbar { width: 4px; }
    .os-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .os-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    .os-scrollbar::-webkit-scrollbar-thumb:hover { background: #00E676; }

    /* Sidebar Physics */
    #main-sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 260px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 60; background: white; border-right: 1px solid #f3f4f6; transform: translateX(0); }
    #main-sidebar.closed { transform: translateX(-100%); }
    
    main { transition: padding-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding-left: 260px; }
    #main-sidebar.closed ~ main { padding-left: 0; }

    .sidebar-item { transition: all 0.2s; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 12px; font-weight: 700; color: #9ca3af; font-size: 13px; }
    .sidebar-active { background: #111111 !important; color: white !important; }
    
    #chat-history { display: flex; flex-direction: column; overflow-y: auto; scroll-behavior: smooth; width: 100%; max-width: 42rem; margin: 0 auto; padding-bottom: 20px; }
    .chat-bubble { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    
    .bubble-action-btn { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #9ca3af; letter-spacing: 0.5px; transition: 0.2s; cursor: pointer; }
    
    #menu-btn { position: absolute; top: 20px; left: 20px; z-index: 50; transition: 0.2s; opacity: 0; pointer-events: none; }
    #menu-btn.show { opacity: 1; pointer-events: auto; }

    /* Centered Calendar Card */
    .win-calendar-card { width: 380px; background: #ffffff; border: 1px solid #f3f4f6; border-radius: 40px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.03); }
    .cal-day { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: 0.2s; font-size: 14px; font-weight: 600; color: #374151; position: relative; }
    .cal-day:hover { background: #f3f4f6; }
    
    .cal-day.past-date { opacity: 0.3; color: #9ca3af; }
    .cal-day.today { background: #00E676 !important; color: #000 !important; font-weight: 800; opacity: 1 !important; }
    .cal-day.selected { border: 2px solid #00E676; }
    
    .day-speak { position: absolute; top: -2px; right: -2px; width: 14px; height: 14px; background: #00E676; border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 7px; color: black; opacity: 0.8; }
    .day-speak:hover { transform: scale(1.2); opacity: 1; }

    .left-os-panel { width: 340px; border-right: 1px solid #f9fafb; background: #ffffff; padding: 40px 30px; display: flex; flex-direction: column; height: 100%; }
    .right-os-panel { width: 360px; border-left: 1px solid #f9fafb; background: #ffffff; padding: 40px 30px; display: flex; flex-direction: column; height: 100%; }

    /* Boot Screen Logic */
    #boot-screen { position: absolute; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
    #boot-screen.hidden { opacity: 0; pointer-events: none; }
    
    .progress-track { width: 240px; height: 4px; background: #f3f4f6; border-radius: 10px; overflow: hidden; margin-top: 20px; }
    #progress-fill { height: 100%; width: 0%; background: #00E676; transition: width 0.3s ease; }
    
    /* Thinking Dots */
    .thinking-dots span { animation: blink 1.2s infinite; font-size: 20px; }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,100% { opacity: 0; } 50% { opacity: 1; } }
  </style>
</head>
<body class="bg-white">

  <!-- ── BOOT SCREEN (MODEL LOADER) ── -->
  <div id="boot-screen">
    <h1 class="text-3xl font-black italic tracking-tighter uppercase text-[#00E676] mb-2">DOA CALI</h1>
    <p id="boot-status" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Initializing Neural Bridge...</p>
    <div class="progress-track">
      <div id="progress-fill"></div>
    </div>
    <button id="init-btn" onclick="initDOA()" class="mt-8 px-8 py-3 bg-black text-white rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-gray-800 transition-all active:scale-95">
      Activate Local AI
    </button>
    <p class="mt-6 text-[9px] text-gray-300 uppercase font-bold max-w-xs text-center leading-relaxed">
      First visit downloads 1.2GB model to browser cache.<br>Future loads are instant.
    </p>
  </div>

  <div class="flex h-screen w-screen overflow-hidden relative">
    
    <aside id="main-sidebar" class="flex flex-col h-full shrink-0">
      <div class="p-6 flex items-center justify-between">
        <h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer" onclick="location.reload()">DOA CALI</h1>
        <button onclick="toggleSidebar()" class="text-gray-300 text-[10px] font-bold uppercase tracking-widest hover:text-black">Hide</button>
      </div>
      <nav class="flex-1 px-4 space-y-1">
        <button onclick="startNewChat()" class="sidebar-item hover:bg-gray-50 mb-4 text-black border border-gray-100 transition-all active:scale-95">+ New Chat</button>
        <button onclick="switchView('chat')" id="btn-chat" class="sidebar-item sidebar-active">💬 Chat With Doa</button>
        <button onclick="switchView('calendar')" id="btn-calendar" class="sidebar-item">📅 Calendar</button>
        <button onclick="switchView('apps')" id="btn-apps" class="sidebar-item">📱 App Factory</button>
      </nav>
      <div class="p-6 text-center border-t border-gray-50">
        <span id="os-status" class="text-[10px] text-gray-200 font-bold uppercase tracking-widest">Local Engine Ready</span>
      </div>
    </aside>

    <button id="menu-btn" onclick="toggleSidebar()" class="bg-white border border-gray-100 shadow-md p-3 rounded-2xl flex items-center gap-3 hover:bg-gray-50 active:scale-95 transition-all">
        <span class="text-[#00E676] font-black italic tracking-tighter text-sm uppercase">Doa</span>
        <div class="flex flex-col gap-[3px]"><div class="w-4 h-[2px] bg-gray-400 rounded-full"></div><div class="w-4 h-[2px] bg-gray-400 rounded-full"></div><div class="w-4 h-[2px] bg-gray-400 rounded-full"></div></div>
    </button>

    <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
      <header class="w-full px-8 py-5 flex justify-end items-center gap-8 text-[11px] font-black uppercase text-gray-400">
        <button class="hover:text-black">Login</button>
        <button class="text-black bg-[#00E676] px-5 py-2 rounded-xl font-bold ml-4 hover:shadow-lg active:scale-95 transition-all">Sign Up</button>
      </header>

      <!-- CHAT VIEW -->
      <div id="chat-view" class="view-container flex-1 w-full flex flex-col items-center px-10 overflow-hidden">
        <div id="chat-shell" class="w-full max-w-2xl flex flex-col h-full justify-center">
          <div id="chat-history" class="hidden hide-scrollbar py-6"></div>
          <div id="center-group" class="flex flex-col w-full">
            <div id="hero-section" class="text-center">
                <h1 class="text-6xl font-black mb-10 tracking-tighter leading-none">How can <span class="text-[#00E676]">Doa</span><br>help you?</h1>
            </div>
            <div id="input-area" class="w-full bg-white pb-10">
                <div class="flex justify-between items-center mb-3 px-4">
                  <p id="status-text" class="text-[9px] font-black text-gray-300 uppercase tracking-widest">SYSTEM PRIVATE</p>
                  <div class="flex items-center gap-3">
                    <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Live Voice</span>
                    <div id="voice-switch" onclick="toggleVoice()" class="w-8 h-4 bg-gray-100 rounded-full relative cursor-pointer"><div id="voice-knob" class="absolute left-0.5 top-0.5 w-3 h-3 bg-white rounded-full transition-all"></div></div>
                  </div>
                </div>
                <div class="bg-white border border-gray-100 shadow-[0_20px_50px_rgba(0,0,0,0.05)] rounded-[32px] p-3 flex items-center mx-2">
                  <textarea id="user-input" rows="1" class="flex-1 px-5 outline-none text-sm resize-none hide-scrollbar py-2" placeholder="Ask Doa anything..."></textarea>
                  <button id="send-btn" onclick="handleMessage()" class="bg-black text-white w-12 h-12 rounded-full font-bold ml-2 hover:bg-gray-800 transition-all flex items-center justify-center">→</button>
                </div>
            </div>
          </div>
        </div>
      </div>

      <!-- CALENDAR VIEW -->
      <div id="calendar-view" class="view-container hidden flex-1 flex flex-row overflow-hidden h-full">
        <div class="left-os-panel">
            <h2 class="text-2xl font-black uppercase tracking-tighter mb-1" id="month-name-label">Month</h2>
            <p class="text-[10px] font-bold text-gray-400 uppercase mb-8 tracking-widest">Upcoming highlights</p>
            <div id="month-summary-list" class="flex-1 space-y-6 overflow-y-auto os-scrollbar pr-2"></div>
        </div>
        <div class="flex-1 flex flex-col items-center justify-center pb-20">
            <div class="win-calendar-card">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-xl font-black uppercase tracking-tighter" id="cal-main-title">May 2026</h1>
                    <div class="flex gap-4">
                        <button onclick="changeMonth(-1)" class="text-gray-300 hover:text-[#00E676] font-bold">↑</button>
                        <button onclick="changeMonth(1)" class="text-gray-300 hover:text-[#00E676] font-bold">↓</button>
                    </div>
                </div>
                <div class="grid grid-cols-7 gap-2 text-center text-[10px] font-black text-gray-300 uppercase mb-4">
                    <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
            </div>
        </div>
        <div class="right-os-panel">
            <h2 id="selected-date-header" class="text-2xl font-black uppercase tracking-tighter mb-6">Today</h2>
            <div id="day-events-list" class="flex-1 space-y-6 overflow-y-auto os-scrollbar pr-2 mb-6"></div>
            <div class="mt-auto space-y-3 pt-6 border-t border-gray-50">
                <input id="quick-add-input" type="text" placeholder="Quick add event..." class="w-full text-sm p-4 outline-none bg-gray-50 border border-transparent focus:border-[#00E676] rounded-2xl transition-all">
                <button onclick="quickAddEvent()" class="w-full text-[11px] font-black uppercase bg-[#00E676] text-black p-4 rounded-2xl shadow-lg active:scale-95 transition-all">Save Event</button>
            </div>
        </div>
      </div>

      <div id="apps-view" class="view-container hidden flex-1 p-10 overflow-y-auto"><h1 class="text-4xl font-black">📱 App Factory</h1></div>
    </main>
  </div>

  <!-- ── SCRIPTS (NEURAL ENGINE INTEGRATION) ── -->
  <script type="module">
    // Configuration
    const MODEL_ID = 'onnx-community/Qwen2.5-0.5B-Instruct';
    const CDN      = 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.5.0';
    
    let doaEngine = null;
    let isThinking = false;
    let voiceActive = JSON.parse(localStorage.getItem('voice_active')) || false;
    let chatMemory = JSON.parse(localStorage.getItem('doa_chat_cache')) || []; 
    let messageRegistry = []; 
    let events = JSON.parse(localStorage.getItem('doa_events')) || [];
    let selectedVoice = null;
    let viewDate = new Date(), selectedDate = new Date();

    const SYSTEM_PROMPT = `You are DOA, a helpful private AI OS. Today is ${new Date().toDateString()}.
      When scheduling, use [ACTION: ADD_EVENT: Title, YYYY-MM-DD | Label].
      When switching views, use [ACTION: OPEN_TAB: calendar | View].
      Be direct and warm. No markdown symbols like ** or #.`;

    // ─── INITIALIZATION ───
    window.initDOA = async function() {
      const btn = document.getElementById('init-btn');
      const status = document.getElementById('boot-status');
      const fill = document.getElementById('progress-fill');
      
      btn.disabled = true;
      btn.innerText = "Processing...";
      
      try {
        const { pipeline, env } = await import(`${CDN}/dist/transformers.min.js`);
        env.allowLocalModels = false;
        
        doaEngine = await pipeline('text-generation', MODEL_ID, {
          device: navigator.gpu ? 'webgpu' : 'wasm',
          progress_callback: (info) => {
            if (info.status === 'progress') {
              fill.style.width = info.progress + '%';
              status.innerText = `Loading Neural Core: ${Math.round(info.progress)}%`;
            }
          }
        });

        status.innerText = "Neural Link Established.";
        setTimeout(() => {
          document.getElementById('boot-screen').classList.add('hidden');
          updateVoiceUI();
          renderCalendar();
          loadVoices();
        }, 800);

      } catch (e) {
        status.innerText = "Hardware Error. Use Chrome or Edge.";
        btn.disabled = false;
        btn.innerText = "Retry Activation";
      }
    };

    // ─── CHAT HANDLING ───
    window.handleMessage = async function() {
      if (isThinking || !doaEngine) return;
      
      const input = document.getElementById('user-input');
      const rawText = input.value.trim();
      if (!rawText) return;

      setChatMode(true);
      addMessage('user', rawText);
      input.value = '';
      isThinking = true;
      document.getElementById('status-text').innerText = "DOA IS THINKING...";

      // Thinking UI
      const thinkingEl = addMessage('doa', '<span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span>', true);

      try {
        const context = [
          { role: 'system', content: SYSTEM_PROMPT },
          ...chatMemory.slice(-6),
          { role: 'user', content: rawText }
        ];

        const output = await doaEngine(context, {
          max_new_tokens: 250,
          temperature: 0.7
        });

        const fullResponse = output[0]?.generated_text?.at(-1)?.content || "OS busy. Try again.";
        
        // Execute Actions (Calendar, etc)
        processActions(fullResponse);

        // Clean text for UI
        const cleanResponse = fullResponse.replace(/\[ACTION:[^\]]*\]/g, "").trim();
        
        thinkingEl.querySelector('.bubble-content').textContent = cleanResponse;
        
        chatMemory.push({ role: 'user', content: rawText }, { role: 'assistant', content: fullResponse });
        localStorage.setItem('doa_chat_cache', JSON.stringify(chatMemory.slice(-20)));
        
        speak(cleanResponse);

      } catch (e) {
        thinkingEl.querySelector('.bubble-content').textContent = "Neural connection disrupted.";
      } finally {
        isThinking = false;
        document.getElementById('status-text').innerText = "SYSTEM PRIVATE";
      }
    };

    // ─── UI & CALENDAR HELPERS ───
    window.addMessage = function(sender, text, isRaw = false) {
      const history = document.getElementById('chat-history');
      const idx = messageRegistry.push(text) - 1;
      const row = document.createElement('div');
      row.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full chat-bubble mb-6 px-2`;
      
      row.innerHTML = `
        <div class="max-w-[85%] group">
          <div class="bubble-content ${sender === 'user' ? 'bg-black text-white' : 'bg-gray-100 text-gray-900'} p-4 rounded-3xl text-sm whitespace-pre-wrap shadow-sm relative">
            ${isRaw ? text : text}
          </div>
          ${sender === 'doa' ? `
            <div class="flex gap-4 mt-2 px-1">
              <button class="bubble-action-btn" onclick="speak(messageRegistry[${idx}])">🔊 Speak</button>
              <button class="bubble-action-btn" onclick="navigator.clipboard.writeText(messageRegistry[${idx}])">📋 Copy</button>
            </div>` : ''}
        </div>`;
      
      history.appendChild(row);
      history.scrollTop = history.scrollHeight;
      return row;
    };

    window.processActions = function(responseText) {
      const actionRegex = /\[ACTION:\s*([^:\]]+):([^|]*)\|([^\]]*)\]/g;
      let match;
      while ((match = actionRegex.exec(responseText)) !== null) {
        const command = match[1].trim().toUpperCase();
        const value   = match[2].trim();

        if (command === 'ADD_EVENT') {
          const commaIdx = value.lastIndexOf(',');
          if (commaIdx !== -1) {
            const title = value.substring(0, commaIdx).trim();
            const dateStr = value.substring(commaIdx + 1).trim();
            const dateObj = new Date(dateStr + 'T00:00:00');
            if (!isNaN(dateObj.getTime())) {
              events.push({ title: title, date: dateObj.toDateString() });
              localStorage.setItem('doa_events', JSON.stringify(events));
              renderCalendar();
            }
          }
        } else if (command === 'OPEN_TAB') {
          if (['chat','calendar','apps'].includes(value.toLowerCase())) switchView(value.toLowerCase());
        }
      }
    }

    // ─── VOICE ENGINE ───
    window.loadVoices = function() {
      const v = window.speechSynthesis.getVoices();
      const n = ["Samantha", "Karen", "Moira", "Tessa", "Victoria", "Ava", "Microsoft Aria", "Google US English Female"];
      for (const i of n) { const m = v.find(x => x.name.includes(i)); if (m) { selectedVoice = m; break; } }
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;

    window.speak = function(text) {
      if (!voiceActive || !text) return;
      window.speechSynthesis.cancel();
      const clean = text.replace(/\[ACTION:.*?\]/g, "").replace(/\bDoa\b/gi, "Doaa").replace(/[*#`_~]/g, "").trim();
      const u = new SpeechSynthesisUtterance(clean);
      if (selectedVoice) u.voice = selectedVoice;
      u.pitch = 1.35; u.rate = 0.95;
      window.speechSynthesis.speak(u);
    }

    // ─── CALENDAR RENDERER ───
    window.renderCalendar = function() {
      const grid = document.getElementById('calendar-grid');
      const title = document.getElementById('cal-main-title');
      const monthLabel = document.getElementById('month-name-label');
      const today = new Date(); today.setHours(0,0,0,0);
      
      grid.innerHTML = '';
      const month = viewDate.getMonth(), year = viewDate.getFullYear();
      const monthName = viewDate.toLocaleString('default', { month: 'long' });
      title.innerText = monthName + " " + year;
      monthLabel.innerText = monthName;

      const firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
      const totalDays = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
          grid.appendChild(document.createElement('div')).className = 'cal-day opacity-0 pointer-events-none';
      }

      for (let d = 1; d <= totalDays; d++) {
        const date = new Date(year, month, d);
        date.setHours(0,0,0,0);
        const el = document.createElement('div');
        el.className = 'cal-day';
        el.innerText = d;

        if (date < today) el.classList.add('past-date');
        if (date.getTime() === today.getTime()) el.classList.add('today');
        if (date.getTime() === new Date(selectedDate).setHours(0,0,0,0)) el.classList.add('selected');
        
        const dayEvents = events.filter(e => new Date(e.date).toDateString() === date.toDateString());
        if (dayEvents.length > 0) {
            const speaker = document.createElement('div');
            speaker.className = 'day-speak';
            speaker.innerHTML = '🔊';
            speaker.onclick = (e) => { e.stopPropagation(); speak(`On ${date.toDateString()}, you have ${dayEvents.length} events.`); };
            el.appendChild(speaker);
        }

        el.onclick = () => { selectedDate = date; renderCalendar(); };
        grid.appendChild(el);
      }
      updateRightPanel(selectedDate);
      updateLeftPanel();
    }

    window.updateLeftPanel = function() {
      const list = document.getElementById('month-summary-list');
      list.innerHTML = '';
      const today = new Date(); today.setHours(0,0,0,0);
      const monthUpcoming = events.filter(e => {
          const d = new Date(e.date);
          return d.getMonth() === viewDate.getMonth() && d.getFullYear() === viewDate.getFullYear() && d >= today;
      }).sort((a,b) => new Date(a.date) - new Date(b.date));

      if (monthUpcoming.length === 0) list.innerHTML = `<p class="text-[12px] text-gray-300 italic py-4">No highlights.</p>`;
      else monthUpcoming.forEach(e => {
          const d = new Date(e.date);
          const div = document.createElement('div');
          div.className = "flex items-start gap-4 animate-fadeIn cursor-pointer hover:opacity-70 transition-opacity";
          div.onclick = () => { selectedDate = d; renderCalendar(); };
          div.innerHTML = `<div class="flex flex-col items-center min-w-[35px]"><span class="text-[10px] font-black text-[#00E676] leading-none uppercase">${d.toLocaleString('default',{month:'short'})}</span><span class="text-sm font-black text-gray-800">${d.getDate()}</span></div><div class="flex-1"><p class="text-[13px] font-bold text-gray-800 leading-tight">${e.title}</p></div>`;
          list.appendChild(div);
      });
    }

    window.updateRightPanel = function(date) {
      const list = document.getElementById('day-events-list');
      const header = document.getElementById('selected-date-header');
      list.innerHTML = '';
      header.innerText = date.toLocaleDateString('default', { month: 'short', day: 'numeric' });
      const dayEvents = events.filter(e => new Date(e.date).toDateString() === date.toDateString());
      
      if (dayEvents.length === 0) list.innerHTML = `<p class="text-[12px] text-gray-300 italic py-4">No schedules.</p>`;
      else dayEvents.forEach(e => {
          const div = document.createElement('div');
          div.className = "flex items-start gap-4 animate-fadeIn group";
          div.innerHTML = `<div class="w-1 h-8 bg-[#00E676] rounded-full mt-1"></div><div class="flex-1 flex items-center justify-between"><p class="text-[13px] font-bold text-gray-800 leading-tight">${e.title}</p><div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity"><button onclick="speak('${e.title}')" class="text-[#00E676] text-xs">🔊</button></div></div>`;
          list.appendChild(div);
      });
    }

    window.quickAddEvent = function() {
      const input = document.getElementById('quick-add-input');
      if (!input.value.trim()) return;
      events.push({ title: input.value.trim(), date: selectedDate.toDateString() });
      localStorage.setItem('doa_events', JSON.stringify(events));
      input.value = '';
      renderCalendar();
    }

    window.changeMonth = function(dir) { viewDate.setMonth(viewDate.getMonth() + dir); renderCalendar(); }

    window.toggleSidebar = function() {
      const sb = document.getElementById('main-sidebar'), mb = document.getElementById('menu-btn');
      sb.classList.toggle('closed');
      if (sb.classList.contains('closed')) mb.classList.add('show'); else mb.classList.remove('show');
    }

    window.switchView = function(viewName) {
      localStorage.setItem('doa_active_view', viewName);
      document.querySelectorAll('.view-container').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('sidebar-active'));
      const target = document.getElementById(viewName + '-view');
      if(target) target.classList.remove('hidden');
      const btn = document.getElementById('btn-' + viewName);
      if(btn) btn.classList.add('sidebar-active');
      if (viewName === 'chat') setChatMode(chatMemory.length > 0);
      if (viewName === 'calendar') renderCalendar();
    }

    window.setChatMode = function(isChatting) {
      const hero = document.getElementById('hero-section'), history = document.getElementById('chat-history'), shell = document.getElementById('chat-shell');
      if (isChatting) {
        hero.style.display = 'none'; history.classList.remove('hidden'); history.style.display = 'flex';
      } else {
        hero.style.display = 'block'; history.classList.add('hidden');
      }
    }

    window.startNewChat = function() { 
      chatMemory = []; 
      messageRegistry = []; 
      localStorage.removeItem('doa_chat_cache'); 
      document.getElementById('chat-history').innerHTML = ''; 
      setChatMode(false); 
      switchView('chat'); 
    }

    window.toggleVoice = function() { 
      voiceActive = !voiceActive; 
      localStorage.setItem('voice_active', voiceActive); 
      updateVoiceUI(); 
      if (voiceActive) speak("Voice active."); 
    }

    window.updateVoiceUI = function() { 
      const knob = document.getElementById('voice-knob'), bg = document.getElementById('voice-switch');
      if(knob && bg) { knob.style.left = voiceActive ? "18px" : "2px"; bg.style.backgroundColor = voiceActive ? "#00E676" : "#f3f4f6"; } 
    }

    document.getElementById('user-input').addEventListener('keydown', (e) => { 
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleMessage(); } 
    });

    window.onload = () => {
      const lastView = localStorage.getItem('doa_active_view') || 'chat';
      if (chatMemory.length > 0) {
        chatMemory.forEach(msg => addMessage(msg.role === 'user' ? 'user' : 'doa', msg.content.replace(/\[ACTION:.*?\]/g, "")));
        if (lastView === 'chat') setChatMode(true);
      }
      switchView(lastView);
    };
  </script>
</body>
</html>
