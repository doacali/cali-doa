<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #FBFBFB; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        /* SIDEBAR ANIMATION */
        #main-sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 260px; }
        #main-sidebar.collapsed { width: 0; padding: 0; border: none; overflow: hidden; opacity: 0; }
        
        .sidebar-item { transition: all 0.2s ease; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px; font-weight: 600; color: #9ca3af; font-size: 13px; }
        .sidebar-item:hover { background-color: #f3f4f6; color: #121212; }
        .sidebar-active { background: #121212 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        /* CHAT BUBBLES */
        .chat-bubble { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* WORLD TICKER */
        #ticker-wrap { white-space: nowrap; overflow: hidden; position: fixed; bottom: 0; width: 100%; background: #000; padding: 8px 0; z-index: 1000; border-top: 1px solid #111; }
        #ticker-content { display: inline-block; animation: marquee 40s linear infinite; font-size: 9px; font-weight: 900; text-transform: uppercase; tracking-widest; color: #444; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* VOICE TOGGLE UI */
        #voice-switch { transition: background-color 0.3s; }
        #voice-knob { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-gray-900">

    <script>
        // --- 1. CONFIGURATION ---
        const CLOUDFLARE_URL = 'https://doa-brain-proxy.111222lov3.workers.dev';
        let voiceActive = JSON.parse(localStorage.getItem('voice_active')) || false;
        let chatHistoryData = JSON.parse(localStorage.getItem('doa_history')) || [];
        let currentChatId = null; 
        let selectedVoice = null;
        let voices = [];

        // --- 2. PREMIUM VOICE ENGINE (doaa) ---
        function loadVoices() {
            voices = window.speechSynthesis.getVoices();
            const priority = ["Samantha","Aria","Zira","Jenny","Google US English Female","Female"];
            for (const n of priority) {
                const match = voices.find(v => v.name.includes(n));
                if (match) { selectedVoice = match; break; }
            }
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function speak(text) {
            if (!voiceActive) return;
            window.speechSynthesis.cancel();
            const cleanText = text.replace(/\bDoa\b/gi, "doaa").replace(/\bDougha\b/gi, "doaa").replace(/[*#`_~]/g, "").replace(/[\u{1F600}-\u{1FFFF}]/gu, "");
            const u = new SpeechSynthesisUtterance(cleanText);
            if (selectedVoice) u.voice = selectedVoice;
            u.pitch = 1.2; u.rate = 0.92;
            window.speechSynthesis.speak(u);
        }

        // --- 3. LOCAL RESPONSE ENGINE (FREE) ---
        function getLocalResponse(input, isFirst) {
            const clean = input.toLowerCase().replace(/[^\w\s]/gi, '').trim();
            if (clean.includes("morning")) return "Good morning! Miracles are happening, how are you?";
            if (isFirst && (clean === "hello" || clean === "hi" || clean === "hey")) return "Hi — everything is exponentially good, how are you or how can I help?";
            if (clean.includes("thank")) return "You're very welcome, have a harmonious day!";
            return null;
        }

        // --- 4. MAIN CHAT & PERSISTENCE ---
        async function handleMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text) return;
