<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doa | AI Operating System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #ffffff; color: #111827; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    
    /* Sidebar: Open by default */
    #main-sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 260px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 60; background: white; border-right: 1px solid #f3f4f6; transform: translateX(0); }
    #main-sidebar.closed { transform: translateX(-100%); }
    
    .sidebar-item { transition: all 0.2s; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 12px; font-weight: 700; color: #9ca3af; font-size: 13px; }
    .sidebar-active { background: #111111 !important; color: white !important; }
    
    #chat-history { display: flex; flex-direction: column; overflow-y: auto; scroll-behavior: smooth; flex: 1; width: 100%; max-width: 42rem; margin: 0 auto; }
    .chat-bubble { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Floating Menu Toggle */
    #menu-btn { position: absolute; top: 20px; left: 20px; z-index: 50; transition: 0.2s; opacity: 0; pointer-events: none; }
    #menu-btn.show { opacity: 1; pointer-events: auto; }

    /* Transitions for the "Snap" effect */
    #chat-shell { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    #hero-section { transition: opacity 0.3s ease; }
    
    .action-card { margin-top: 10px; padding: 10px 14px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; }
    .action-card:hover { background: #f3f4f6; border-color: #00E676; }
    .chat-link { color: #00E676; text-decoration: underline; font-weight: 600; }
  </style>
</head>
<body class="bg-white">

  <div class="flex h-screen w-screen overflow-hidden relative">
    
    <!-- Menu Button (Shows when sidebar is hidden) -->
    <button id="menu-btn" onclick="toggleSidebar()" class="bg-white border border-gray-100 shadow-md p-3 rounded-2xl flex items-center gap-3 hover:bg-gray-50 active:scale-95 transition-all">
        <span class="text-[#00E676] font-black italic tracking-tighter text-sm uppercase">Doa</span>
        <div class="flex flex-col gap-[3px]"><div class="w-4 h-[2px] bg-gray-400 rounded-full"></div><div class="w-4 h-[2px] bg-gray-400 rounded-full"></div><div class="w-4 h-[2px] bg-gray-400 rounded-full"></div></div>
    </button>

    <!-- Sidebar -->
    <aside id="main-sidebar" class="flex flex-col h-full shrink-0">
      <div class="p-6 flex items-center justify-between">
        <h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer" onclick="location.reload()">DOA CALI</h1>
        <button onclick="toggleSidebar()" class="text-gray-300 text-[10px] font-bold uppercase tracking-widest hover:text-black">Hide</button>
      </div>
      <nav class="flex-1 px-4 space-y-1">
        <button onclick="startNewChat()" class="sidebar-item hover:bg-gray-50 mb-4 text-black border border-gray-100 transition-all active:scale-95">+ New Chat</button>
        <button onclick="switchView('chat')" id="btn-chat" class="sidebar-item">💬 Chat With Doa</button>
        <button onclick="switchView('calendar')" id="btn-calendar" class="sidebar-item">📅 Calendar</button>
        <button onclick="switchView('apps')" id="btn-apps" class="sidebar-item">📱 App Factory</button>
      </nav>
      <div class="p-6 text-center border-t border-gray-50">
        <span class="text-[10px] text-gray-200 font-bold uppercase">OS Engine v2.5</span>
      </div>
    </aside>

    <!-- Main OS Workspace -->
    <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
      <header class="w-full px-8 py-5 flex justify-end items-center gap-8 text-[11px] font-black uppercase text-gray-400">
        <button class="hover:text-black">Login</button>
        <button class="text-black bg-[#00E676] px-5 py-2 rounded-xl font-bold ml-4 hover:shadow-lg active:scale-95 transition-all">Sign Up</button>
      </header>

      <!-- Centered Chat Container -->
      <div id="chat-view" class="view-container flex-1 w-full flex flex-col items-center px-10 overflow-hidden">
        <div id="chat-shell" class="w-full max-w-2xl flex flex-col h-full justify-center">
          
          <!-- Home Header -->
          <div id="hero-section" class="text-center py-6">
            <h1 class="text-6xl font-black mb-10 tracking-tighter leading-none">How can <span class="text-[#00E676]">Doa</span><br>help you?</h1>
          </div>

          <!-- History (Appears after message) -->
          <div id="chat-history" class="hidden hide-scrollbar py-6"></div>

          <!-- Centered Input Field -->
          <div id="input-area" class="w-full bg-white pb-10">
            <div class="flex justify-between items-center mb-3 px-4">
              <p id="status-text" class="text-[9px] font-black text-gray-300 uppercase tracking-widest"></p>
              <div class="flex items-center gap-3">
                <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Live Voice</span>
                <div id="voice-switch" onclick="toggleVoice()" class="w-8 h-4 bg-gray-100 rounded-full relative cursor-pointer">
                  <div id="voice-knob" class="absolute left-0.5 top-0.5 w-3 h-3 bg-white rounded-full shadow-sm transition-all"></div>
                </div>
              </div>
            </div>
            <div class="bg-white border border-gray-100 shadow-[0_20px_50px_rgba(0,0,0,0.05)] rounded-[32px] p-3 flex items-center mx-2">
              <textarea id="user-input" rows="1" class="flex-1 px-5 outline-none text-sm resize-none hide-scrollbar py-2" placeholder="Ask Doa anything..."></textarea>
              <button onclick="handleMessage()" class="bg-black text-white w-12 h-12 rounded-full font-bold ml-2 hover:bg-gray-800 transition-all flex items-center justify-center">→</button>
            </div>
          </div>

        </div>
      </div>

      <div id="calendar-view" class="view-container hidden flex-1 p-10 overflow-y-auto">
        <h1 class="text-4xl font-black">📅 Calendar</h1>
      </div>
      <div id="apps-view" class="view-container hidden flex-1 p-10 overflow-y-auto">
        <h1 class="text-4xl font-black">📱 App Factory</h1>
      </div>
    </main>
  </div>

  <script>
    const CLOUDFLARE_URL = 'https://doa-brain-proxy.111222lov3.workers.dev';
    let voiceActive = JSON.parse(localStorage.getItem('voice_active')) || false;
    let chatMemory = JSON.parse(localStorage.getItem('doa_chat_cache')) || []; 
    let isThinking = false;
    let selectedVoice = null;

    // ─── 1. NAVIGATION & PERSISTENCE ───
    function switchView(viewName) {
      localStorage.setItem('doa_active_view', viewName);
      document.querySelectorAll('.view-container').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('sidebar-active'));
      
      const target = document.getElementById(viewName + '-view');
      if(target) target.classList.remove('hidden');
      const btn = document.getElementById('btn-' + viewName);
      if(btn) btn.classList.add('sidebar-active');

      const sb = document.getElementById('main-sidebar');
      if (!sb.classList.contains('closed')) toggleSidebar();

      if (viewName === 'chat' && chatMemory.length > 0) setChatActiveUI(true);
    }

    function setChatActiveUI(isActive) {
      const hero = document.getElementById('hero-section');
      const history = document.getElementById('chat-history');
      const shell = document.getElementById('chat-shell');
      if (isActive) {
        hero.style.display = 'none';
        history.classList.remove('hidden');
        history.style.display = 'flex';
        shell.classList.remove('justify-center');
        shell.classList.add('justify-end');
      } else {
        hero.style.display = 'block';
        history.classList.add('hidden');
        shell.classList.remove('justify-end');
        shell.classList.add('justify-center');
      }
    }

    function startNewChat() {
      chatMemory = [];
      localStorage.removeItem('doa_chat_cache');
      document.getElementById('chat-history').innerHTML = '';
      setChatActiveUI(false);
      switchView('chat');
    }

    function toggleSidebar() {
      const sb = document.getElementById('main-sidebar');
      const mb = document.getElementById('menu-btn');
      sb.classList.toggle('closed');
      if (sb.classList.contains('closed')) mb.classList.add('show');
      else mb.classList.remove('show');
    }

    // ─── 2. DOUGHA VOICE ENGINE ───
    function loadVoices() {
      const voices = window.speechSynthesis.getVoices();
      const names = ["Samantha", "Karen", "Aria", "Google US English Female"];
      for (const n of names) { const m = voices.find(v => v.name.includes(n)); if (m) { selectedVoice = m; break; } }
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function speak(text) {
      if (!voiceActive || !text) return;
      window.speechSynthesis.cancel();
      const clean = text.replace(/\[ACTION:.*?\]/g, "").replace(/https?:\/\/\S+/g, "").replace(/\bDoa\b/gi, "Doaa").replace(/[*#`_~]/g, "").trim();
      const u = new SpeechSynthesisUtterance(clean);
      if (selectedVoice) u.voice = selectedVoice;
      u.pitch = 1.35; u.rate = 0.95;
      u.onstart = () => { setInterval(() => { if(window.speechSynthesis.speaking){ window.speechSynthesis.pause(); window.speechSynthesis.resume(); } }, 10000); };
      window.speechSynthesis.speak(u);
    }

    // ─── 3. CHAT LOGIC ───
    async function handleMessage() {
      if (isThinking) return;
      const input = document.getElementById('user-input');
      const rawText = input.value.trim();
      if (!rawText) return;

      setChatActiveUI(true);
      addMessage('user', rawText);
      input.value = '';
      isThinking = true;
      document.getElementById('status-text').innerText = "Doa is thinking...";

      try {
        const res = await fetch(CLOUDFLARE_URL, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' }, 
          body: JSON.stringify({ text: rawText, history: chatMemory.slice(-10) }) 
        });
        const data = await res.json();
        let responseText = data.response;

        // Auto-detect URL or Action Tags
        const actionRegex = /\[ACTION:\s*([A-Z_]+):\s*(.*?)\|(.*?)\]/g;
        const matches = [...responseText.matchAll(actionRegex)];
        matches.forEach(match => {
            if (match[1] === 'OPEN_URL' || match[1] === 'RESEARCH') window.open(match[2].includes('http') ? match[2] : `https://google.com/search?q=${encodeURIComponent(match[2])}`, '_blank');
        });

        let displayContent = responseText.replace(actionRegex, "").trim();
        addMessage('doa', displayContent, matches);
        chatMemory.push({ role: 'user', content: rawText }, { role: 'assistant', content: responseText });
        localStorage.setItem('doa_chat_cache', JSON.stringify(chatMemory));
        speak(displayContent);

      } catch (error) { addMessage('doa', "OS Error."); } finally { isThinking = false; document.getElementById('status-text').innerText = ""; }
    }

    function addMessage(sender, text, actions = []) {
      const history = document.getElementById('chat-history');
      const row = document.createElement('div');
      row.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full chat-bubble mb-4`;
      const urlRegex = /(https?:\/\/[^\s]+)/g;
      const content = sender === 'doa' ? text.replace(urlRegex, (url) => `<a href="${url}" target="_blank" class="chat-link">${url}</a>`) : text;

      let html = `<div class="max-w-[85%]"><div class="${sender === 'user' ? 'bg-black text-white' : 'bg-gray-100 text-gray-900'} p-4 rounded-3xl text-sm whitespace-pre-wrap shadow-sm">${content}</div>`;
      if (actions.length > 0 && sender === 'doa') {
        actions.forEach(match => {
          html += `<div class="action-card" onclick="window.open('${match[2]}', '_blank')"><div class="w-6 h-6 bg-[#00E676] rounded-lg text-white flex items-center justify-center text-[10px]">⚡</div><div class="flex flex-col"><span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">OS Task</span><span class="text-[11px] font-bold text-gray-800">${match[3].toUpperCase()}</span></div></div>`;
        });
      }
      html += `</div>
