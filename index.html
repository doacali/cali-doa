<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- 1. THE COI SHIELD (MUST BE FIRST) -->
  <script src="coi-serviceworker.js"></script>
  
  <title>Doa | AI Operating System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- 2. STABLE ENGINE LOADER -->
  <script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0-alpha.19';
    env.allowLocalModels = false;
    env.useBrowserCache = true;
    window.pipeline = pipeline;
  </script>

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #ffffff; color: #111827; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .os-scrollbar::-webkit-scrollbar { width: 4px; }
    .os-scrollbar::-webkit-scrollbar-thumb { background: #00E676; border-radius: 10px; }

    #main-sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 260px; transition: 0.3s; z-index: 60; background: white; border-right: 1px solid #f3f4f6; transform: translateX(0); }
    #main-sidebar.closed { transform: translateX(-100%); }
    main { transition: padding-left 0.3s; padding-left: 260px; }
    #main-sidebar.closed ~ main { padding-left: 0; }

    .sidebar-item { transition: 0.2s; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 12px; font-weight: 700; color: #9ca3af; font-size: 13px; }
    .sidebar-active { background: #111111 !important; color: white !important; }
    
    #chat-history { display: flex; flex-direction: column; overflow-y: auto; scroll-behavior: smooth; width: 100%; max-width: 42rem; margin: 0 auto; padding-bottom: 20px; }
    .chat-bubble { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    
    .bubble-action-btn { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #9ca3af; letter-spacing: 0.5px; transition: 0.2s; cursor: pointer; }

    /* Centered Calendar Card */
    .win-calendar-card { width: 380px; background: #ffffff; border: 1px solid #f3f4f6; border-radius: 40px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.03); }
    .cal-day { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: 0.2s; font-size: 14px; font-weight: 600; color: #374151; position: relative; }
    .cal-day.today { background: #00E676 !important; color: #000 !important; font-weight: 800; }
    
    #log-streamer { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: #9ca3af; height: 12px; overflow: hidden; }
    .log-line { color: #00E676; animation: logSlide 0.3s ease-out; }
    @keyframes logSlide { from { transform: translateY(5px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body>

  <div class="flex h-screen w-screen overflow-hidden relative">
    <aside id="main-sidebar">
      <div class="p-6 flex items-center justify-between">
        <h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer" onclick="location.reload()">DOA CALI</h1>
        <button onclick="toggleSidebar()" class="text-gray-300 text-[10px] font-bold uppercase tracking-widest hover:text-black">Hide</button>
      </div>
      <nav class="flex-1 px-4 space-y-1">
        <button onclick="startNewChat()" class="sidebar-item hover:bg-gray-50 mb-4 text-black border border-gray-100 transition-all active:scale-95">+ New Chat</button>
        <button onclick="switchView('chat')" id="btn-chat" class="sidebar-item sidebar-active">💬 Chat With Doa</button>
        <button onclick="switchView('calendar')" id="btn-calendar" class="sidebar-item">📅 Calendar</button>
      </nav>
      <div class="p-6 text-center border-t border-gray-50"><span class="text-[10px] text-gray-200 font-bold uppercase">OS Engine v3.6</span></div>
    </aside>

    <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
      <header class="w-full px-8 py-5 flex justify-end items-center gap-8 text-[11px] font-black uppercase text-gray-400">
        <button class="hover:text-black">Login</button>
        <button class="text-black bg-[#00E676] px-5 py-2 rounded-xl font-bold ml-4 hover:shadow-lg transition-all">Sign Up</button>
      </header>

      <div id="chat-view" class="view-container flex-1 w-full flex flex-col items-center px-10 overflow-hidden">
        <div id="chat-shell" class="w-full max-w-2xl flex flex-col h-full justify-center">
          <div id="chat-history" class="hidden hide-scrollbar py-6 overflow-y-auto flex-1"></div>
          
          <div id="center-group" class="flex flex-col w-full">
            <div id="hero-section" class="text-center">
                <h1 class="text-6xl font-black mb-10 tracking-tighter leading-none">How can <span class="text-[#00E676]">Doa</span><br>help you?</h1>
            </div>

            <div id="input-area" class="w-full bg-white pb-10">
                <div class="flex justify-between items-center mb-3 px-4">
                  <div id="brain-status" class="flex flex-col gap-0.5">
                    <div class="flex items-center gap-2">
                        <div id="brain-led" class="w-1.5 h-1.5 rounded-full bg-yellow-400 animate-pulse"></div>
                        <p id="status-text" class="text-[9px] font-black text-gray-400 uppercase tracking-widest italic">Verifying Hardware... <span id="pct-label" class="text-[#00E676]">0%</span></p>
                    </div>
                    <div id="log-streamer"></div>
                  </div>
                  <div class="flex items-center gap-2">
                    <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Live Voice</span>
                    <div id="voice-switch" onclick="toggleVoice()" class="w-8 h-4 bg-gray-100 rounded-full relative cursor-pointer"><div id="voice-knob" class="absolute left-0.5 top-0.5 w-3 h-3 bg-white rounded-full transition-all"></div></div>
                  </div>
                </div>
                <div class="bg-white border border-gray-100 shadow-[0_20px_50px_rgba(0,0,0,0.05)] rounded-[32px] p-3 flex items-center mx-2">
                  <textarea id="user-input" rows="1" class="flex-1 px-5 outline-none text-sm resize-none hide-scrollbar py-2" placeholder="Ask Doa anything..."></textarea>
                  <button id="send-btn" onclick="handleMessage()" class="bg-black text-white w-12 h-12 rounded-full font-bold ml-2 flex items-center justify-center">→</button>
                </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    let doaEngine = null;
    let voiceActive = false;
    let isThinking = false;
    let chatMemory = [];

    const techLogs = [
        "> BYPASSING CORS RESTRICTIONS", "> ALLOCATING INDEXED_DB", "> DOWNLOAD START: CORE_WEIGHTS",
        "> SHIFTING NEURAL LAYERS", "> OPTIMIZING FP16 WEIGHTS", "> ESTABLISHING GPU HANDSHAKE",
        "> INJECTING DOA_LOGIC", "> VERIFYING LOCAL STORAGE"
    ];

    function startLogs() {
        const streamer = document.getElementById('log-streamer');
        let i = 0;
        const interval = setInterval(() => {
            if (doaEngine) { streamer.innerHTML = ""; clearInterval(interval); return; }
            streamer.innerHTML = `<div class="log-line">${techLogs[i % techLogs.length]}</div>`;
            i++;
        }, 800);
    }

    async function checkNeuralHandshake() {
        if (!navigator.gpu) return "wasm";
        try {
            const adapter = await navigator.gpu.requestAdapter();
            if (!adapter) return "wasm";
            return "webgpu";
        } catch { return "wasm"; }
    }

    async function bootDoaOS() {
      const pctLabel = document.getElementById('pct-label');
      const statusText = document.getElementById('status-text');
      const led = document.getElementById('brain-led');
      startLogs();

      if (!window.pipeline) {
          setTimeout(bootDoaOS, 500);
          return;
      }

      const deviceType = await checkNeuralHandshake();

      try {
        // Load Qwen 0.5B (Fast and Private)
        doaEngine = await window.pipeline('text-generation', 'onnx-community/Qwen2.5-0.5B-Instruct', {
            device: deviceType,
            progress_callback: (info) => {
                if (info.status === 'progress') {
                    pctLabel.innerText = `${Math.round(info.progress)}%`;
                }
            }
        });

        statusText.innerText = `DOA ONLINE (${deviceType.toUpperCase()})`;
        led.classList.replace('bg-yellow-400', 'bg-[#00E676]');
        led.classList.remove('animate-pulse');
      } catch (e) {
        statusText.innerText = "CRITICAL BOOT ERROR";
        console.error(e);
      }
    }

    async function handleMessage() {
      if (isThinking || !doaEngine) return;
      const input = document.getElementById('user-input');
      const query = input.value.trim();
      if (!query) return;

      addMessage('user', query);
      input.value = '';
      isThinking = true;
      document.getElementById('status-text').innerText = "THINKING...";

      try {
        const messages = [
            { role: 'system', content: 'You are Doaa, a helpful AI OS. Be warm and brief. No markdown.' },
            ...chatMemory,
            { role: 'user', content: query }
        ];

        const output = await doaEngine(messages, { max_new_tokens: 100 });
        const response = output[0].generated_text.at(-1).content;

        addMessage('doa', response);
        chatMemory.push({ role: 'user', content: query }, { role: 'assistant', content: response });
        if (chatMemory.length > 6) chatMemory.splice(0, 2);
        
        if (voiceActive) speak(response);
      } catch (e) {
        addMessage('doa', "Neural disruption.");
      } finally {
        isThinking = false;
        document.getElementById('status-text').innerText = "DOA ONLINE";
      }
    }

    function addMessage(sender, text) {
      const history = document.getElementById('chat-history');
      const hero = document.getElementById('hero-section');
      hero.style.display = 'none';
      history.classList.remove('hidden');
      const row = document.createElement('div');
      row.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full chat-bubble mb-6 px-2`;
      row.innerHTML = `<div class="max-w-[85%]"><div class="${sender === 'user' ? 'bg-black text-white' : 'bg-gray-100 text-gray-900'} p-4 rounded-3xl text-sm shadow-sm">${text}</div></div>`;
      history.appendChild(row);
      history.scrollTop = history.scrollHeight;
    }

    function speak(text) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text.replace(/\bDoa\b/gi, "Doaa"));
      u.pitch = 1.35; u.rate = 0.95;
      window.speechSynthesis.speak(u);
    }

    function toggleSidebar() { document.getElementById('main-sidebar').classList.toggle('closed'); }
    function toggleVoice() { 
        voiceActive = !voiceActive; 
        document.getElementById('voice-knob').style.left = voiceActive ? "18px" : "2px";
        document.getElementById('voice-switch').style.backgroundColor = voiceActive ? "#00E676" : "#f3f4f6";
    }
    function switchView(view) { if (view !== 'chat') alert("Module loading in background..."); }
    function startNewChat() { location.reload(); }

    window.onload = bootDoaOS;
    document.getElementById('user-input').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleMessage(); } });
  </script>
</body>
</html>
