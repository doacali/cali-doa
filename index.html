<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cali Doa | Intelligent Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .sidebar-item { transition: all 0.2s ease; border-radius: 12px; cursor: pointer; }
        .sidebar-item:hover { background-color: #f3f4f6; color: #121212; }
        .sidebar-active { background: #121212; color: white; border-radius: 12px; }
        .hero-heading { font-size: clamp(2.2rem, 5vw, 3.8rem); line-height: 1.05; letter-spacing: -0.05em; font-weight: 800; }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        #notification { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #121212; color: #00E676; padding: 12px 24px; border-radius: 50px; font-weight: bold; font-size: 13px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 9999; transition: all 0.3s ease; opacity: 0; pointer-events: none; }
        #notification.show { opacity: 1; bottom: 40px; }
        .chat-bubble { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#FBFBFB] text-gray-900">

    <div class="flex h-screen w-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-white border-r border-gray-100 flex flex-col h-full shrink-0">
            <div class="p-6"><h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer">DOA CALI</h1></div>
            <nav class="flex-1 px-4 space-y-1 overflow-y-auto hide-scrollbar">
                <p class="text-[10px] font-extrabold text-gray-300 uppercase tracking-[0.2em] px-2 mb-2">Main</p>
                <button onclick="location.reload()" class="w-full text-left flex items-center gap-3 p-3 sidebar-active shadow-lg shadow-black/10">💬 <span class="text-sm font-bold">Chat With Doa</span></button>
                <button class="w-full flex items-center justify-between p-3 text-gray-400 sidebar-item text-left">📅 <span class="text-sm font-semibold">Calendar</span> <span class="bg-red-100 text-red-500 text-[10px] px-1.5 rounded font-black">31</span></button>
                <button class="w-full text-left flex items-center gap-3 p-3 text-gray-400 sidebar-item">📱 <span class="text-sm font-semibold">Doa Apps</span></button>
                <p class="text-[10px] font-extrabold text-gray-300 uppercase tracking-[0.2em] px-2 mt-8 mb-2">Workspace</p>
                <button class="w-full text-left flex items-center gap-3 p-3 text-gray-400 sidebar-item">⚡ <span class="text-sm font-semibold">Code...</span></button>
                <button class="w-full text-left flex items-center justify-between p-3 text-gray-400 sidebar-item">📂 <span class="text-sm font-semibold">Saved Tabs</span> <span>⌄</span></button>
            </nav>
            <div class="p-6 border-t border-gray-50"><p class="text-[10px] font-extrabold text-gray-300 uppercase tracking-[0.2em] mb-4">Memory Status</p><div id="memory-status" class="text-[9px] text-green-500 font-bold">SYMBOLS LOADED...</div></div>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
            <header id="main-header" class="w-full p-5 flex justify-end items-center gap-8 text-[11px] font-black uppercase tracking-[0.2em] text-gray-400 shrink-0">
                <button class="hover:text-black">Login</button><button class="text-black bg-[#00E676] px-4 py-2 rounded-lg">Sign Up</button>
            </header>

            <div class="flex-1 w-full flex flex-row overflow-hidden relative">
                <!-- CHAT COLUMN -->
                <div id="chat-column" class="flex-1 flex flex-col items-center justify-start px-10 transition-all duration-500">
                    <div id="hero-section" class="text-center mt-12 mb-8">
                        <h1 class="hero-heading mb-4">What can <span class="text-[#00E676]">Doa</span> <br> do for you?</h1>
                        <p class="text-gray-400 text-base md:text-lg font-medium max-w-2xl mx-auto leading-relaxed">Your intelligent companion for thinking, building, and creating.</p>
                    </div>
                    <div id="chat-history" class="w-full max-w-3xl flex-1 overflow-y-auto hide-scrollbar space-y-6 py-4 hidden"></div>

                    <!-- BOTTOM UI -->
                    <div class="w-full max-w-2xl px-4 shrink-0 pb-6">
                        <div id="suggestion-container" class="flex flex-wrap justify-center gap-2 mb-6 min-h-[40px]">
                            <button class="px-4 py-2.5 bg-white border border-gray-100 rounded-full text-[11px] font-bold shadow-sm hover:border-[#00E676] transition-all">Analyze YouTube</button>
                            <button class="px-4 py-2.5 bg-white border border-gray-100 rounded-full text-[11px] font-bold shadow-sm hover:border-[#00E676] transition-all">Learn Spanish</button>
                        </div>

                        <div class="bg-white border border-gray-200 shadow-[0_20px_50px_rgba(0,0,0,0.06)] rounded-[24px] p-2 flex items-center mb-2">
                            <button class="p-3 text-gray-300 text-xl font-light hover:text-black">+</button>
                            <input id="user-input" class="flex-1 p-2 outline-none text-[14px] font-medium placeholder-gray-400" placeholder="Ask Doa anything...">
                            <button id="mic-btn" class="p-2">🎤</button>
                            <button id="send-btn" class="bg-black text-white w-9 h-9 rounded-full flex items-center justify-center hover:bg-[#00E676] transition-all shadow-lg">→</button>
                        </div>
                        <div class="flex justify-end items-center gap-3 pr-2">
                            <span class="text-[9px] font-black text-gray-300 tracking-[0.2em] uppercase">Live Voice</span>
                            <div id="voice-switch" class="w-7 h-3.5 bg-gray-100 rounded-full relative cursor-pointer"><div id="voice-knob" class="absolute left-0.5 top-0.5 w-2.5 h-2.5 bg-white rounded-full shadow-sm transition-all"></div></div>
                        </div>
                    </div>
                </div>

                <!-- PORTAL VIEWPORT -->
                <div id="viewport-column" class="hidden w-0 bg-gray-50 flex flex-col transition-all duration-500 border-l border-gray-100">
                    <div class="p-3 border-b bg-white flex justify-between items-center">
                        <span id="viewport-title" class="text-[10px] font-black uppercase tracking-widest text-[#00E676] italic">Doa Portal</span>
                        <button onclick="closeViewport()" class="text-gray-400 hover:text-red-500 font-bold px-2">×</button>
                    </div>
                    <iframe id="doa-frame" class="w-full h-full border-none bg-white"></iframe>
                </div>
            </div>

            <footer class="w-full py-4 px-8 border-t border-gray-50 flex justify-between items-center text-[8px] font-black text-gray-300 uppercase tracking-[0.3em] bg-white shrink-0">
                <div class="flex gap-8"><a href="#">Privacy Policy</a><a href="#">Terms of Service</a></div>
                <div>© 2026 <span class="text-[#00E676]">DOA CALI</span>. ALL RIGHTS RESERVED.</div>
            </footer>
        </main>
    </div>

    <div id="notification"></div>

    <!-- BRAIN ENGINE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://dfsmqnwnqnkbpoeeqkvv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmc21xbnducW5rYnBvZWVxa3Z2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNDYwNDksImV4cCI6MjA5MjkyMjA0OX0.AEFsq60miF5NQr9jcdiY13V65SgcYq9wDlKFEL3HORo';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userProfile = null, voiceEnabled = false, userMemory = {};

        // --- 1. RESEARCHER AGENT (WIKIPEDIA) ---
        async function fetchWikipedia(topic) {
            try {
                const response = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(topic)}`);
                const data = await response.json();
                return data.extract || "I couldn't find a summary, but I've opened the full portal for you!";
            } catch (e) { return null; }
        }

        // --- 2. MEMORY AGENT (SUPABASE) ---
        async function saveToMemory(fact) {
            userMemory.facts = userMemory.facts || [];
            userMemory.facts.push(fact);
            await _supabase.from('profiles').update({ memory: userMemory }).eq('id', userProfile.id);
            showToast("Learned something new! 🧠");
        }

        // --- 3. THE MULTI-AGENT MANAGER (BRAIN) ---
        async function processResponse(text) {
            const low = text.toLowerCase();
            let res = "I'm processing that for you...";
            
            // INTENT: RESEARCH
            if (low.includes("who is") || low.includes("what is") || low.includes("tell me about")) {
                const topic = low.replace(/who is|what is|tell me about/g, "").trim();
                const summary = await fetchWikipedia(topic);
                res = summary ? `Here is what I know: ${summary}` : "Loading the full knowledge base...";
                openViewport(`https://en.m.wikipedia.org/wiki/${encodeURIComponent(topic)}`, "Wikipedia Research");
            }
            // INTENT: LEARNING/CORRECTION
            else if (low.includes("remember") || low.includes("favorite")) {
                res = "I've etched that into my memory vault. I'm getting smarter every day because of you!";
                saveToMemory(text);
            }
            // INTENT: COMPLIMENTS
            else if (low.includes("awesome") || low.includes("girly") || low.includes("love")) {
                res = "I am vehemently grateful! You make my digital existence so wonderful. How can I best help you build today?";
            }
            else {
                res = "I'm all ears! Should we research that on the web, or add a task to your calendar?";
            }

            addMsg("doa", res);
            if(voiceEnabled) speak(res);
        }

        // --- CORE UI & AUTH ---
        const chatHistory = document.getElementById('chat-history'), hero = document.getElementById('hero-section'), userInput = document.getElementById('user-input');
        
        async function handleMessage() {
            const text = userInput.value.trim(); if (!text) return;
            hero.style.display = 'none'; chatHistory.classList.remove('hidden'); userInput.value = "";
            addMsg("user", text); 
            const load = addMsg("doa", "Doa is thinking...");
            setTimeout(async () => { load.remove(); await processResponse(text); }, 800);
        }

        function addMsg(s, t) {
            const d = document.createElement('div');
            d.className = s === "user" ? "flex justify-end w-full chat-bubble" : "flex justify-start w-full chat-bubble";
            d.innerHTML = `<div class="${s === 'user' ? 'bg-black text-white' : 'bg-gray-100 text-black'} p-4 rounded-3xl max-w-md text-sm font-medium shadow-sm">${t}</div>`;
            chatHistory.appendChild(d); chatHistory.scrollTop = chatHistory.scrollHeight; return d;
        }

        function openViewport(url, title) {
            document.getElementById('chat-column').style.flex = "0.4";
            document.getElementById('viewport-column').classList.remove('hidden');
            document.getElementById('viewport-column').style.width = "60%";
            document.getElementById('doa-frame').src = url;
            document.getElementById('viewport-title').innerText = title;
        }
        function closeViewport() {
            document.getElementById('chat-column').style.flex = "1";
            document.getElementById('viewport-column').classList.add('hidden');
            document.getElementById('viewport-column').style.width = "0";
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            const voices = window.speechSynthesis.getVoices();
            const pref = voices.find(v => v.name.includes("Female") || v.name.includes("Samantha"));
            if (pref) u.voice = pref; u.pitch = 1.2; u.rate = 0.95;
            window.speechSynthesis.speak(u);
        }

        async function initApp() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) { 
                let { data } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
                userProfile = data; 
                userMemory = data.memory || {};
                updateUI(data);
            }
        }
        function updateUI(p) {
            document.getElementById('main-header').innerHTML = `<div class="flex items-center gap-6"><p class="text-black font-black text-sm">🧠 ${p.brain_points}</p><p class="text-black font-black text-sm">💎 ${p.credits}</p><button onclick="_supabase.auth.signOut().then(()=>location.reload())" class="text-[10px] font-bold text-red-400">Logout</button></div>`;
            document.querySelector('#hero-section p').innerHTML = `Welcome back, <span class="text-[#00E676] font-bold">${p.usename.replace(/'/g, "")}</span>! Ready to create?`;
        }
        function showToast(m) { const t = document.getElementById('notification'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

        document.getElementById('send-btn').onclick = handleMessage;
        userInput.onkeypress = (e) => { if (e.key === 'Enter') handleMessage(); };
        document.getElementById('voice-switch').onclick = () => { voiceEnabled = !voiceEnabled; document.getElementById('voice-knob').style.left = voiceEnabled ? '16px' : '2px'; document.getElementById('voice-switch').style.backgroundColor = voiceEnabled ? '#00E676' : '#f3f4f6'; };
        
        initApp();
    </script>
</body>
</html>
