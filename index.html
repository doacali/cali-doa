<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cali Doa | AI Operating System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #ffffff; color: #111827; }
    #main-sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 260px; transition: 0.28s; z-index: 60; background: white; border-right: 1px solid #f3f4f6; }
    #main-sidebar.collapsed { transform: translateX(-100%); }
    .sidebar-item { transition: 0.2s; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 12px; font-weight: 700; color: #9ca3af; font-size: 13px; margin-bottom: 4px; }
    .sidebar-active { background: #111111 !important; color: white !important; }
    #chat-history { display: flex; flex-direction: column; gap: 16px; padding: 20px 0; overflow-y: auto; scroll-behavior: smooth; flex: 1; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .action-btn { font-size: 10px; color: #9ca3af; font-weight: 800; cursor: pointer; border: none; background: none; }
    #voice-switch { transition: 0.3s; }
  </style>
</head>
<body class="bg-white">

  <div class="flex h-screen w-screen overflow-hidden">
    <aside id="main-sidebar" class="flex flex-col h-full shrink-0 relative">
      <div class="p-6 flex items-center justify-between">
        <h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer" onclick="location.reload()">DOA CALI</h1>
        <button onclick="toggleSidebar()" class="text-gray-300 text-[9px] font-black uppercase">Hide</button>
      </div>
      <nav class="flex-1 px-4 space-y-1">
        <button class="sidebar-item sidebar-active">💬 Chat With Doa</button>
        <button class="sidebar-item">📅 Calendar</button>
        <button class="sidebar-item">📱 App Factory</button>
      </nav>
    </aside>

    <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
      <header class="w-full px-8 py-5 flex justify-end items-center gap-8 text-[11px] font-black uppercase text-gray-400">
        <button>Login</button>
        <button class="text-black bg-[#00E676] px-5 py-2 rounded-xl font-bold ml-4">Sign Up</button>
      </header>

      <div id="chat-view" class="flex-1 w-full flex flex-col items-center justify-center px-10 overflow-hidden">
        <div id="chat-shell" class="w-full max-w-2xl flex flex-col h-full justify-center">
          
          <div id="hero-section" class="text-center py-10">
            <h1 class="text-6xl font-black mb-5 tracking-tighter leading-none">How can <span class="text-[#00E676]">Doa</span><br>help you?</h1>
          </div>

          <div id="chat-history" class="hidden hide-scrollbar"></div>

          <div class="w-full bg-white pt-4 pb-10">
            <div class="flex justify-between items-center mb-3 px-2">
              <p id="status-text" class="text-[9px] font-black text-gray-300 uppercase"></p>
              <div class="flex items-center gap-3">
                <span class="text-[9px] font-black text-gray-300 uppercase">Live Voice</span>
                <div id="voice-switch" onclick="toggleVoice()" class="w-8 h-4 bg-gray-100 rounded-full relative cursor-pointer">
                  <div id="voice-knob" class="absolute left-0.5 top-0.5 w-3 h-3 bg-white rounded-full shadow-sm transition-all"></div>
                </div>
              </div>
            </div>
            <div class="bg-white border border-gray-200 shadow-xl rounded-[24px] p-2.5 flex items-end gap-2">
              <textarea id="user-input" rows="1" class="flex-1 py-2 px-4 outline-none text-[14px] font-medium resize-none hide-scrollbar" placeholder="Ask Doaa anything..."></textarea>
              <button onclick="handleMessage()" class="shrink-0 bg-black text-white w-11 h-11 rounded-full font-bold">→</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const CLOUDFLARE_URL = 'https://doa-brain-proxy.111222lov3.workers.dev';
    const suggestionsPool = ["Weather in Sacramento", "Learn Ukrainian", "Speak Spanish", "Tell Story", "Crypto Stats"];

    let voiceActive = JSON.parse(localStorage.getItem('voice_active')) || false;
    let isThinking = false;
    let chatMemory = []; 

    function speak(text) {
      // 🚨 INTERRUPT: Stop any previous speech immediately
      window.speechSynthesis.cancel();
      
      if (!voiceActive || !text) return;

      // 1. Detect language code from brackets
      let langCode = "en-US"; 
      const langMatch = text.match(/^\[([a-z]{2}-[A-Z]{2})\]/);
      if (langMatch) {
          langCode = langMatch[1];
          text = text.replace(langMatch[0], "").trim();
      }

      const cleanText = text.replace(/\bDoa\b/gi, "Doaa").replace(/[*#`_~]/g, "").trim();
      const u = new SpeechSynthesisUtterance(cleanText);
      u.lang = langCode;

      // 2. 🚨 DYNAMIC VOICE SELECTION: Find a high-quality female voice for the CURRENT language
      const voices = window.speechSynthesis.getVoices();
      let bestVoice = voices.find(v => v.lang.startsWith(langCode.split('-')[0]) && 
          (v.name.includes("Aria") || v.name.includes("Natural") || v.name.includes("Google") || v.name.includes("Samantha") || v.name.includes("Female")));

      // Fallback if no "Natural/Female" voice is found for that language
      if (!bestVoice) bestVoice = voices.find(v => v.lang.startsWith(langCode.split('-')[0]));
      
      if (bestVoice) u.voice = bestVoice;

      // 3. Human Tone Tuning
      u.pitch = 1.1; 
      u.rate = 1.15; 
      
      window.speechSynthesis.speak(u);
    }

    async function handleMessage() {
      // 🚨 INTERRUPT: Stop talking when user types new prompt
      window.speechSynthesis.cancel();
      
      if (isThinking) return;
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;

      document.getElementById('hero-section').classList.add('hidden');
      document.getElementById('chat-history').classList.remove('hidden');
      document.getElementById('chat-history').style.display = 'flex';
      
      const now = new Date();
      const localTime = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const localDate = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

      addMessage('user', text);
      input.value = '';
      isThinking = true;
      document.getElementById('status-text').innerText = "Doaa is thinking...";

      try {
        const res = await fetch(CLOUDFLARE_URL, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' }, 
          body: JSON.stringify({ text, localTime, localDate, history: chatMemory.slice(-6) }) 
        });
        const data = await res.json();
        
        addMessage('doaa', data.response);
        chatMemory.push({ role: 'user', content: text });
        chatMemory.push({ role: 'assistant', content: data.response });
        
        speak(data.response);
      } catch (error) { 
        addMessage('doaa', "Neural Link fuzzy!"); 
      } finally { 
        isThinking = false; 
        document.getElementById('status-text').innerText = ""; 
      }
    }

    function addMessage(sender, text) {
      const history = document.getElementById('chat-history');
      const row = document.createElement('div');
      row.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full chat-bubble mb-4 px-2`;
      
      // Clean display (hide brackets)
      let visibleContent = text.replace(/^\[[a-z]{2}-[A-Z]{2}\]\s*/i, "").replace(/[*#`_~]/g, "");

      const actions = sender === 'doaa' ? `
        <div class="flex gap-4 mt-2 px-1">
          <button class="action-btn" onclick="speak('${text.replace(/'/g, "\\'")}')">🔊 Speak</button>
          <button class="action-btn text-red-500 font-bold" onclick="window.speechSynthesis.cancel()">🛑 Stop</button>
        </div>` : '';
      
      row.innerHTML = `<div class="max-w-[85%]">
        <div class="${sender === 'user' ? 'bg-black text-white rounded-[22px] rounded-tr-[4px]' : 'bg-gray-100 text-gray-900 rounded-[22px] rounded-tl-[4px]'} p-4 text-sm whitespace-pre-wrap shadow-sm">
          ${visibleContent}
        </div>
        ${actions}
      </div>`;
      
      history.appendChild(row);
      history.scrollTop = history.scrollHeight;
    }

    // 🚨 INTERRUPTS for UI actions
    function toggleSidebar() { window.speechSynthesis.cancel(); document.getElementById('main-sidebar').classList.toggle('collapsed'); }
    function switchView(v) { window.speechSynthesis.cancel(); document.querySelectorAll('.view-container').forEach(el => el.classList.add('hidden')); document.getElementById(v + '-view').classList.remove('hidden'); }
    function toggleVoice() { voiceActive = !voiceActive; localStorage.setItem('voice_active', voiceActive); updateVoiceUI(); window.speechSynthesis.cancel(); if (voiceActive) speak("Voice active."); }
    function updateVoiceUI() { const knob = document.getElementById('voice-knob'); const bg = document.getElementById('voice-switch'); if(knob && bg) { knob.style.left = voiceActive ? "18px" : "2px"; bg.style.backgroundColor = voiceActive ? "#00E676" : "#f3f4f6"; } }
    
    document.getElementById('user-input').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleMessage(); } });
    window.addEventListener('beforeunload', () => window.speechSynthesis.cancel());

    window.onload = () => { 
        updateVoiceUI(); 
        const cont = document.getElementById('suggestion-container');
        cont.innerHTML = suggestionsPool.slice(0, 4).map(s => `<button class="px-4 py-2 bg-white border border-gray-100 rounded-full text-[10px] font-bold hover:border-[#00E676]" onclick="document.getElementById('user-input').value='${s}';handleMessage()">${s}</button>`).join('');
        document.getElementById('side-date').innerText = new Date().getDate();
    };
    window.speechSynthesis.onvoiceschanged = () => {}; 
  </script>
</body>
</html>
