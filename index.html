<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doa | AI Operating System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #ffffff; color: #111827; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    
    .os-scrollbar::-webkit-scrollbar { width: 4px; }
    .os-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .os-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    .os-scrollbar::-webkit-scrollbar-thumb:hover { background: #00E676; }

    /* Sidebar Physics */
    #main-sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 260px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 60; background: white; border-right: 1px solid #f3f4f6; transform: translateX(0); }
    #main-sidebar.closed { transform: translateX(-100%); }
    
    main { transition: padding-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding-left: 260px; }
    #main-sidebar.closed ~ main { padding-left: 0; }

    .sidebar-item { transition: all 0.2s; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 12px; font-weight: 700; color: #9ca3af; font-size: 13px; }
    .sidebar-active { background: #111111 !important; color: white !important; }
    
    #chat-history { display: flex; flex-direction: column; overflow-y: auto; scroll-behavior: smooth; width: 100%; max-width: 42rem; margin: 0 auto; padding-bottom: 20px; }
    .chat-bubble { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    
    .bubble-action-btn { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #9ca3af; letter-spacing: 0.5px; transition: 0.2s; cursor: pointer; }
    
    #menu-btn { position: absolute; top: 20px; left: 20px; z-index: 50; transition: 0.2s; opacity: 0; pointer-events: none; }
    #menu-btn.show { opacity: 1; pointer-events: auto; }

    /* Centered Calendar Card */
    .win-calendar-card { width: 380px; background: #ffffff; border: 1px solid #f3f4f6; border-radius: 40px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.03); }
    .cal-day { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: 0.2s; font-size: 14px; font-weight: 600; color: #374151; position: relative; }
    .cal-day:hover { background: #f3f4f6; }
    
    .cal-day.past-date { opacity: 0.3; color: #9ca3af; }
    .cal-day.today { background: #00E676 !important; color: #000 !important; font-weight: 800; opacity: 1 !important; }
    .cal-day.selected { border: 2px solid #00E676; }
    
    /* Speaker Icon on Date */
    .day-speak { position: absolute; top: -2px; right: -2px; width: 14px; height: 14px; background: #00E676; border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 7px; color: black; opacity: 0.8; }
    .day-speak:hover { transform: scale(1.2); opacity: 1; }

    /* Split Pane Layout */
    .left-os-panel { width: 340px; border-right: 1px solid #f9fafb; background: #ffffff; padding: 40px 30px; display: flex; flex-direction: column; height: 100%; }
    .right-os-panel { width: 360px; border-left: 1px solid #f9fafb; background: #ffffff; padding: 40px 30px; display: flex; flex-direction: column; height: 100%; }

    /* Modal Styling */
    .modal {
      position: fixed;
      z-index: 100;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.4); /* Black w/ opacity */
      display: none; /* Hidden by default */
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background-color: #fefefe;
      margin: auto; /* Auto margin top/bottom */
      padding: 30px;
      border: 1px solid #888;
      width: 40%; /* Could be adjusted */
      max-width: 500px;
      border-radius: 15px;
      position: relative;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .close-button {
      color: #aaa;
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }
    .close-button:hover,
    .close-button:focus {
      color: black;
      text-decoration: none;
      cursor: pointer;
    }
  </style>
</head>
<body class="bg-white">

  <!-- Login/Signup Modal -->
  <div id="auth-modal" class="modal hidden">
    <div class="modal-content">
      <span class="close-button" id="close-auth-modal">&times;</span>
      <h2>Log in or Sign Up</h2>
      <p class="text-sm text-gray-600 mb-6">You'll get smarter responses and can upload files, images, and more.</p>

      <div id="email-form">
        <input type="email" id="email-input" placeholder="Email address" class="w-full border border-gray-300 rounded-lg px-4 py-3 mb-3 text-sm focus:ring-green-500 focus:border-green-500">
        <input type="password" id="password-input" placeholder="Password" class="w-full border border-gray-300 rounded-lg px-4 py-3 mb-3 text-sm focus:ring-green-500 focus:border-green-500">
        <div class="flex justify-between items-center">
          <button id="email-signin" class="bg-blue-600 text-white rounded-lg px-6 py-3 font-semibold hover:bg-blue-700 transition-colors">Sign In</button>
          <button id="email-signup" class="bg-green-600 text-white rounded-lg px-6 py-3 font-semibold hover:bg-green-700 transition-colors">Sign Up</button>

      <div id="profile-form" class="mt-4 hidden">

  <div class="flex h-screen w-screen overflow-hidden relative">
    
    <!-- Sidebar -->
    <aside id="main-sidebar" class="flex flex-col h-full shrink-0">
      <div class="p-6 flex items-center justify-between">
        <h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer" onclick="location.reload()">DOA CALI</h1>
        <button onclick="toggleSidebar()" class="text-gray-300 text-[10px] font-bold uppercase tracking-widest hover:text-black">Hide</button>
      </div>
      <nav class="flex-1 px-4 space-y-1">
        <button onclick="startNewChat()" class="sidebar-item hover:bg-gray-50 mb-4 text-black border border-gray-100 transition-all active:scale-95">+ New Chat</button>
        <button onclick="switchView('chat')" id="btn-chat" class="sidebar-item">💬 Chat With Doa</button>
        <button onclick="switchView('calendar')" id="btn-calendar" class="sidebar-item">📅 Calendar</button>
        <button onclick="switchView('apps')" id="btn-apps" class="sidebar-item">📱 App Factory</button>
      </nav>
      <div class="p-6 text-center border-t border-gray-50"><span class="text-[10px] text-gray-200 font-bold uppercase">OS Engine v3.6</span></div>
    </aside>

    <button id="menu-btn" onclick="toggleSidebar()" class="bg-white border border-gray-100 shadow-md p-3 rounded-2xl flex items-center gap-3 hover:bg-gray-50 active:scale-95 transition-all">
        <span class="text-[#00E676] font-black italic tracking-tighter text-sm uppercase">Doa</span>
        <div class="flex flex-col gap-[3px]"><div class="w-4 h-[2px] bg-gray-400 rounded-full"></div><div class="w-4 h-[2px] bg-gray-400 rounded-full"></div><div class="w-4 h-[2px] bg-gray-400 rounded-full"></div></div>
    </button>

    <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
      <header class="w-full px-8 py-5 flex justify-end items-center gap-8 text-[11px] font-black uppercase text-gray-400">
        <!-- Header Login/Sign Up Button will trigger the modal -->
        <button id="login-signup-header-btn" class="text-black bg-[#00E676] px-5 py-2 rounded-xl font-bold ml-4 hover:shadow-lg active:scale-95 transition-all">Log In / Sign Up</button>
        <div id="user-info" class="flex items-center gap-4 hidden">
          <span id="user-name" class="font-bold"></span>
          <button id="signout-button" class="text-gray-600 hover:text-red-500">Sign Out</button>
        </div>
      </header>

      <!-- CHAT VIEW -->
      <div id="app-ui" class="flex-1 flex flex-col bg-white h-full relative overflow-hidden hidden">
        <div id="chat-view" class="view-container flex-1 w-full flex flex-col items-center px-10 overflow-hidden">
          <div id="chat-shell" class="w-full max-w-2xl flex flex-col h-full justify-center">
            <div id="chat-history" class="hidden hide-scrollbar py-6"></div>
            <div id="center-group" class="flex flex-col w-full">
              <div id="hero-section" class="text-center">
                  <h1 class="text-6xl font-black mb-10 tracking-tighter leading-none">How can <span class="text-[#00E676]">Doa</span><br>help you?</h1>
              </div>
              <div id="input-area" class="w-full bg-white pb-10">
                  <div class="flex justify-between items-center mb-3 px-4">
                    <p id="status-text" class="text-[9px] font-black text-gray-300 uppercase tracking-widest"></p>
                    <div class="flex items-center gap-3">
                      <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Live Voice</span>
                      <div id="voice-switch" onclick="toggleVoice()" class="w-8 h-4 bg-gray-100 rounded-full relative cursor-pointer"><div id="voice-knob" class="absolute left-0.5 top-0.5 w-3 h-3 bg-white rounded-full transition-all"></div></div>
                    </div>
                  </div>
                  <div class="bg-white border border-gray-100 shadow-[0_20px_50px_rgba(0,0,0,0.05)] rounded-[32px] p-3 flex items-center mx-2">
                    <textarea id="user-input" rows="1" class="flex-1 px-5 outline-none text-sm resize-none hide-scrollbar py-2" placeholder="Ask Doa anything..."></textarea>
                    <button onclick="handleMessage()" class="bg-black text-white w-12 h-12 rounded-full font-bold ml-2 hover:bg-gray-800 transition-all flex items-center justify-center">→</button>

      <!-- CALENDAR VIEW (THREE-PANE LAYOUT) -->
      <div id="calendar-view" class="view-container hidden flex-1 flex flex-row overflow-hidden h-full">
        
        <!-- LEFT PANEL: Month Upcoming Summary -->
        <div class="left-os-panel">
            <h2 class="text-2xl font-black uppercase tracking-tighter mb-1" id="month-name-label">Month</h2>
            <p class="text-[10px] font-bold text-gray-400 uppercase mb-8 tracking-widest">Upcoming highlights</p>
            <div id="month-summary-list" class="flex-1 space-y-6 overflow-y-auto os-scrollbar pr-2"></div>
        </div>

        <!-- CENTER: Calendar Grid -->
        <div class="flex-1 flex flex-col items-center justify-center pb-20">
            <div class="win-calendar-card">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-xl font-black uppercase tracking-tighter" id="cal-main-title">May 2026</h1>
                    <div class="flex gap-4">
                        <button onclick="changeMonth(-1)" class="text-gray-300 hover:text-[#00E676] font-bold">↑</button>
                        <button onclick="changeMonth(1)" class="text-gray-300 hover:text-[#00E676] font-bold">↓</button>
                    </div>
                </div>
                <div class="grid grid-cols-7 gap-2 text-center text-[10px] font-black text-gray-300 uppercase mb-4">
                    <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
            </div>
        </div>

        <!-- RIGHT PANEL: Selected Day Details -->
        <div class="right-os-panel">
            <h2 id="selected-date-header" class="text-2xl font-black uppercase tracking-tighter mb-6">Today</h2>
            <div id="day-events-list" class="flex-1 space-y-6 overflow-y-auto os-scrollbar pr-2 mb-6"></div>
            <div class="mt-auto space-y-3 pt-6 border-t border-gray-50">

      <div id="apps-view" class="view-container hidden flex-1 p-10 overflow-y-auto"><h1 class="text-4xl font-black">📱 App Factory</h1></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const CLOUDFLARE_URL = 'https://doa-brain-proxy.111222lov3.workers.dev/'; // <<< REPLACE WITH YOUR DEPLOYED WORKER URL
    let voiceActive = JSON.parse(localStorage.getItem('voice_active')) || false;
    let chatMemory = JSON.parse(localStorage.getItem('doa_chat_cache')) || [];
    let messageRegistry = [];
    let events = JSON.parse(localStorage.getItem('doa_events')) || [];
    let isThinking = false, selectedVoice = null;
    let viewDate = new Date(), selectedDate = new Date();

    // Supabase initialization (get these from your Supabase project)
    const supabaseUrl = 'YOUR_SUPABASE_URL'; // <<< REPLACE WITH YOUR SUPABASE URL
    const supabaseAnonKey = 'YOUR_SUPABASE_ANON_KEY'; // <<< REPLACE WITH YOUR SUPABASE ANON KEY
    const supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

    // HTML Elements for Auth Modal
    const authModal = document.getElementById('auth-modal');
    const closeAuthModal = document.getElementById('close-auth-modal');
    const loginSignupHeaderBtn = document.getElementById('login-signup-header-btn');
    const emailForm = document.getElementById('email-form');
    const emailSignin = document.getElementById('email-signin');
    const emailSignup = document.getElementById('email-signup');
    const emailInput = document.getElementById('email-input');
    const passwordInput = document.getElementById('password-input');
    const profileForm = document.getElementById('profile-form');
    const nameInput = document.getElementById('name-input');
    const usernameInput = document.getElementById('username-input');
    const profileSubmit = document.getElementById('profile-submit');

    // HTML Elements for Main App UI
    const appUI = document.getElementById('app-ui');
    const userInfo = document.getElementById('user-info');
    const userNameDisplay = document.getElementById('user-name');
    const signoutButton = document.getElementById('signout-button');
    const loginButtonHeader = document.getElementById('login-signup-header-btn'); // Target the single button

    // --- AUTHENTICATION MODAL LOGIC ---
    loginSignupHeaderBtn?.addEventListener('click', () => {
        authModal.classList.remove('hidden');
        // Ensure email form is visible by default
        emailForm.classList.remove('hidden');
        profileForm.classList.add('hidden');
    });

    closeAuthModal?.addEventListener('click', () => {
        authModal.classList.add('hidden');
    });

    // Close modal if clicking outside
    window.addEventListener('click', (event) => {
        if (event.target === authModal) {
            authModal.classList.add('hidden');
        }
    });

    emailLoginButton?.addEventListener('click', () => { // This refers to a button that isn't in the code. It's likely meant to be loginSignupHeaderBtn or emailSignin
        emailForm.classList.toggle('hidden');
        profileForm.classList.add('hidden'); // Hide profile form when email login is toggled
    });

    emailSignin?.addEventListener('click', async () => {
        const email = emailInput.value;
        const password = passwordInput.value;
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
            console.error('Email Sign-In Error:', error.message);
            alert('Sign-in failed. Please check your credentials.');
        } else {
            checkUserProfile();
            authModal.classList.add('hidden'); // Close modal on successful sign-in
        }
    });

    emailSignup?.addEventListener('click', async () => {
        const email = emailInput.value;
        const password = passwordInput.value;
        const { data, error } = await supabase.auth.signUp({ email, password });

        if (error) {
            console.error('Email Sign-Up Error:', error.message);
            alert('Sign-up failed. Please try again.');
        } else {
            // User signed up, now show the profile form
            emailForm.classList.add('hidden');
            profileForm.classList.remove('hidden');
        }
    });

    profileSubmit?.addEventListener('click', async () => {
        const name = nameInput.value;
        const username = usernameInput.value;
        const { data: { session }, error: sessionError } = await supabase.auth.getSession();

        if (sessionError) {
            console.error("Session Error:", sessionError);
            alert("Session error during profile creation");
            return;
        }

      const { data: userData, error: userError } = await supabase
          .from('users')
          .insert([{ id: supabase.auth.user()?.id, name: name, username: username, email: supabase.auth.user()?.email }])
          .select();

        if (userError) {
            console.error('Profile Creation Error:', userError);
            alert('Profile creation failed. Please try a different username.');
        } else {
            // Profile created successfully
            profileForm.classList.add('hidden');
            authModal.classList.add('hidden'); // Close modal
            updateUIForUser(name || username); // Update UI with user info
            alert('Profile created successfully!');
        }
    });

    // Function to check if the user has a profile and show profile creation if they do not
    async function checkUserProfile() {
        const { data: sessionData, error: sessionError } = await supabase.auth.getSession();

        if (sessionError) {
            console.error("Session Error:", sessionError);
            alert('Error loading session. Please try again.');
            hideUI();
            return;
        }

        if (!sessionData.session) {
            // User is not logged in
            hideUI();
            loginForm.classList.remove('hidden');
            return;
        }

        // User is logged in, check for profile
        const { data: userData, error: userError } = await supabase
            .from('users')
            .select('name, username')
            .eq('id', supabase.auth.user()?.id)
            .single(); // Use single() as we expect only one row for a user

        if (userError) {
          console.error("Error fetching user profile:", userError);
          alert('Error loading profile. Please try again.');
          hideUI();
        } else {
            if (userData) {
                // User profile exists
                const userName = userData.name || userData.username || 'User';
                updateUIForUser(userName);
            } else {
               // User profile doesn't exist, hide the UI and show profile creation
                hideUI();
                profileForm.classList.remove('hidden'); // Show the profile form
            }
        }
    }

    // Log out function
    async function signOut() {
        const { error } = await supabase.auth.signOut();
        if (error) {
            console.error('Sign out error:', error.message);
            alert('Sign out failed. Please try again.');
        } else {
            hideUI();
            location.reload();
        }
    }

    // --- INITIAL LOAD LOGIC ---
    window.onload = () => {
      updateVoiceUI(); loadVoices();

      // Check session on load to determine initial UI state
      supabase.auth.getSession().then(({ data: { session } }) => {
          if (session) {
              // User is already signed in
              checkUserProfile();
          } else {
              // User is not signed in, show login form
              loginForm.classList.remove('hidden');
              appUI.classList.add('hidden');
              // Ensure header buttons are visible when not logged in
              loginButtonHeader.classList.remove('hidden');
              signupButtonHeader.classList.remove('hidden'); // This button is not in the provided HTML, so it won't do anything.
          }
      });

      const lastView = localStorage.getItem('doa_active_view') || 'chat';
      if (chatMemory.length > 0) {
        chatMemory.forEach(msg => addMessage(msg.role === 'user' ? 'user' : 'doa', msg.content.replace(/\[ACTION:.*?\]/g, "")));
        if (lastView === 'chat') setChatMode(true);
      } else { setChatMode(false); }
      switchView(lastView);
      document.getElementById('main-sidebar').classList.remove('closed');
    };

    // --- CHAT LOGIC ---
    function simulateDoaTyping(text, inputElement) {
        let i = 0;
        let currentText = "";

        clearInterval(typingInterval); // Clear any existing interval

        typingInterval = setInterval(() => {
            if (i < text.length) {
                currentText += text.charAt(i);
                inputElement.value = currentText; // Update the input field
                i++;
            } else {
                clearInterval(typingInterval); // Stop when the typing is done
            }
        }, 50 + Math.random() * 50); // Adjust typing speed (milliseconds)
    }

    function quickAddEvent() {
        const input = document.getElementById('quick-add-input');
        const inputText = input.value.trim(); // Get the user input
        if (!inputText) return; // Prevent saving if input is empty

        // Start Doa typing animation in the input field
        // simulateDoaTyping(inputText, input); // Commented out for now to avoid confusion with chat input

        // Save the event after a short delay (to let typing finish)
        setTimeout(() => {
            saveEvent(inputText, selectedDate); // Use selectedDate for quick add
            input.value = '';  // Clear the input after saving
        }, 800 + (inputText.length * 50) ); // Add a delay based on text length
    }

   // Function to handle saving the event
    function saveEvent(text, eventDate) {
        if (!text) return; // Ensure there's text to save
        const selectedDateISO = eventDate.toISOString(); // Get selected date
        const userId = supabase.auth.user()?.id; // Get the current user's ID

        if (!userId) {
            console.error("User ID not found. Cannot save event.");
            // Handle this case, maybe prompt user to log in
            return;
        }

        // Check for multiple events (separated by newlines or commas)
        const eventTexts = text.split(/[\n,]+/).map(s => s.trim()).filter(s => s);

        eventTexts.forEach(async (eventText) => { // Make this async to await Supabase insert
            if (eventText) {
                const { data, error } = await supabase
                    .from('events') // <<< ENSURE YOUR EVENTS TABLE IS NAMED 'events'
                    .insert([{ title: eventText, date: selectedDateISO, user_id: userId }]);

                if (error) {
                    console.error('Error saving event:', error);
                } else {
                    console.log('Event saved successfully!');
                    // Optionally, re-render the calendar or update the UI
                    renderCalendar(); // Re-render to show the new event
                }
            }
        });
    }

    function deleteEvent(dateStr, title) {
        // This function is for events added through the calendar UI, not chat.
        // You'll need to implement Supabase delete logic here if you want to delete events from calendar.
        console.warn("deleteEvent through calendar UI not yet implemented for Supabase.");
    }

    function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); renderCalendar(); }

    function speak(text) {
      if (!voiceActive || !text) return;
      window.speechSynthesis.cancel();
      const clean = text.replace(/\[ACTION:.*?\]/g, "").replace(/https?:\/\/\S+/g, "").replace(/\bDoa\b/gi, "Doaa").replace(/[*#`~]/g, "").trim();
      const u = new SpeechSynthesisUtterance(clean);
      if (selectedVoice) u.voice = selectedVoice;
      u.pitch = 1.35; u.rate = 0.95; u.volume = 1.0;
      u.onstart = () => { const int = setInterval(() => { if (!window.speechSynthesis.speaking) clearInterval(int); else { window.speechSynthesis.pause(); window.speechSynthesis.resume(); } }, 10000); };
      window.speechSynthesis.speak(u);
    }

    function toggleSidebar() {
      const sb = document.getElementById('main-sidebar'), mb = document.getElementById('menu-btn');
      sb.classList.toggle('closed');
      if (sb.classList.contains('closed')) mb.classList.add('show'); else mb.classList.remove('show');
    }

    function switchView(viewName) {
      localStorage.setItem('doa_active_view', viewName);
      document.querySelectorAll('.view-container').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('sidebar-active'));
      const target = document.getElementById(viewName + '-view');
      if(target) target.classList.remove('hidden');
      const btn = document.getElementById('btn-' + viewName);
      if(btn) btn.classList.add('sidebar-active');
      const sidebar = document.getElementById('main-sidebar');
      if (!sidebar.classList.contains('closed')) toggleSidebar();
      if (viewName === 'chat') setChatMode(chatMemory.length > 0);
      if (viewName === 'calendar') renderCalendar();
    }

    function setChatMode(isChatting) {
      const hero = document.getElementById('hero-section'), history = document.getElementById('chat-history'), shell = document.getElementById('chat-shell'), centerGroup = document.getElementById('center-group');
      if (isChatting) {
        hero.style.display = 'none'; history.classList.remove('hidden'); history.style.display = 'flex';
        shell.classList.remove('justify-center'); shell.classList.add('justify-end');
        centerGroup.classList.remove('flex-col'); shell.style.paddingBottom = '0';
      } else {
        hero.style.display = 'block'; history.classList.add('hidden');
        shell.classList.remove('justify-end'); shell.classList.add('justify-center');
        centerGroup.classList.add('flex-col'); shell.style.paddingBottom = '15vh';
      }
    }

    function startNewChat() { window.speechSynthesis.cancel(); chatMemory = []; messageRegistry = []; localStorage.removeItem('doa_chat_cache'); document.getElementById('chat-history').innerHTML = ''; setChatMode(false); switchView('chat'); }

    async function handleMessage() {
      window.speechSynthesis.cancel();
      if (isThinking) return;
      const input = document.getElementById('user-input'), rawText = input.value.trim();
      if (!rawText) return;
      setChatMode(true); addMessage('user', rawText); input.value = '';
      isThinking = true; document.getElementById('status-text').innerText = "Doa is thinking...";
      try {
        const res = await fetch(CLOUDFLARE_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            // <<< SEND THE USER ID TO THE WORKER >>>
            'X-User-Id': supabase.auth.user()?.id
          },
          body: JSON.stringify({ text: rawText, history: chatMemory.slice(-10) })
        });
        const data = await res.json();
        addMessage('doa', data.response.replace(/\[ACTION:.*?\]/g, ""));
        chatMemory.push({ role: 'user', content: rawText }, { role: 'assistant', content: data.response });
        localStorage.setItem('doa_chat_cache', JSON.stringify(chatMemory));
        speak(data.response);

        // Check if the response indicates event creation
        if (data.response.includes("[ACTION: ADD_EVENT:")) {
            // Extract event title and date using regex
            const match = data.response.match(/\[ACTION: ADD_EVENT:([^,]+),(\d{4}-\d{2}-\d{2})\]/);
            if (match && match.length === 3) {
                const eventTitle = match[1].trim();
                const eventDateStr = match[2].trim(); // YYYY-MM-DD

                // Convert the date string to a Date object (Important!)
                const [year, month, day] = eventDateStr.split('-').map(Number);
                const eventDate = new Date(year, month - 1, day); // Month is 0-indexed

                // If the date is invalid, alert
                if (isNaN(eventDate.getTime())) {
                    console.error("Invalid date format received from AI:", eventDateStr);
                    // Do not switch view or try to save if date is invalid
                } else {
                    // Save the event using the parsed date
                    saveEvent(eventTitle, eventDate); // Call saveEvent with title and date
                    switchView('calendar'); // Switch to calendar view
                }
            } else {
                console.error("Could not parse event details from response:", data.response);
            }
        }
      } catch (e) {
          console.error("Error in handleMessage:", e);
          addMessage('doa', "OS Connection disrupted.");
      } finally {
          isThinking = false;
          document.getElementById('status-text').innerText = "";
      }
    }

    function addMessage(sender, text) {
      const history = document.getElementById('chat-history');
      const idx = messageRegistry.push(text) - 1;
      const row = document.createElement('div');
      row.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full chat-bubble mb-6 px-2`;
      row.innerHTML = `<div class="max-w-[85%] group"><div class="${sender === 'user' ? 'bg-black text-white' : 'bg-gray-100 text-gray-900'} p-4 rounded-3xl text-sm whitespace-pre-wrap shadow-sm relative">${text}</div>${sender === 'doa' ? `<div class="flex gap-4 mt-2 px-1"><button class="bubble-action-btn" onclick="speak(messageRegistry[${idx}])">🔊 Speak</button><button class="bubble-action-btn" onclick="navigator.clipboard.writeText(messageRegistry[${idx}])">📋 Copy</button><button class="bubble-action-btn red" onclick="window.speechSynthesis.cancel()">🛑 Stop</button></div>` : ''}</div>`;
      history.appendChild(row); history.scrollTop = history.scrollHeight;
    }

    function toggleVoice() { voiceActive = !voiceActive; localStorage.setItem('voice_active', voiceActive); updateVoiceUI(); if (voiceActive) speak("Voice active."); else window.speechSynthesis.cancel(); }
    function updateVoiceUI() { const knob = document.getElementById('voice-knob'), bg = document.getElementById('voice-switch'); if(knob && bg) { knob.style.left = voiceActive ? "18px" : "2px"; bg.style.backgroundColor = voiceActive ? "#00E676" : "#f3f4f6"; } }
    document.getElementById('user-input').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleMessage(); } });
    
    window.onload = () => { 
      updateVoiceUI(); loadVoices(); 
      const lastView = localStorage.getItem('doa_active_view') || 'chat';
      if (chatMemory.length > 0) {
        chatMemory.forEach(msg => addMessage(msg.role === 'user' ? 'user' : 'doa', msg.content.replace(/\[ACTION:.*?\]/g, "")));
        if (lastView === 'chat') setChatMode(true);
      } else { setChatMode(false); }
      switchView(lastView);
      document.getElementById('main-sidebar').classList.remove('closed');
    };
  </script>
</body>
</html>
