<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doa | Multilingual AI OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; width: 100vw; overflow: hidden; margin: 0; background: #ffffff; color: #111827; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .os-scrollbar::-webkit-scrollbar { width: 4px; }
    .os-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    #main-sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 260px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 60; background: white; border-right: 1px solid #f3f4f6; transform: translateX(0); }
    #main-sidebar.closed { transform: translateX(-100%); }
    main { transition: padding-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding-left: 260px; }
    #main-sidebar.closed ~ main { padding-left: 0; }
    .sidebar-item { transition: all 0.2s; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 12px; font-weight: 700; color: #9ca3af; font-size: 13px; }
    .sidebar-active { background: #111111 !important; color: white !important; }
    #chat-history { display: flex; flex-direction: column; overflow-y: auto; scroll-behavior: smooth; width: 100%; max-width: 42rem; margin: 0 auto; padding-bottom: 20px; }
    .chat-bubble { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .bubble-action-btn { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #9ca3af; cursor: pointer; }
    #menu-btn { position: absolute; top: 20px; left: 20px; z-index: 50; opacity: 0; pointer-events: none; }
    #menu-btn.show { opacity: 1; pointer-events: auto; }
    .win-calendar-card { width: 380px; background: #ffffff; border: 1px solid #f3f4f6; border-radius: 40px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.03); }
    .cal-day { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: 0.2s; font-size: 14px; font-weight: 600; color: #374151; position: relative; }
    .cal-day.today { background: #00E676 !important; color: #000 !important; font-weight: 800; }
    .cal-day.selected { border: 2px solid #00E676; }
    .day-speak { position: absolute; top: -2px; right: -2px; width: 14px; height: 14px; background: #00E676; border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 7px; color: black; }
    .left-os-panel { width: 340px; border-right: 1px solid #f9fafb; background: #ffffff; padding: 40px 30px; display: flex; flex-direction: column; height: 100%; }
    .right-os-panel { width: 360px; border-left: 1px solid #f9fafb; background: #ffffff; padding: 40px 30px; display: flex; flex-direction: column; height: 100%; }
  </style>
</head>
<body class="bg-white">

  <div class="flex h-screen w-screen overflow-hidden relative">
    <aside id="main-sidebar" class="flex flex-col h-full shrink-0">
      <div class="p-6 flex items-center justify-between">
        <h1 class="text-xl font-black text-[#00E676] italic tracking-tighter uppercase cursor-pointer" onclick="location.reload()">DOA CALI</h1>
        <button onclick="toggleSidebar()" class="text-gray-300 text-[10px] font-bold uppercase tracking-widest hover:text-black">Hide</button>
      </div>
      <nav class="flex-1 px-4 space-y-1">
        <button onclick="startNewChat()" class="sidebar-item hover:bg-gray-50 mb-4 text-black border border-gray-100 transition-all active:scale-95">+ New Chat</button>
        <button onclick="switchView('chat')" id="btn-chat" class="sidebar-item">💬 Chat With Doa</button>
        <button onclick="switchView('calendar')" id="btn-calendar" class="sidebar-item">📅 Calendar</button>
        <button onclick="switchView('apps')" id="btn-apps" class="sidebar-item">📱 App Factory</button>
      </nav>
      <div class="p-6 text-center border-t border-gray-50"><span class="text-[10px] text-gray-200 font-bold uppercase">Multilingual Brain v1.2</span></div>
    </aside>

    <button id="menu-btn" onclick="toggleSidebar()" class="bg-white border border-gray-100 shadow-md p-3 rounded-2xl flex items-center gap-3">
        <span class="text-[#00E676] font-black italic text-sm uppercase">Doa</span>
    </button>

    <main class="flex-1 flex flex-col bg-white h-full relative overflow-hidden">
      <!-- CHAT VIEW -->
      <div id="chat-view" class="view-container flex-1 w-full flex flex-col items-center px-10 overflow-hidden">
        <div id="chat-shell" class="w-full max-w-2xl flex flex-col h-full justify-center">
          <div id="chat-history" class="hidden hide-scrollbar py-6"></div>
          <div id="center-group" class="flex flex-col w-full">
            <div id="hero-section" class="text-center">
                <h1 class="text-6xl font-black mb-10 tracking-tighter leading-none">How can <span class="text-[#00E676]">Doa</span><br>help you?</h1>
            </div>
            <div id="input-area" class="w-full bg-white pb-10">
                <div class="flex justify-between items-center mb-3 px-4">
                  <p id="status-text" class="text-[9px] font-black text-gray-300 uppercase tracking-widest">Global Voice Ready</p>
                  <div class="flex items-center gap-3">
                    <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Live Voice</span>
                    <div id="voice-switch" onclick="toggleVoice()" class="w-8 h-4 bg-gray-100 rounded-full relative cursor-pointer"><div id="voice-knob" class="absolute left-0.5 top-0.5 w-3 h-3 bg-white rounded-full transition-all"></div></div>
                  </div>
                </div>
                <div class="bg-white border border-gray-100 shadow-[0_20px_50px_rgba(0,0,0,0.05)] rounded-[32px] p-3 flex items-center mx-2">
                  <textarea id="user-input" rows="1" class="flex-1 px-5 outline-none text-sm resize-none hide-scrollbar py-2" placeholder="Try: 'Hola', 'Bonjour', or 'Add event meeting'"></textarea>
                  <button onclick="handleMessage()" class="bg-black text-white w-12 h-12 rounded-full font-bold ml-2">→</button>
                </div>
            </div>
          </div>
        </div>
      </div>

      <!-- CALENDAR VIEW -->
      <div id="calendar-view" class="view-container hidden flex-1 flex flex-row h-full">
        <div class="left-os-panel">
            <h2 class="text-2xl font-black uppercase tracking-tighter mb-1" id="month-name-label">Month</h2>
            <div id="month-summary-list" class="flex-1 space-y-6 overflow-y-auto os-scrollbar pr-2"></div>
        </div>
        <div class="flex-1 flex flex-col items-center justify-center pb-20">
            <div class="win-calendar-card">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-xl font-black uppercase tracking-tighter" id="cal-main-title">May 2026</h1>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
            </div>
        </div>
        <div class="right-os-panel">
            <h2 id="selected-date-header" class="text-2xl font-black uppercase tracking-tighter mb-6">Today</h2>
            <div id="day-events-list" class="flex-1 space-y-6 overflow-y-auto os-scrollbar pr-2 mb-6"></div>
            <div class="mt-auto space-y-3 pt-6 border-t border-gray-50">
                <input id="quick-add-input" type="text" placeholder="Quick add event..." class="w-full text-sm p-4 outline-none bg-gray-50 border border-transparent focus:border-[#00E676] rounded-2xl">
                <button onclick="quickAddEvent()" class="w-full text-[11px] font-black uppercase bg-[#00E676] text-black p-4 rounded-2xl">Save Event</button>
            </div>
        </div>
      </div>

      <div id="apps-view" class="view-container hidden flex-1 p-10 overflow-y-auto"><h1 class="text-4xl font-black">📱 App Factory</h1></div>
    </main>
  </div>

  <script>
    /* --- LOCAL BRAIN WITH MULTILINGUAL GREETINGS --- */
    const LocalDoaBrain = {
        process: function(input) {
            const text = input.toLowerCase();
            const now = new Date();

            // Language Patterns
            if (text.includes("hola") || text.includes("buenos")) return "Hola. Soy Doa. ¿En qué puedo ayudarte hoy?";
            if (text.includes("bonjour") || text.includes("salut")) return "Bonjour. Je suis Doa. Comment puis-je vous aider ?";
            if (text.includes("ciao")) return "Ciao. Sono Doa. Come posso aiutarti oggi?";
            if (text.includes("hallo") || text.includes("guten tag")) return "Hallo. Ich bin Doa. Wie kann ich Ihnen helfen?";
            if (text.includes("こんにちは") || text.includes("moshi moshi")) return "こんにちは。私はドあです。どのようにお手伝いしましょうか？";

            // Calendar Logic
            if (text.includes("add event") || text.includes("schedule")) {
                const title = input.replace(/add event|schedule/gi, "").split("for")[0].trim();
                let dateStr = input.match(/\d{4}-\d{2}-\d{2}/) || now.toISOString().split('T')[0];
                return `Done. I have scheduled "${title}" for ${dateStr}. [ACTION: ADD_EVENT:${title},${dateStr}|View Calendar]`;
            }

            // UI Logic
            if (text.includes("calendar")) return "Switching to calendar view. [ACTION: OPEN_TAB:calendar|Switch]";
            
            return "I am Doa. I can speak multiple languages and manage your calendar locally. Try 'Hola' or 'Add event lunch'.";
        }
    };

    /* --- GLOBAL SPEECH ENGINE --- */
    function speak(text) {
      if (!voiceActive || !text) return;
      window.speechSynthesis.cancel();
      
      const clean = text.replace(/\[ACTION:.*?\]/g, "").replace(/\bDoa\b/gi, "Doaa").trim();
      const u = new SpeechSynthesisUtterance(clean);
      
      // AUTO-DETECT LANGUAGE & MATCH SYSTEM VOICE
      if (/[áéíóúñ¿¡]/i.test(text)) u.lang = 'es-ES';
      else if (/[àâçéèêëîïôûùüÿ]/i.test(text)) u.lang = 'fr-FR';
      else if (/[äöüß]/i.test(text)) u.lang = 'de-DE';
      else if (/[ぁ-んァ-ヶ一-龠]/.test(text)) u.lang = 'ja-JP';
      else if (/[а-яА-Я]/.test(text)) u.lang = 'ru-RU';
      else if (/[ا-ي]/.test(text)) u.lang = 'ar-SA';
      else u.lang = 'en-US';

      // Find the best voice for the detected language
      const voices = window.speechSynthesis.getVoices();
      const match = voices.find(v => v.lang.startsWith(u.lang.split('-')[0]));
      if (match) u.voice = match;

      u.pitch = 1.1; u.rate = 1.0;
      window.speechSynthesis.speak(u);
    }

    /* --- OS CORE --- */
    let voiceActive = JSON.parse(localStorage.getItem('voice_active')) || false;
    let chatMemory = JSON.parse(localStorage.getItem('doa_chat_cache')) || []; 
    let events = JSON.parse(localStorage.getItem('doa_events')) || [];
    let viewDate = new Date(), selectedDate = new Date();

    async function handleMessage() {
      const input = document.getElementById('user-input'), rawText = input.value.trim();
      if (!rawText) return;
      setChatMode(true); 
      addMessage('user', rawText); 
      input.value = '';
      document.getElementById('status-text').innerText = "DOA IS THINKING...";

      setTimeout(() => {
        const responseText = LocalDoaBrain.process(rawText);
        processActions(responseText);
        const cleanResponse = responseText.replace(/\[ACTION:[^\]]*\]/g, "").trim();
        addMessage('doa', cleanResponse);
        chatMemory.push({ role: 'user', content: rawText }, { role: 'assistant', content: responseText });
        localStorage.setItem('doa_chat_cache', JSON.stringify(chatMemory));
        speak(cleanResponse);
        document.getElementById('status-text').innerText = "Global Voice Ready";
      }, 500);
    }

    function processActions(responseText) {
      const actionRegex = /\[ACTION:\s*([^:\]]+):([^|]*)\|([^\]]*)\]/g;
      let match;
      while ((match = actionRegex.exec(responseText)) !== null) {
        const command = match[1].trim().toUpperCase();
        const value   = match[2].trim();
        if (command === 'ADD_EVENT') {
          const parts = value.split(',');
          events.push({ title: parts[0], date: new Date(parts[1]).toDateString() });
          localStorage.setItem('doa_events', JSON.stringify(events));
          renderCalendar();
        } else if (command === 'OPEN_TAB') switchView(value.toLowerCase());
      }
    }

    function addMessage(sender, text) {
      const history = document.getElementById('chat-history');
      const row = document.createElement('div');
      row.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full chat-bubble mb-6 px-2`;
      row.innerHTML = `<div class="max-w-[85%]"><div class="${sender === 'user' ? 'bg-black text-white' : 'bg-gray-100 text-gray-900'} p-4 rounded-3xl text-sm shadow-sm">${text}</div></div>`;
      history.appendChild(row); 
      history.scrollTop = history.scrollHeight;
    }

    function renderCalendar() {
      const grid = document.getElementById('calendar-grid');
      const title = document.getElementById('cal-main-title');
      grid.innerHTML = '';
      const month = viewDate.getMonth(), year = viewDate.getFullYear();
      title.innerText = viewDate.toLocaleString('default', { month: 'long', year: 'numeric' });

      for (let d = 1; d <= new Date(year, month + 1, 0).getDate(); d++) {
        const date = new Date(year, month, d);
        const el = document.createElement('div');
        el.className = 'cal-day';
        el.innerText = d;
        if (date.toDateString() === new Date().toDateString()) el.classList.add('today');
        const dayEvents = events.filter(e => e.date === date.toDateString());
        if (dayEvents.length > 0) {
            const dot = document.createElement('div');
            dot.className = 'day-speak';
            dot.innerText = '🔊';
            el.appendChild(dot);
        }
        grid.appendChild(el);
      }
    }

    function switchView(viewName) {
      document.querySelectorAll('.view-container').forEach(el => el.classList.add('hidden'));
      document.getElementById(viewName + '-view').classList.remove('hidden');
      if (viewName === 'calendar') renderCalendar();
    }

    function toggleSidebar() {
      const sb = document.getElementById('main-sidebar'), mb = document.getElementById('menu-btn');
      sb.classList.toggle('closed');
      mb.classList.toggle('show', sb.classList.contains('closed'));
    }

    function setChatMode(isChatting) {
      document.getElementById('hero-section').style.display = isChatting ? 'none' : 'block';
      document.getElementById('chat-history').classList.toggle('hidden', !isChatting);
    }

    function toggleVoice() { 
        voiceActive = !voiceActive; 
        localStorage.setItem('voice_active', voiceActive);
        document.getElementById('voice-knob').style.left = voiceActive ? "18px" : "2px";
        document.getElementById('voice-switch').style.backgroundColor = voiceActive ? "#00E676" : "#f3f4f6";
    }

    document.getElementById('user-input').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleMessage(); } });
    
    window.onload = () => { 
        window.speechSynthesis.getVoices(); // Warm up
        switchView('chat');
        if (chatMemory.length > 0) {
            setChatMode(true);
            chatMemory.forEach(m => addMessage(m.role === 'user' ? 'user' : 'doa', m.content.replace(/\[ACTION:.*?\]/g, "")));
        }
    };
  </script>
</body>
</html>
